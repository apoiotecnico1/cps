<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Inspeção Iluminação Rodovia IA</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
font-family:system-ui;
}

.app{
width:100%;
max-width:420px;
height:100vh;
background:black;
position:relative;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
background:black;
}

canvas{
position:absolute;
inset:0;
pointer-events:none;
}

.controls{
position:absolute;
bottom:16px;
width:100%;
display:flex;
justify-content:center;
gap:12px;
z-index:10;
}

button{
width:64px;
height:64px;
border-radius:50%;
border:none;
font-size:24px;
color:white;
background:rgba(0,0,0,.7);
box-shadow:0 4px 10px rgba(0,0,0,.4)
}

#rec{background:#ef4444}
#stop{background:#374151}
#mark{background:#f97316}

</style>
</head>

<body>

<div class="app">

<video id="video" autoplay playsinline muted></video>
<canvas id="hud"></canvas>

<div class="controls">

<button id="photo">📷</button>
<button id="rec">⏺</button>
<button id="stop">⏹</button>
<button id="mark">⚠</button>

</div>

</div>

<script>

const video=document.getElementById("video")
const hud=document.getElementById("hud")
const ctx=hud.getContext("2d")

let gps=null
let recording=false
let recorder
let chunks=[]

let dataset=[]
let kmPoints=[]

let darkAlert=false

/* distancia */

function hav(a,b,c,d){

const R=6371000
const x=(c-a)*Math.PI/180
const y=(d-b)*Math.PI/180

const u=Math.sin(x/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2

return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u))

}

function fmtKm(v){

let K=Math.floor(v)
let m=Math.round((v-K)*1000)

return `KM ${K}+${String(m).padStart(3,'0')}`

}

/* carregar CSV */

async function loadCSVs(){

const idCSV=await fetch("Dados_Completos_Grupo_2_all.csv").then(r=>r.text())
const lines=idCSV.split(/\r?\n/)

for(let i=1;i<lines.length;i++){

const c=lines[i].split(";")

if(c.length<3)continue

const id=c[0]
const lat=parseFloat(c[1].replace(",","."))
const lon=parseFloat(c[2].replace(",","."))

if(!isNaN(lat)&&!isNaN(lon))dataset.push({id,lat,lon})

}

const kmCSV=await fetch("SNVBR116SPRJ.csv").then(r=>r.text())
const l2=kmCSV.split(/\r?\n/)

for(let i=1;i<l2.length;i++){

const c=l2[i].split(";")

if(c.length<3)continue

const km=parseFloat(c[0].replace(",","."))
const lat=parseFloat(c[1].replace(",","."))
const lon=parseFloat(c[2].replace(",","."))

if(!isNaN(km)&&!isNaN(lat)&&!isNaN(lon))kmPoints.push({km,lat,lon})

}

}

/* proximidade */

function nearestIDs(lat,lon){

const arr=dataset.map(p=>({
id:p.id,
d:hav(lat,lon,p.lat,p.lon)
}))

arr.sort((a,b)=>a.d-b.d)

return arr.slice(0,5)

}

function nearestKM(lat,lon){

let best=null
let bd=Infinity

for(const p of kmPoints){

const d=hav(lat,lon,p.lat,p.lon)

if(d<bd){
bd=d
best=p
}

}

return best

}

/* GPS */

navigator.geolocation.watchPosition(p=>{
gps=p.coords
})

/* camera */

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
})

video.srcObject=stream

}

/* IA simples */

const detectCanvas=document.createElement("canvas")
const detectCtx=detectCanvas.getContext("2d")

function detectDark(){

detectCanvas.width=video.videoWidth
detectCanvas.height=video.videoHeight

detectCtx.drawImage(video,0,0)

const img=detectCtx.getImageData(0,0,detectCanvas.width,detectCanvas.height*0.4)

let sum=0

for(let i=0;i<img.data.length;i+=4){
sum+=img.data[i]
}

const brightness=sum/(img.data.length/4)

darkAlert=brightness<35

}

/* HUD */

function drawHUD(){

hud.width=video.clientWidth*devicePixelRatio
hud.height=video.clientHeight*devicePixelRatio

const W=hud.width
const H=hud.height

ctx.clearRect(0,0,W,H)

const band=H*0.16

ctx.fillStyle="rgba(0,0,0,.65)"
ctx.fillRect(0,H-band,W,band)

let kmText="KM --"
let ids=[]

if(gps){

const km=nearestKM(gps.latitude,gps.longitude)

if(km)kmText=fmtKm(km.km)

ids=nearestIDs(gps.latitude,gps.longitude)

}

ctx.fillStyle="#ff6b35"
ctx.font=`900 ${H*0.05}px Arial`
ctx.fillText(kmText,20,H-band+40)

ctx.fillStyle="#fff"
ctx.font=`700 ${H*0.03}px Arial`
ctx.fillText(new Date().toLocaleString(),20,H-20)

ctx.textAlign="right"

ids.forEach((e,i)=>{
ctx.fillText(e.id,W-20,H-band+30+i*24)
})

if(darkAlert){

ctx.fillStyle="red"
ctx.fillText("⚠ TRECHO ESCURO",W/2,H*0.2)

}

if(recording){

ctx.beginPath()
ctx.arc(W-40,40,12,0,6.28)
ctx.fillStyle="red"
ctx.fill()

}

detectDark()

requestAnimationFrame(drawHUD)

}

/* foto */

function capture(){

const c=document.createElement("canvas")

c.width=video.videoWidth
c.height=video.videoHeight

const x=c.getContext("2d")

x.drawImage(video,0,0)
x.drawImage(hud,0,0,c.width,c.height)

const url=c.toDataURL("image/jpeg")

const a=document.createElement("a")
a.href=url
a.download="foto_inspecao.jpg"
a.click()

}

/* gravação */

function startRecording(){

if(recording)return

chunks=[]

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const x=canvas.getContext("2d")

function render(){

x.drawImage(video,0,0)
x.drawImage(hud,0,0,canvas.width,canvas.height)

requestAnimationFrame(render)

}

render()

const stream=canvas.captureStream(30)

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>{
if(e.data.size>0)chunks.push(e.data)
}

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="inspecao_iluminacao.webm"
a.click()

}

recorder.start()

recording=true

}

function stopRecording(){

if(!recording)return
recorder.stop()
recording=false

}

/* botões */

photo.onclick=capture
rec.onclick=startRecording
stop.onclick=stopRecording
mark.onclick=()=>navigator.vibrate?.(200)

/* iniciar */

async function boot(){

await loadCSVs()
await startCamera()
drawHUD()

}

boot()

</script>

</body>
</html>
