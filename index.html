<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Foto Manutenção · KM + IDs · WhatsApp</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;background:#0b1020;color:#e6ebff;font-family:system-ui,Arial;padding:10px;}
h1{text-align:center;font-size:1.7rem;margin:0 0 10px 0;}
.card{
  background:#101830;padding:14px;margin-bottom:12px;
  border-radius:12px;border:1px solid #1e2647;
}
#vid{width:100%;border-radius:12px;}
#can{display:none;}
button{width:100%;padding:18px;font-size:1.4rem;border:0;border-radius:14px;font-weight:900;cursor:pointer;margin-top:10px;}
#btnFoto{background:#22c55e;color:#000;}
#btnZap{background:#25D366;color:#000;}
.dataBox div{font-size:1.15rem;margin-bottom:6px;}
#fotoFinal{width:100%;margin-top:10px;border-radius:12px;border:1px solid #334;}
input[type=file]{margin-top:10px;}
</style>
</head>

<body>

<h1>📸 Manutenção de Iluminação</h1>

<div class="card">
  <label>Base de IDs (.csv)<br><input type="file" id="upIds" accept=".csv"></label><br>
  <label>Base de KM (.csv)<br><input type="file" id="upKm" accept=".csv"></label>
</div>

<div class="card">
  <video id="vid" autoplay playsinline></video>
  <canvas id="can" width="1280" height="720"></canvas>
</div>

<div class="card dataBox">
  <div>KM: <b id="kmLbl">—</b></div>
  <div>IDs Próximos (5): <b id="idLbl">—</b></div>
</div>

<div class="card">
  <button id="btnFoto">📸 Registrar Defeito</button>
  <button id="btnZap">📤 Enviar WhatsApp</button>
</div>

<div class="card">
  <h3>Prévia da Foto:</h3>
  <img id="fotoFinal" src="">
</div>

<script>
// =============================
// CSV LOADING
// =============================
let dataset = [];
let kmDataset = [];
let lastPos = null;

function nstr(s){
 return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function parsePt(v){
 if(!v) return NaN;
 const s = String(v).trim();
 return /,\d+$/.test(s)
   ? Number(s.replace(/\./g,'').replace(',','.'))
   : Number(s);
}

function parseCsv(txt){
 if(txt.charCodeAt(0)===0xFEFF) txt = txt.slice(1);
 const L = txt.split(/\r?\n/).filter(l=>l.trim()!=='');
 const sep = L[0].includes(';') ? ';' : ',';
 const head = L[0].split(sep);
 const body = L.slice(1).map(l => l.split(sep));
 return { head, body };
}

function findIdx(head, keys){
 const h2 = head.map(nstr);
 for(const k of keys){
   let i = h2.indexOf(k);
   if(i>=0) return i;
 }
 return -1;
}

document.getElementById('upIds').addEventListener('change', async ev=>{
 const f = ev.target.files[0]; if(!f) return;
 const text = await f.text();
 const p = parseCsv(text);

 const iID  = findIdx(p.head, ["id","id do nox","idnox"]);
 const iLAT = findIdx(p.head, ["lat","latitude"]);
 const iLON = findIdx(p.head, ["lon","longitude","long"]);

 if(iID<0||iLAT<0||iLON<0){ alert("CSV de IDs não reconhecido."); return; }

 dataset = p.body.map(r=>({
   id: String(r[iID]).trim(),
   lat: parsePt(r[iLAT]),
   lon: parsePt(r[iLON])
 })).filter(x => x.id && isFinite(x.lat) && isFinite(x.lon));

 alert("IDs carregados: "+dataset.length);
});

document.getElementById('upKm').addEventListener('change', async ev=>{
 const f = ev.target.files[0]; if(!f) return;
 const text = await f.text();
 const p = parseCsv(text);

 const iKM  = findIdx(p.head, ["km"]);
 const iLAT = findIdx(p.head, ["lat","latitude"]);
 const iLON = findIdx(p.head, ["lon","longitude","long"]);

 if(iKM<0||iLAT<0||iLON<0){ alert("CSV de KM não reconhecido."); return; }

 kmDataset = p.body.map(r=>({
   km: parsePt(r[iKM]),
   lat: parsePt(r[iLAT]),
   lon: parsePt(r[iLON])
 })).filter(x => isFinite(x.km) && isFinite(x.lat) && isFinite(x.lon));

 alert("KM carregados: "+kmDataset.length);
});

// =============================
// GEO FUNÇÕES
// =============================
function hav(a,b,c,d){
 const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;
 const u=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
 return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

function nearestKM(lat,lon){
 let best=null,bd=1/0;
 kmDataset.forEach(p=>{
   const d = hav(lat,lon,p.lat,p.lon);
   if(d<bd){ bd=d; best=p; }
 });
 return best;
}

function nearestN(lat,lon,n){
 return dataset
   .map(p => ({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}))
   .sort((a,b)=>a.d-b.d)
   .slice(0,n);
}

function fmtKm(v){
 let k=Math.floor(v);
 let m=Math.round((v-k)*1000);
 return `KM ${k}+${String(m).padStart(3,'0')}`;
}

// =============================
// CÂMERA
// =============================
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(st=>vid.srcObject=st);

// =============================
// GPS POSIÇÃO ATUAL
// =============================
navigator.geolocation.watchPosition(p=>{
 lastPos = { lat:p.coords.latitude, lon:p.coords.longitude };

 if(dataset.length && kmDataset.length){
   const km = nearestKM(lastPos.lat,lastPos.lon);
   kmLbl.textContent = km ? fmtKm(km.km) : "—";

   const ids = nearestN(lastPos.lat,lastPos.lon,5);
   idLbl.textContent = ids.map(x=>x.id).join(", ");
 }

},{enableHighAccuracy:true});

// =============================
// FOTO MANUTENÇÃO
// =============================
btnFoto.onclick = ()=>{
 if(!lastPos){ alert("GPS ainda não carregou."); return; }
 if(!dataset.length || !kmDataset.length){
   alert("Carregue os CSVs primeiro!");
   return;
 }

 const w = vid.videoWidth;
 const h = vid.videoHeight;
 can.width = w;
 can.height = h;

 const ctx = can.getContext("2d");
 ctx.drawImage(vid,0,0,w,h);

 const km = nearestKM(lastPos.lat,lastPos.lon);
 const ids = nearestN(lastPos.lat,lastPos.lon,5);

 // ESTAMPA
 ctx.fillStyle="rgba(0,0,0,0.55)";
 ctx.fillRect(0,h-160,w,160);

 ctx.fillStyle="#fff";
 ctx.font="900 60px system-ui";
 ctx.fillText(km ? fmtKm(km.km) : "KM —", 20, h-98);

 ctx.font="700 30px system-ui";
 ctx.fillText(new Date().toLocaleString(), 20, h-50);

 ctx.textAlign="right";
 ctx.font="600 24px system-ui";
 ids.forEach((n,i)=>ctx.fillText(n.id, w-20, h-130+i*28));

 fotoFinal.src = can.toDataURL("image/jpeg",0.92);
 alert("Foto registrada!");
};

// =============================
// WHATSAPP
// =============================
btnZap.onclick = ()=>{
 if(!fotoFinal.src){
   alert("Tire a foto primeiro.");
   return;
 }

 const texto = encodeURIComponent(
   `*MANUTENÇÃO ILUMINAÇÃO*\n` +
   `Defeito registrado.\n\n` +
   `📍 ${kmLbl.textContent}\n` +
    `🚧 IDs próximos: ${idLbl.textContent}\n` +
   `🕒 ${new Date().toLocaleString()}\n\n` +
   `Foto capturada no local.`
 );

 window.open("https://wa.me/?text="+texto, "_blank");
};
</script>

</body>
</html>
