<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Foto de Manutenção · KM + IDs Próximos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#0b1020;
  color:#e6ebff;
  font-family:system-ui, Arial;
  padding:14px;
}
h1{margin:0 0 10px 0;text-align:center;}
.card{
  background:#101830;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #1e2647;
}
button{
  width:100%;
  padding:16px;
  font-size:1.2rem;
  font-weight:900;
  border:0;
  border-radius:14px;
  background:#22c55e;
  cursor:pointer;
}
#camWrap{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #1e2647;
}
canvas{width:100%;display:block;background:#000;}
.dataBox{
  font-size:1rem;
  color:#9fb4fc;
  margin-top:6px;
}
#fotoFinal{
  width:100%;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #334;
}
</style>
</head>

<body>

<h1>📸 Foto de Manutenção</h1>

<div class="card">
  <div id="camWrap">
    <video id="vid" autoplay playsinline style="width:100%;"></video>
    <canvas id="can" width="1280" height="720" hidden></canvas>
  </div>
</div>

<div class="card dataBox">
  <div>KM atual: <b id="kmLbl">—</b></div>
  <div>IDs próximos (5): <b id="idLbl">—</b></div>
</div>

<div class="card">
  <button id="btnFoto">TIRAR FOTO PARA MANUTENÇÃO</button>
</div>

<div class="card">
  <h3>📷 Foto Gerada:</h3>
  <img id="fotoFinal" src="">
  <button id="btnDownload" style="background:#1a244a;margin-top:10px">BAIXAR FOTO</button>
</div>

<script>
// ==== DADOS DE TESTE ====
// Você pode substituir pelo CSV real posteriormente
let kmDataset = [
  {km: 73.100, lat:-22.90000, lon:-45.35000},
  {km: 73.500, lat:-22.90300, lon:-45.35500},
  {km: 74.000, lat:-22.90600, lon:-45.36000}
];
let dataset = [
  {id:"P12345", lat:-22.90301, lon:-45.35501},
  {id:"P12346", lat:-22.90350, lon:-45.35580},
  {id:"P12347", lat:-22.90410, lon:-45.35630},
  {id:"P12348", lat:-22.90500, lon:-45.35720},
  {id:"P12349", lat:-22.90600, lon:-45.35810}
];

// ==== GEO ====
function hav(a,b,c,d){
 const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;
 const u=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
 return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function nearestKM(lat,lon){
 let best=null,bd=1/0;
 kmDataset.forEach(p=>{
   const d=hav(lat,lon,p.lat,p.lon);
   if(d<bd){bd=d;best=p;}
 });
 return best;
}
function nearestN(lat,lon,n){
 return dataset
   .map(p=>({id:p.id, lat:p.lat, lon:p.lon, d:hav(lat,lon,p.lat,p.lon)}))
   .sort((a,b)=>a.d-b.d)
   .slice(0,n);
}
function fmtKm(v){
 let k=Math.floor(v), m=Math.round((v-k)*1000);
 return `KM ${k}+${String(m).padStart(3,'0')}`;
}

// ==== CÂMERA ====
const vid=document.getElementById("vid");
const can=document.getElementById("can");
const c2=can.getContext("2d");
const fotoFinal=document.getElementById("fotoFinal");
const kmLbl=document.getElementById("kmLbl");
const idLbl=document.getElementById("idLbl");
let lastPos=null;

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(st=>{
  vid.srcObject=st;
});

// ==== GPS ====
navigator.geolocation.watchPosition(p=>{
  lastPos = {
    lat:p.coords.latitude,
    lon:p.coords.longitude
  };

  // atualizar KM
  const nk = nearestKM(lastPos.lat,lastPos.lon);
  kmLbl.textContent = nk ? fmtKm(nk.km) : "—";

  // atualizar IDs
  const near = nearestN(lastPos.lat,lastPos.lon,5);
  idLbl.textContent = near.map(x=>x.id).join(", ");

},{enableHighAccuracy:true});

// ==== FOTO PARA MANUTENÇÃO ====
document.getElementById("btnFoto").onclick = async () => {
  if(!lastPos){ alert("GPS sem posição ainda."); return; }

  can.width = vid.videoWidth;
  can.height = vid.videoHeight;
  c2.drawImage(vid,0,0,can.width,can.height);

  // Estampa
  c2.fillStyle="rgba(0,0,0,0.65)";
  c2.fillRect(0, can.height-150, can.width, 150);

  const nk = nearestKM(lastPos.lat,lastPos.lon);
  const kmTxt = nk ? fmtKm(nk.km) : "KM —";
  const near = nearestN(lastPos.lat,lastPos.lon,5);

  c2.fillStyle="#fff";
  c2.font="900 56px system-ui";
  c2.fillText(kmTxt, 20, can.height-90);

  c2.font="800 24px system-ui";
  c2.fillText(new Date().toLocaleString(), 20, can.height-45);

  c2.textAlign="right";
  c2.font="600 22px system-ui";
  near.forEach((n,i)=>{
    c2.fillText(n.id, can.width-20, can.height-120 + i*22);
  });

  fotoFinal.src = can.toDataURL("image/jpeg",0.92);
};

// ==== DOWNLOAD ====
document.getElementById("btnDownload").onclick = () => {
  if(!fotoFinal.src){ alert("Nenhuma foto gerada."); return; }
  const a=document.createElement("a");
  a.href=fotoFinal.src;
  a.download="FOTO_MANUTENCAO.jpg";
  a.click();
};
</script>

</body>
</html>
