<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Inspeção Vídeo</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

/* vídeo */

.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.wrap{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

video{
position:absolute;
inset:0;
margin:auto;
width:100%;
height:100%;
object-fit:contain;
background:black;
}

canvas.hud{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
}

/* botões */

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
z-index:20;
}

.controls button{
width:64px;
height:64px;
border-radius:50%;
border:none;
font-size:28px;
background:rgba(0,0,0,.6);
color:white;
backdrop-filter:blur(6px);
box-shadow:0 4px 12px rgba(0,0,0,.4);
}

#btnRec{background:#ef4444;}
#btnStop{background:#444;}

.ov{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
}

.msg{
background:rgba(0,0,0,.6);
padding:10px 14px;
border-radius:10px;
font-weight:700;
}

</style>
</head>

<body>

<div class="stage">

<div class="wrap" id="wrap">

<video id="vid" autoplay playsinline muted></video>

<canvas id="can" style="display:none"></canvas>

<canvas id="hud" class="hud"></canvas>

<div id="ov" class="ov">
<div class="msg" id="ovMsg">Inicializando câmera...</div>
</div>

<div class="controls">

<button id="btnPhoto">📷</button>

<button id="btnRec">⏺</button>

<button id="btnStop">⏹</button>

</div>

</div>

</div>

<script>

/* estado */

const vid=document.getElementById("vid")
const hud=document.getElementById("hud")
const hudCtx=hud.getContext("2d")

const can=document.getElementById("can")
const ctx=can.getContext("2d")

const ov=document.getElementById("ov")
const ovMsg=document.getElementById("ovMsg")

let lastPos=null
let gpsReady=false
let isRecording=false
let mediaRecorder
let chunks=[]

/* câmera */

let currentTrack
let zoomMin=1
let zoomMax=1
let zoomStep=0.1
let zoomCurrent=1

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"},
audio:false

})

vid.srcObject=stream

currentTrack=stream.getVideoTracks()[0]

const cap=currentTrack.getCapabilities()

if(cap.zoom){

zoomMin=cap.zoom.min
zoomMax=cap.zoom.max
zoomStep=cap.zoom.step

}

}

/* gps */

function startGPS(){

navigator.geolocation.watchPosition(p=>{

lastPos={

lat:p.coords.latitude,
lon:p.coords.longitude,
acc:p.coords.accuracy

}

gpsReady=true

})

}

/* HUD */

function resizeHUD(){

hud.width=window.innerWidth*devicePixelRatio
hud.height=window.innerHeight*devicePixelRatio

}

window.addEventListener("resize",resizeHUD)

function drawHUD(){

const W=hud.width
const H=hud.height

hudCtx.clearRect(0,0,W,H)

const bandH=Math.max(100*devicePixelRatio,H*0.14)

hudCtx.fillStyle="rgba(0,0,0,.55)"
hudCtx.fillRect(0,H-bandH,W,bandH)

/* KM */

let km="KM --"

if(lastPos){

km="LAT "+lastPos.lat.toFixed(5)

}

hudCtx.fillStyle="#ff6b35"
hudCtx.font=`900 ${Math.max(22,H*0.045)}px system-ui`
hudCtx.textAlign="left"
hudCtx.fillText(km,20,H-bandH+40)

/* timestamp */

const ts=new Date().toLocaleString()

hudCtx.fillStyle="#fff"
hudCtx.font=`700 ${Math.max(16,H*0.028)}px system-ui`

hudCtx.fillText(ts,20,H-20)

/* gps */

hudCtx.fillStyle=gpsReady?"#22c55e":"#ef4444"

hudCtx.font=`600 ${Math.max(14,H*0.024)}px system-ui`

hudCtx.fillText(

gpsReady?"GPS OK":"GPS ...",
20,
40

)

/* rec */

if(isRecording){

hudCtx.beginPath()

hudCtx.arc(W-40,40,12,0,Math.PI*2)

hudCtx.fillStyle="red"

hudCtx.fill()

}

}

/* loop */

function loop(){

drawHUD()

requestAnimationFrame(loop)

}

/* foto */

function capture(){

const w=vid.videoWidth
const h=vid.videoHeight

can.width=w
can.height=h

ctx.drawImage(vid,0,0,w,h)

const url=can.toDataURL("image/jpeg",0.92)

const a=document.createElement("a")

a.href=url
a.download="foto_inspecao.jpg"

a.click()

}

/* gravação */

function startRecording(){

if(isRecording)return

const stream=vid.srcObject

mediaRecorder=new MediaRecorder(stream)

chunks=[]

mediaRecorder.ondataavailable=e=>chunks.push(e.data)

mediaRecorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="video_inspecao.webm"

a.click()

}

mediaRecorder.start()

isRecording=true

}

function stopRecording(){

if(!isRecording)return

mediaRecorder.stop()

isRecording=false

}

/* zoom gesto */

let pinch=null

wrap.addEventListener("touchstart",e=>{

if(e.touches.length==2){

const dx=e.touches[0].clientX-e.touches[1].clientX
const dy=e.touches[0].clientY-e.touches[1].clientY

pinch={dist:Math.hypot(dx,dy),zoom:zoomCurrent}

}

})

wrap.addEventListener("touchmove",async e=>{

if(!pinch)return

const dx=e.touches[0].clientX-e.touches[1].clientX
const dy=e.touches[0].clientY-e.touches[1].clientY

const dist=Math.hypot(dx,dy)

const scale=dist/pinch.dist

let z=pinch.zoom*scale

z=Math.min(zoomMax,Math.max(zoomMin,z))

await currentTrack.applyConstraints({advanced:[{zoom:z}]})

zoomCurrent=z

})

wrap.addEventListener("touchend",()=>pinch=null)

/* botões */

btnPhoto.onclick=capture

btnRec.onclick=startRecording

btnStop.onclick=stopRecording

/* iniciar */

async function boot(){

resizeHUD()

await startCamera()

startGPS()

ov.style.display="none"

loop()

}

boot()

</script>

</body>
</html>
