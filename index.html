<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Inspeção Fotográfica – Iluminação (v5 – simples)</title>
<style>
  :root{ --bg:#0b1020; --surface:#101830; --fg:#e6ebff; --muted:#a3b1d1; --border:#1e2647; --ok:#22c55e; --btn:#22c55e; --btn2:#1e40af; --btn3:#eab308; --btn4:#ef4444; --btn5:#25D366; --camH: 40vh }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;padding:12px; line-height:1.35}
  h1{margin:0 0 10px;text-align:center;font-size:1.25rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px; margin:0 auto 12px; max-width:1100px}
  details.controls > summary{cursor:pointer; list-style:none; outline:none; user-select:none; font-weight:800; color:#dfe7ff}
  details.controls > summary::-webkit-details-marker{display:none}
  .ctrlGrid{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; padding-top:8px}
  select, input[type=range], button.small, input[type=text], input[type=number], input[type=date]{border-radius:10px; border:1px solid var(--border); background:#0d1430; color:#dfe7ff; font-weight:700; padding:8px 10px}
  button.small{font-size:.9rem}
  .subsec{ border-top:1px dashed #243053; padding-top:10px; margin-top:6px; width:100% }
  .subsec h4{ margin:2px 0 6px; font-size:.95rem; color:#c7d2fe }
  .opt-row{ display:flex; flex-wrap:wrap; gap:12px; align-items:center }
  .opt-col{ display:flex; flex-direction:column; gap:6px; padding:8px; border:1px solid #22305a; border-radius:10px; background:#0b1333 }
  .opt-col label{ display:flex; gap:8px; align-items:center; font-size:.9rem; color:#dfe7ff }

  /* ===== Câmera fixa ===== */
  #camCard{ position: fixed; left: 50%; top: 0; transform: translateX(-50%); width: calc(100vw - 24px); max-width:1100px; height: var(--camH); z-index: 100; padding: 0; margin: 12px auto; box-shadow: 0 10px 24px rgba(0,0,0,.35) }
  #wrap{ position: relative; height: 100%; border-radius: 12px; overflow: hidden }
  #vid{ width: 100%; height: 100%; display: block; background:#000; border-radius: 12px; object-fit: cover; touch-action:none }
  #can{display:none}
  #camSpacer{ height: calc(var(--camH) + 24px); max-width:1100px; margin: 0 auto 8px }

  /* Chip status removed; keep minimal */

  /* Ações */
  .row{display:flex;gap:8px;flex-wrap:wrap}
  button{ flex:1 1 180px; padding:11px 12px; font-size:.98rem; border:0; border-radius:10px; cursor:pointer; background:#0d1430; color:#dfe7ff; font-weight:900 }
  #btnPdf{background:var(--btn3);color:#000}
  #btnSharePdf,#btnSharePhotos,#btnShareMaintPdf,#btnShareMaintPhotos{background:var(--btn5);color:#053d19}
  #btnClear{background:var(--btn4);color:#fff}
  button:disabled{opacity:.55;cursor:not-allowed}
  @media (max-width:420px){ button{flex:1 1 140px;font-size:.95rem} }

  /* Grupo PDF */
  .btn-group{ display:flex; align-items:center; gap:8px; flex-wrap:wrap }
  label.ppp{ display:flex; align-items:center; gap:6px; border:1px solid var(--border); background:#0d1430; padding:8px 10px; border-radius:10px; font-weight:700; color:#dfe7ff; font-size:.9rem }
  label.ppp select{ margin:0; padding:6px 8px; border-radius:8px; border:1px solid #243053; background:#0a122a; color:#dfe7ff }

  /* Galeria */
  #foto{width:100%;display:block;border:1px solid #2a335a;border-radius:10px;margin-top:8px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .thumb{position:relative;border:1px solid #243053;border-radius:8px;overflow:hidden;background:#0a122a}
  .thumb img{width:100%;display:block}
  .meta{padding:6px 8px;font-size:.8rem;color:#c7d2fe}

  /* Placa KM (azul) */
  #kmPlaque{ text-align:center; padding:6px 10px; background:linear-gradient(180deg,#0d3b8e,#0a2e6d); border:2px solid #e6ecff; border-radius:10px; margin:0 auto 8px; max-width:1100px; font-weight:900; font-size:1rem; color:#ffffff; box-shadow:0 4px 12px rgba(0,0,0,.25) }
  #kmPlaque span{ letter-spacing:.02em }

  /* Lock */
  #lock{ position:fixed; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.75), rgba(0,0,0,.85)); display:flex; align-items:center; justify-content:center; z-index:9999 }
  .lock-card{ width:min(92vw,440px); background:#0f1533; border:1px solid #263166; border-radius:14px; padding:18px; box-shadow:0 10px 28px rgba(0,0,0,.6); text-align:center }
  .lock-card h2{margin:0 0 4px; font-size:1.2rem}
  .lock-card p{margin:0 0 12px; color:#b9c7ff; font-size:.95rem}
  .lock-row{display:flex; gap:8px; align-items:center; justify-content:center; margin:10px 0}
  #pwd{ flex:1 1 auto; padding:12px; border:1px solid #2a3a7a; border-radius:10px; background:#0b1130; color:#e6ebff; font-size:1rem; outline:none }
  #btnEnter{ padding:12px 16px; border:0; border-radius:10px; background:#22c55e; color:#072414; font-weight:900; cursor:pointer }
  #rememberWrap{display:flex; align-items:center; gap:8px; justify-content:center; color:#cbd5ff; font-size:.9rem; margin-top:6px}
  #err{color:#ff9aa2; font-size:.9rem; min-height:1.2em; margin-top:8px}
</style>
</head>
<body>

<!-- Lock (senha: nox) -->
<div id="lock">
  <div class="lock-card">
    <h2>🔒 Acesso restrito</h2>
    <p>Digite a senha (legado: <b>nox</b>).</p>
    <div class="lock-row">
      <input id="pwd" type="password" placeholder="Senha" autocomplete="current-password" />
      <button id="btnEnter">Entrar</button>
    </div>
    <label id="rememberWrap">
      <input id="remember" type="checkbox" /> Lembrar nesta sessão
    </label>
    <div id="err"></div>
  </div>
</div>

<h1>📸 Inspeção Fotográfica</h1>

<!-- Espaçador da câmera fixa -->
<div id="camSpacer"></div>

<!-- Placa KM -->
<div id="kmPlaque"><span id="kmTop">KM —</span></div>

<!-- CONTROLES (sem segurança) -->
<div class="card">
  <details class="controls">
    <summary>⚙️ Controles</summary>
    <div class="ctrlGrid">
      <label>🎥 Câmera:
        <select id="cameraSel"></select>
      </label>
      <button id="btnCycle" class="small" title="Trocar Câmera">Trocar</button>
      <button id="btnUltra" class="small" title="Ultra‑wide (0.5×)">0.5×</button>
      <button id="btnWide"  class="small" title="Wide (1×)">1×</button>
      <button id="btnTele"  class="small" title="Tele (2×+)">2×</button>
      <label id="zoomWrap" style="display:none">🔍 Zoom:
        <input id="zoomRange" type="range" min="1" max="1" step="0.1" value="1" />
        <span id="zoomVal" style="margin-left:6px">1.0×</span>
      </label>
      <span style="color:#9fb4fc;font-size:.85rem">💾 Anti‑perda: ATIVO</span>

      <div class="subsec">
        <h4>🖼️ Overlay na Foto/Vídeo</h4>
        <div class="opt-row">
          <div class="opt-col">
            <label><input class="opt" id="chkOvKm" type="checkbox" /> KM</label>
            <label><input class="opt" id="chkOvTs" type="checkbox" /> Data/Hora</label>
            <label><input class="opt" id="chkOvGps" type="checkbox" /> Coordenadas</label>
            <label><input class="opt" id="chkOvIds" type="checkbox" /> IDs próximos</label>
          </div>
        </div>
      </div>

      <div class="subsec">
        <h4>📝 Relatório & PDF</h4>
        <div class="opt-row">
          <div class="opt-col">
            <label><input class="opt" id="chkMsgKm" type="checkbox" /> KM</label>
            <label><input class="opt" id="chkMsgTs" type="checkbox" /> Data/Hora</label>
            <label><input class="opt" id="chkMsgGps" type="checkbox" /> Coordenadas</label>
            <label><input class="opt" id="chkMsgIds" type="checkbox" /> IDs próximos</label>
            <label><input class="opt" id="chkPdfLegend" type="checkbox" /> Legenda no PDF</label>
          </div>
          <div class="opt-col">
            <label>Título
              <input class="opt" id="txtTitle" type="text" placeholder="RELATÓRIO DE INSPEÇÃO" style="min-width:260px" />
            </label>
            <label>Obs. (rodapé)
              <input class="opt" id="txtObs" type="text" placeholder="Opcional" style="min-width:260px" />
            </label>
            <label>GPS (decimais)
              <input class="opt" id="numGpsDec" type="number" min="3" max="7" step="1" value="6" style="width:90px" />
            </label>
            <label>Formato data
              <select class="opt" id="selDateFmt">
                <option value="DD/MM/YYYY HH:mm">DD/MM/YYYY HH:mm</option>
                <option value="YYYY-MM-DD HH:mm">YYYY-MM-DD HH:mm</option>
                <option value="DD/MM HH:mm">DD/MM HH:mm</option>
                <option value="ISO">ISO</option>
              </select>
            </label>
            <label>Formato coordenadas
              <select class="opt" id="selCoordFmt">
                <option value="dd">Decimal (DD)</option>
                <option value="dms">Graus/Min/Seg (DMS)</option>
              </select>
            </label>
          </div>
        </div>
      </div>

    </div>
  </details>
</div>

<!-- VÍDEO (fixo no topo) -->
<div class="card" id="camCard">
  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can" width="1280" height="720"></canvas>
  </div>
</div>

<!-- AÇÕES (sem segurança) -->
<div class="card">
  <div class="row">
    <button id="btnAutoCapture" style="background:#ff6b35;color:#fff">🎬 Captura Auto</button>
    <button id="btnVideoRecord" style="background:#e74c3c;color:#fff">⏺️ Gravar Vídeo</button>

    <div class="btn-group">
      <button id="btnPdf" disabled>📄 PDF</button>
      <label class="ppp">
        Fotos/página:
        <select id="pppSel">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="4">4</option>
          <option value="8">8</option>
        </select>
      </label>
    </div>

    <button id="btnSharePdf" disabled>WhatsApp (PDF)</button>
    <button id="btnSharePhotos" disabled>WhatsApp (Fotos)</button>
    <button id="btnClear" disabled>🧹 Limpar</button>
  </div>

  <label style="display:flex;align-items:center;gap:8px;margin-top:8px;color:#cbd5ff;font-size:.95rem">
    <input id="autoClear" type="checkbox" style="transform:scale(1.2)" />
    Limpar automaticamente após salvar/enviar PDF
  </label>
</div>

<!-- Prévia + Galeria -->
<div class="card">
  <h2 style="margin:0 0 6px;font-size:1rem">Foto mais recente</h2>
  <img id="foto" alt="Prévia da foto capturada">
</div>

<div class="card">
  <h2 style="margin:0 0 6px;font-size:1rem">Lista de fotos</h2>
  <div id="gal" class="gallery"></div>
</div>

<script>
/* ===== Lock (senha legado: nox) ===== */
const LOCK={panel:document.getElementById('lock'),input:document.getElementById('pwd'),btn:document.getElementById('btnEnter'),err:document.getElementById('err'),remember:document.getElementById('remember')};
function showError(msg){ LOCK.err.textContent = msg || ''; }
function checkPass(v){ return (String(v||'').trim().toLowerCase()==='nox'); }
function tryUnlock(){ const v=(LOCK.input.value||'').trim(); if(checkPass(v)){ if(LOCK.remember.checked){ sessionStorage.setItem('unlocked_v5','1'); } LOCK.panel.style.display='none'; showError(''); boot(); }else{ showError('Senha incorreta. (Legado: nox)'); LOCK.input.focus(); LOCK.input.select(); } }
LOCK.btn.addEventListener('click', tryUnlock); LOCK.input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryUnlock(); });
(function gate(){ if(sessionStorage.getItem('unlocked_v5')==='1'){ LOCK.panel.style.display='none'; boot(); }else{ LOCK.input.focus(); } })();

/* ===== Utils ===== */
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function fmtKm(v){ let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function dataURLtoUint8Array(dataURL){ const base64=dataURL.split(',')[1]; const raw=atob(base64); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i)&0xFF; return arr; }
function dataURLtoBlob(dataURL){ const mime=(dataURL.split(';')[0].split(':')[1])||'image/jpeg'; return new Blob([dataURLtoUint8Array(dataURL)],{type:mime}); }
function dataURLtoFile(dataURL, filename='INSPECAO_FOTO.jpg'){ return new File([dataURLtoUint8Array(dataURL)], filename, {type:'image/jpeg'}); }
function pad2(n){return String(n).padStart(2,'0')}
function fmtDate(ts,fmt){const d=new Date(ts);if(fmt==='ISO')return d.toISOString().replace('T',' ').slice(0,19);const Y=d.getFullYear();const M=pad2(d.getMonth()+1);const D=pad2(d.getDate());const h=pad2(d.getHours());const m=pad2(d.getMinutes());if(fmt==='YYYY-MM-DD HH:mm')return `${Y}-${M}-${D} ${h}:${m}`;if(fmt==='DD/MM HH:mm')return `${pad2(D)}/${pad2(M)} ${h}:${m}`;return `${pad2(D)}/${pad2(M)}/${Y} ${h}:${m}`}
function toDMS(val, latlon){const abs=Math.abs(val);const deg=Math.floor(abs);const minFloat=(abs-deg)*60;const min=Math.floor(minFloat);const sec=Math.round((minFloat-min)*60);const hemi=latlon==='lat'?(val>=0?'N':'S'):(val>=0?'E':'W');return `${deg}°${pad2(min)}'${pad2(sec)}\"${hemi}`}
function fmtGps(lat,lon,fmt,dec){if(fmt==='dms'){return `${toDMS(lat,'lat')}, ${toDMS(lon,'lon')}`}const d=Math.min(7,Math.max(3,Number(dec||6)));return `${lat.toFixed(d)}, ${lon.toFixed(d)}`}

/* ===== Estado ===== */
let dataset=[], kmPoints=[]; let csvReady=false, camReady=false, gpsReady=false; let lastPos=null; let isAutoCapturing=false; let autoCaptureInterval=null; let isRecordingVideo=false; let mediaRecorder=null; let recordedChunks=[]; let kmUpdateInterval=null;
const vid=document.getElementById('vid'); const can=document.getElementById('can'); const ctx=can.getContext('2d',{alpha:false}); const foto=document.getElementById('foto'); const kmTop=document.getElementById('kmTop'); const gal=document.getElementById('gal');
const btnAutoCapture=document.getElementById('btnAutoCapture'); const btnVideoRecord=document.getElementById('btnVideoRecord'); const autoClear=document.getElementById('autoClear');
const cameraSel=document.getElementById('cameraSel'); const btnCycle=document.getElementById('btnCycle'); const btnUltra=document.getElementById('btnUltra'); const btnWide=document.getElementById('btnWide'); const btnTele=document.getElementById('btnTele'); const zoomWrap=document.getElementById('zoomWrap'); const zoomRange=document.getElementById('zoomRange'); const zoomVal=document.getElementById('zoomVal'); const pppSel=document.getElementById('pppSel');
const chkOvKm=document.getElementById('chkOvKm'),chkOvTs=document.getElementById('chkOvTs'),chkOvGps=document.getElementById('chkOvGps'),chkOvIds=document.getElementById('chkOvIds');
const chkMsgKm=document.getElementById('chkMsgKm'),chkMsgTs=document.getElementById('chkMsgTs'),chkMsgGps=document.getElementById('chkMsgGps'),chkMsgIds=document.getElementById('chkMsgIds');
const chkPdfLegend=document.getElementById('chkPdfLegend');
const txtTitle=document.getElementById('txtTitle'),txtObs=document.getElementById('txtObs'),numGpsDec=document.getElementById('numGpsDec');
const selDateFmt=document.getElementById('selDateFmt'), selCoordFmt=document.getElementById('selCoordFmt');
const photos=[]; // {id,url,blob,w,h,ts,kmStr,idsTxt,filename,lat,lon,acc}

/* ===== IndexedDB ===== */
const DB_NAME='inspecaoDB', DB_VER=1, STORE='photos'; let db=null; function openDB(){ return new Promise((resolve,reject)=>{ const req=indexedDB.open(DB_NAME,DB_VER); req.onupgradeneeded=(e)=>{ const db=e.target.result; if(!db.objectStoreNames.contains(STORE)){ const st=db.createObjectStore(STORE,{keyPath:'id'}); st.createIndex('ts','ts',{unique:false}); } }; req.onsuccess=()=>resolve(req.result); req.onerror=()=>reject(req.error); }); }
async function dbPut(rec){ if(!db) db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function dbGetAll(){ if(!db) db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readonly'); const rq=tx.objectStore(STORE).index('ts').getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }
async function dbClearAll(){ if(!db) db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).clear(); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }

/* ===== CSV (IDs + KM) ===== */
const CELL=0.005; const idGrid=new Map(), kmGrid=new Map(); function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; } function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=60,maxR=5){ const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[]; for(let r=0;r<=maxR && out.length<minCount;r++){ for(let dy=-r;dy<=r;dy++){ const y=ky+dy; for(let dx=-r;dx<=r;dx++){ if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue; const a=grid.get(`${y},${kx+dx}`); if(a) out.push(...a); } } } return out.length?out:[]; }
async function loadIDs(){ const txt=await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text()); const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean); const head=lines[0].split(';').map(h=>h.toLowerCase()); const iId=head.findIndex(h=>h.includes('id') && !h.includes('lat') && !h.includes('long')); const iLat=head.findIndex(h=>h.includes('lat')); const iLon=head.findIndex(h=>h.includes('lon')); dataset=[]; for(let i=1;i<lines.length;i++){ const c=lines[i].split(';'); const id=String(c[iId]||'').trim(), lat=parsePt(c[iLat]), lon=parsePt(c[iLon]); if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue; if(lat===0 && lon===0) continue; if(Math.abs(lat)>90 || Math.abs(lon)>180) continue; dataset.push({id,lat,lon}); } idGrid.clear(); for(const p of dataset) gridInsert(idGrid,p); }
function pickTrio(c){ const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])}; if(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon)) return t1; const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])}; if(Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon)) return t2; return null; }
async function loadKM(){ const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text()); const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean); kmPoints=[]; let lastKeep=null; const MIN_STEP=5; for(let i=0;i<lines.length;i++){ const c=lines[i].split(';'); if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue; const t=pickTrio(c); if(!t) continue; if(!Number.isFinite(t.km)||!Number.isFinite(t.lat)||!Number.isFinite(t.lon)) continue; if(!lastKeep){ kmPoints.push(t); lastKeep=t; } else { const d=hav(lastKeep.lat,lastKeep.lon,t.lat,t.lon); if(d>=MIN_STEP){ kmPoints.push(t); lastKeep=t; } } } kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p); }
async function loadCSVs(){ try{ await Promise.all([loadIDs(),loadKM()]); csvReady=dataset.length>0 && kmPoints.length>0; } catch{ csvReady=false; } }

/* ===== Vizinho ===== */
function nearestN(lat,lon,n=5){ if(!dataset.length) return []; const cand=gridCands(idGrid,lat,lon,Math.max(60,n*20)); const arr=cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0,n); }
function nearestKM(lat,lon){ if(!kmPoints.length) return null; const cand=gridCands(kmGrid,lat,lon,120); if(!cand.length) return null; let best=null,bd=Infinity; for(const p of cand){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best; }

/* ===== Câmera/Zoom ===== */
let currentStream=null,currentTrack=null,currentCap=null; let deviceList=[],deviceIndex=0;
function lensHint(label=''){ const s=String(label).toLowerCase(); if(/tele|zoom\s?lens|50mm|70mm|3x|5x/.test(s)) return 'tele'; if(/ultra|wide\s?angle|0\.5x|0,5x|ultra\-wide|superwide|grande|wide \(ultra\)/.test(s)) return 'ultra'; if(/wide|1x|principal|main|back|rear/.test(s)) return 'wide'; return ''; }
async function enumerateCameras(){ try{ await navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(s=>s.getTracks().forEach(t=>t.stop())); }catch{} const devices=await navigator.mediaDevices.enumerateDevices(); deviceList=devices.filter(d=>d.kind==='videoinput'); deviceList.sort((a,b)=>{ const A=/back|rear|environment/i.test(a.label), B=/back|rear|environment/i.test(b.label); if(A && !B) return -1; if(!A && B) return 1; return a.label.localeCompare(b.label); }); cameraSel.innerHTML=''; deviceList.forEach((d,i)=>{ const o=document.createElement('option'); const tag=lensHint(d.label); o.value=String(i); o.textContent=d.label? `${d.label}${tag?` (${tag})`:''}` : `Câmera ${i+1}${tag?` (${tag})`:''}`; cameraSel.appendChild(o); }); const savedId=localStorage.getItem('camDeviceId'); const idx=Math.max(0, deviceList.findIndex(d=>d.deviceId===savedId)); deviceIndex=idx>=0?idx:0; cameraSel.value=String(deviceIndex); }
async function startCamera(deviceIdx=deviceIndex){ try{ if(currentStream) currentStream.getTracks().forEach(t=>t.stop()); const dev=deviceList[deviceIdx]; const constraints=dev? {video:{deviceId:{exact:dev.deviceId}},audio:false} : {video:{facingMode:{ideal:'environment'}},audio:false}; const st=await navigator.mediaDevices.getUserMedia(constraints); currentStream=st; vid.srcObject=st; await new Promise(res=>{ if(vid.readyState>=1 && vid.videoWidth) return res(); vid.onloadedmetadata=()=>res(); setTimeout(res,1200); }); currentTrack=st.getVideoTracks()[0]; currentCap=currentTrack.getCapabilities? currentTrack.getCapabilities(): null; if(currentCap && currentCap.zoom){ zoomRange.min=currentCap.zoom.min??1; zoomRange.max=currentCap.zoom.max??1; zoomRange.step=currentCap.zoom.step??0.1; zoomWrap.style.display=''; }else{ zoomWrap.style.display='none'; } camReady=!!vid.videoWidth; deviceIndex=deviceIdx; cameraSel.value=String(deviceIndex); }catch(e){ camReady=false; }
}
function applyZoom(val){ if(!(currentTrack && currentCap && currentCap.zoom)) return; const z=Number(val); currentTrack.applyConstraints({advanced:[{zoom:z}]}).catch(()=>currentTrack.applyConstraints({zoom:z}).catch(()=>{})); zoomVal.textContent=`${Number(z).toFixed(1)}×`; }
zoomRange.addEventListener('input', ()=>applyZoom(zoomRange.value));

cameraSel.addEventListener('change', async ()=>{ deviceIndex=Number(cameraSel.value||0); await startCamera(deviceIndex); });
btnCycle.addEventListener('click', async ()=>{ deviceIndex=(deviceIndex+1)%Math.max(1,deviceList.length); await startCamera(deviceIndex); });
btnUltra.addEventListener('click', async ()=>{ if(currentCap?.zoom) applyZoom(zoomRange.min||1); });
btnWide .addEventListener('click', async ()=>{ if(currentCap?.zoom) applyZoom(Math.max(1,Number(zoomRange.min||1))); });
btnTele .addEventListener('click', async ()=>{ if(currentCap?.zoom) applyZoom(Math.min(2,Number(zoomRange.max||2))); });

/* ===== GPS ===== */
function startGPS(){ if(!('geolocation' in navigator)){ gpsReady=false; return; } navigator.geolocation.getCurrentPosition(p=>{ lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy}; gpsReady=true; navigator.geolocation.watchPosition(pos=>{ lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy}; }, ()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000}); }, ()=>{ gpsReady=false; }, {enableHighAccuracy:true, timeout:12000}); }

/* ===== Captura ===== */
function updateActions(){ const n=photos.length, enabled=n>0; btnPdf.disabled=!enabled; btnClear.disabled=!enabled; btnSharePdf.disabled=!enabled; btnSharePhotos.disabled=!enabled; }
function renderGallery(){ gal.innerHTML=''; photos.forEach((p,idx)=>{ const d=document.createElement('div'); d.className='thumb'; const im=document.createElement('img'); im.src=p.url; const meta=document.createElement('div'); meta.className='meta'; meta.textContent=`${idx+1}. ${p.kmStr} • ${p.ts}`; d.appendChild(im); d.appendChild(meta); gal.appendChild(d); }); updateActions(); }
function overlayDraw(ctx,w,h,kmStr,ids,ts){ const bandH=Math.max(120,Math.round(h*0.16)); ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,h-bandH,w,bandH); ctx.fillStyle='#fff'; ctx.textAlign='left'; let y=h-bandH+Math.round(bandH*0.52); if(chkOvKm.checked){ ctx.font=`900 ${Math.round(h*0.055)}px system-ui`; ctx.fillText(kmStr,20,y); } let y2=h-Math.round(bandH*0.22); if(chkOvTs.checked){ ctx.font=`700 ${Math.round(h*0.032)}px system-ui`; ctx.fillText(ts,20,y2); y2-=Math.round(h*0.036); } if(chkOvGps.checked && Number.isFinite(lastPos?.lat) && Number.isFinite(lastPos?.lon)){ ctx.font=`600 ${Math.round(h*0.028)}px system-ui`; ctx.fillText(`GPS: ${fmtGps(lastPos.lat,lastPos.lon, selCoordFmt.value, numGpsDec.value||6)}`,20, h-Math.round(bandH*0.08)); } if(chkOvIds.checked){ ctx.textAlign='right'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`; ids.forEach((e,i)=>ctx.fillText(e.id,w-20,h-bandH+28+i*26)); } }
async function capture(){ if(!(csvReady && camReady && gpsReady && lastPos)){ return; } const w=vid.videoWidth||1280, h=vid.videoHeight||720; can.width=w; can.height=h; ctx.drawImage(vid,0,0,w,h); const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —'; const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=fmtDate(new Date(), selDateFmt.value||'DD/MM/YYYY HH:mm'); overlayDraw(ctx,w,h,kmStr,ids,ts); const url=can.toDataURL('image/jpeg',0.92); const blob=dataURLtoBlob(url); foto.src=url; const safeKm=(kmStr||'').replace('KM ','').replace('+','_'); const fname=`KM_${safeKm||'NA'}.jpg`; foto.dataset.filename=fname; const rec={ id: Date.now()+'_'+Math.random().toString(36).slice(2), url, blob, w,h, ts, kmStr, idsTxt: ids.map(e=>e.id).join(', '), filename: fname, lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc }; await dbPut({...rec, url: undefined}); photos.push(rec); renderGallery(); }

/* ===== Auto Capture ===== */
function startAutoCapture(){ if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; } isAutoCapturing=true; btnAutoCapture.textContent='⏹️ Parar'; btnAutoCapture.style.background='#ef4444'; autoCaptureInterval=setInterval(()=>{ if(csvReady && camReady && gpsReady && lastPos){ const w=vid.videoWidth||1280, h=vid.videoHeight||720; can.width=w; can.height=h; ctx.drawImage(vid,0,0,w,h); const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —'; const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=fmtDate(new Date(), selDateFmt.value||'DD/MM/YYYY HH:mm'); overlayDraw(ctx,w,h,kmStr,ids,ts); const url=can.toDataURL('image/jpeg',0.92); const blob=dataURLtoBlob(url); foto.src=url; const safeKm=(kmStr||'').replace('KM ','').replace('+','_'); const fname=`KM_${safeKm||'NA'}.jpg`; foto.dataset.filename=fname; const rec={ id: Date.now()+'_'+Math.random().toString(36).slice(2), url, blob, w,h, ts, kmStr, idsTxt: ids.map(e=>e.id).join(', '), filename: fname, lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc }; dbPut({...rec, url: undefined}); photos.push(rec); renderGallery(); } }, 600); }
function stopAutoCapture(){ if(!isAutoCapturing) return; isAutoCapturing=false; if(autoCaptureInterval){ clearInterval(autoCaptureInterval); autoCaptureInterval=null; } btnAutoCapture.textContent='🎬 Captura Auto'; btnAutoCapture.style.background='#ff6b35'; }
btnAutoCapture.addEventListener('click', ()=>{ if(isAutoCapturing) stopAutoCapture(); else startAutoCapture(); });

/* ===== Vídeo REC ===== */
async function startVideoRecording(){ if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; } try{ const videoStream=vid.srcObject; if(!videoStream){ alert('Câmera não disponível'); return; } const overlayCanvas=document.createElement('canvas'); overlayCanvas.width=vid.videoWidth||1280; overlayCanvas.height=vid.videoHeight||720; const overlayCtx=overlayCanvas.getContext('2d'); const canvasStream=overlayCanvas.captureStream(30); const audioTracks=videoStream.getAudioTracks(); if(audioTracks.length>0){ canvasStream.addTrack(audioTracks[0]); } const options={ mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 2500000 }; if(!MediaRecorder.isTypeSupported(options.mimeType)){ options.mimeType='video/webm'; } mediaRecorder=new MediaRecorder(canvasStream, options); recordedChunks=[]; mediaRecorder.ondataavailable=(e)=>{ if(e.data.size>0) recordedChunks.push(e.data); }; mediaRecorder.onstop=()=>{ isRecordingVideo=false; btnVideoRecord.textContent='⏺️ Gravar Vídeo'; btnVideoRecord.style.background='#e74c3c'; }; mediaRecorder.start(); isRecordingVideo=true; btnVideoRecord.textContent='⏹️ Parar'; btnVideoRecord.style.background='#e74c3c'; const drawLoop=()=>{ if(!isRecordingVideo) return; overlayCtx.drawImage(vid, 0, 0, overlayCanvas.width, overlayCanvas.height); const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —'; const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=fmtDate(new Date(), selDateFmt.value||'DD/MM/YYYY HH:mm'); overlayDraw(overlayCtx, overlayCanvas.width, overlayCanvas.height, kmStr, ids, ts); requestAnimationFrame(drawLoop); }; drawLoop(); }catch(e){ alert('Erro ao iniciar gravação: '+e.message); isRecordingVideo=false; } }
function stopVideoRecording(){ if(!isRecordingVideo || !mediaRecorder) return; isRecordingVideo=false; mediaRecorder.stop(); setTimeout(()=>{ if(recordedChunks.length===0){ alert('Nenhum dado gravado.'); return; } const blob=new Blob(recordedChunks, {type: 'video/webm'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; const now=new Date(); const dateStr=now.toISOString().slice(0,10); const timeStr=now.toTimeString().slice(0,8).replace(/:/g,'-'); a.download=`VIDEO_INSPECAO_${dateStr}_${timeStr}.webm`; a.click(); setTimeout(()=>{ URL.revokeObjectURL(url); }, 2000); }, 500); }
btnVideoRecord.addEventListener('click', async ()=>{ if(isRecordingVideo){ btnVideoRecord.disabled=true; stopVideoRecording(); setTimeout(()=>{ btnVideoRecord.disabled=false; }, 1000); } else { btnVideoRecord.disabled=true; try{ await startVideoRecording(); }catch(e){} btnVideoRecord.disabled=false; } });

/* ===== PDF ===== */
function downscaleDataURL(srcUrl,maxDim=800,quality=0.85){ return new Promise((resolve)=>{ const img=new Image(); img.onload=()=>{ const W=img.width,H=img.height; let w=W,h=H; if(Math.max(W,H)>maxDim){ if(W>=H){ w=maxDim; h=Math.round(H*(maxDim/W)); } else { h=maxDim; w=Math.round(W*(maxDim/H)); } } const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); resolve({dataUrl:c.toDataURL('image/jpeg',quality), w,h}); }; img.onerror=()=>resolve({dataUrl:srcUrl,w:0,h:0}); img.src=srcUrl; }); }
async function makePdfGrid(arr, perPage=1, legends=[]) { const PW=595, PH=842, M=24; const LAYOUT={1:[1,1],2:[2,1],4:[2,2],8:[4,2]}; const [ROWS,COLS]=LAYOUT[perPage]||[1,1]; const FS=10, LH=FS+2; const enc=new TextEncoder(); const parts=[ enc.encode('%PDF-1.4\n') ]; const xref=[0]; let objNo=0; const off=()=>parts.reduce((a,b)=>a+b.length,0); const addObj=(body)=>{ objNo++; xref.push(off()); parts.push(enc.encode(`${objNo} 0 obj\n${body}\nendobj\n`)); return objNo; }; const addStream=(dict,bin)=>{ objNo++; xref.push(off()); const head=`${objNo} 0 obj\n${dict.replace('>>','')} /Length ${bin.length} >>\nstream\n`; parts.push(enc.encode(head)); parts.push(bin); parts.push(enc.encode(`\nendstream\nendobj\n`)); return objNo; }; const fontNum=addObj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>'); const pages=[]; let i=0; while(i < arr.length){ const names=[]; const contents=[]; for(let r=0; r<ROWS && i<arr.length; r++){ for(let c=0; c<COLS && i<arr.length; c++, i++){ const p=arr[i]; const bin=dataURLtoUint8Array(p.url); const imgW=p.w||800, imgH=p.h||450; const lines=(legends[i]||[]); const textH = lines.length? (lines.length*LH + 6):0; const CELL_W=Math.floor((PW-2*M)/COLS); const CELL_H=Math.floor((PH-2*M)/ROWS); const maxImgH=CELL_H - textH; let dw=CELL_W, dh=Math.round(imgH*(CELL_W/imgW)); if(dh>maxImgH){ dh=maxImgH; dw=Math.round(imgW*(maxImgH/imgH)); } const tx = M + c*CELL_W + Math.round((CELL_W - dw)/2); const ty = PH - (M + (r+1)*CELL_H) + (textH>0? textH:0) + Math.round((CELL_H - (dh+(textH>0? textH:0)))/2); const imgNum=addStream(`<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode >>`, bin); const name=`/Im${r}_${c}`; names.push(`${name} ${imgNum} 0 R`); contents.push(`q\n${dw} 0 0 ${dh} ${tx} ${ty} cm\n${name} Do\nQ\n`); if(lines.length){ let lx = M + c*CELL_W + 6; let ly = ty - 6; contents.push(`BT /F1 ${FS} Tf 0 0 0 rg`); lines.forEach((ln,li)=>{ const safe=String(ln).replace(/[()]/g, m=> m==='('?'\\(':'\\)'); contents.push(` ${lx} ${ly - li*LH} Td (${safe}) Tj`); }); contents.push(' ET'); } } } const contNum=addStream('<< >>', enc.encode(contents.join(''))); const pageNum=addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /Font << /F1 ${fontNum} 0 R >> /XObject << ${names.join(' ')} >> >> /Contents ${contNum} 0 R >>`); pages.push(pageNum); } const pagesNum=addObj(`<< /Type /Pages /Kids [ ${pages.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pages.length} >>`); const catalogNum=addObj(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`); const sx=off(); let xr=`xref\n0 ${xref.length}\n0000000000 65535 f \n`; for(let i=1;i<xref.length;i++){ xr+=String(xref[i]).padStart(10,'0')+' 00000 n \n'; } parts.push(enc.encode(xr)); parts.push(enc.encode(`trailer\n<< /Size ${xref.length} /Root ${catalogNum} 0 R >>\nstartxref\n${sx}\n%%EOF`)); return new Blob(parts,{type:'application/pdf'}); }

/* PDF/Share */
function buildLegendLines(p){ const lines=[]; if(chkPdfLegend.checked){ if(chkMsgKm.checked && p.kmStr) lines.push(p.kmStr); if(chkMsgTs.checked && p.ts) lines.push(p.ts); if(chkMsgGps.checked && Number.isFinite(p.lat)&&Number.isFinite(p.lon)) lines.push(`GPS: ${fmtGps(p.lat,p.lon, selCoordFmt.value, numGpsDec.value||6)}`); if(chkMsgIds.checked && p.idsTxt) lines.push(`IDs: ${p.idsTxt}`); if((txtObs.value||'').trim()) lines.push(`Obs.: ${(txtObs.value||'').trim()}`); } return lines; }
function buildWhatsAppMessage(isPdf){ const lines=[]; const title=(txtTitle.value||'RELATÓRIO DE INSPEÇÃO').toUpperCase(); lines.push(`*${title}*`); lines.push(`Total de fotos: ${photos.length}`); lines.push(`Gerado em: ${fmtDate(new Date(), selDateFmt.value||'DD/MM/YYYY HH:mm')}`); lines.push(''); photos.forEach((p,i)=>{ const segs=[]; if(chkMsgKm.checked && p.kmStr) segs.push(p.kmStr); if(chkMsgTs.checked && p.ts) segs.push(p.ts); if(chkMsgGps.checked && Number.isFinite(p.lat)&&Number.isFinite(p.lon)) segs.push(`GPS: ${fmtGps(p.lat,p.lon, selCoordFmt.value, numGpsDec.value||6)}`); if(chkMsgIds.checked && p.idsTxt) segs.push(`IDs: ${p.idsTxt}`); lines.push(`${i+1}) ${segs.join(' • ')}`); }); if((txtObs.value||'').trim()) lines.push('\n'+(txtObs.value||'').trim()); if(isPdf) lines.push('Anexo: PDF'); return lines.join('\n'); }

const btnPdf=document.getElementById('btnPdf'); const btnSharePdf=document.getElementById('btnSharePdf'); const btnSharePhotos=document.getElementById('btnSharePhotos');
btnPdf.onclick=async ()=>{ if(!photos.length) return; stopAutoCapture(); const perPage = Number((pppSel||{value:1}).value) || 1; const scaled=[], legends=[]; for(const p of photos){ const s=await downscaleDataURL(p.url,800,0.85); scaled.push({url:s.dataUrl,w:s.w,h:s.h}); legends.push(buildLegendLines(p)); } const blob=await makePdfGrid(scaled, perPage, legends); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`RELATORIO_INSPECAO_${perPage}ppg.pdf`; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); if (autoClear?.checked) { await clearList(true); } };
btnSharePdf.onclick=async ()=>{ if(!photos.length) return; stopAutoCapture(); const perPage = Number((pppSel||{value:1}).value) || 1; const scaled=[], legends=[]; for(const p of photos){ const s=await downscaleDataURL(p.url,800,0.85); scaled.push({url:s.dataUrl,w:s.w,h:s.h}); legends.push(buildLegendLines(p)); } const pdfBlob=await makePdfGrid(scaled, perPage, legends); const pdfFile=new File([pdfBlob],`RELATORIO_INSPECAO_${perPage}ppg.pdf`,{type:'application/pdf'}); const text=buildWhatsAppMessage(true); try{ if(navigator.canShare && navigator.canShare({files:[pdfFile]})){ await navigator.share({files:[pdfFile],text,title:txtTitle.value||'Relatório de Inspeção'}); if (autoClear?.checked) { await clearList(true); } } else { const a=document.createElement('a'); a.href=URL.createObjectURL(pdfBlob); a.download=`RELATORIO_INSPECAO_${perPage}ppg.pdf`; a.click(); window.open('https://wa.me/?text='+encodeURIComponent(text+'\n(Anexe o PDF baixado agora.)'),'_blank'); alert('Baixei o PDF e abri o WhatsApp; anexe o arquivo.'); if (autoClear?.checked) { await clearList(true); } } }catch(e){ alert('Compartilhamento cancelado/indisponível.'); } };
btnSharePhotos.onclick=async ()=>{ if(!photos.length) return; stopAutoCapture(); const files=photos.map(p=>dataURLtoFile(p.url,p.filename||'INSPECAO_FOTO.jpg')); const text=buildWhatsAppMessage(false); const MAX=10; if(!(navigator.canShare && navigator.canShare({files:files.slice(0,Math.min(files.length,MAX))}))){ window.open('https://wa.me/?text='+encodeURIComponent(text+'\n(Anexe as fotos manualmente.)'),'_blank'); alert('Seu navegador não permite enviar várias fotos diretamente.'); return; } try{ for(let i=0;i<files.length;i+=MAX){ const lote=files.slice(i,i+MAX); const loteText=i===0? text : `Continuação (${Math.floor(i/MAX)+1})`; await navigator.share({files:lote,text:loteText,title:txtTitle.value||'Relatório de Inspeção'}); } }catch(e){ alert('Compartilhamento cancelado/indisponível.'); } };

/* ===== Limpeza ===== */
async function clearList(silent=false){ if(!photos.length) return; if(!silent && !confirm('Limpar a lista de fotos desta sessão?')) return; photos.length = 0; await dbClearAll(); foto.src = ''; foto.removeAttribute('data-filename'); renderGallery(); }
const btnClear=document.getElementById('btnClear'); btnClear.onclick=()=>clearList(false);

/* ===== KM ao vivo ===== */
function updateKmDisplay(){ if(!lastPos) return; const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —'; kmTop.textContent=kmStr; }
function startKmUpdate(){ updateKmDisplay(); kmUpdateInterval=setInterval(updateKmDisplay, 300); }
function stopKmUpdate(){ if(kmUpdateInterval){ clearInterval(kmUpdateInterval); kmUpdateInterval=null; } }

/* ===== Eventos ===== */
wrap.addEventListener('click', ()=>{ if(isRecordingVideo){ stopVideoRecording(); } else if(isAutoCapturing){ stopAutoCapture(); } else if(csvReady && camReady && gpsReady){ capture(); } });

/* ===== Boot ===== */
async function restoreSavedPhotos(){ const rows=await dbGetAll(); if(!rows.length) return; for(const r of rows){ const url=await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(r.blob); }); photos.push({ id:r.id, url, blob:r.blob, w:r.w, h:r.h, ts:r.ts, kmStr:r.kmStr, idsTxt:r.idsTxt, filename:r.filename, lat:r.lat, lon:r.lon, acc:r.acc }); } if(photos.length){ foto.src=photos[photos.length-1].url; foto.dataset.filename=photos[photos.length-1].filename; } renderGallery(); }
async function boot(){ await loadCSVs(); await enumerateCameras(); await startCamera(0); startGPS(); db=await openDB(); await restoreSavedPhotos(); startKmUpdate(); }
</script>
