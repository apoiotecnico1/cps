<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ID GPS</title>

<style>

body{
font-family:Arial;
background:#0b1020;
color:white;
margin:0;
padding:0;
}

header{
background:linear-gradient(90deg,#5a64ff,#00c2c9);
padding:15px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#0f1630;
border:1px solid #1e2647;
border-radius:10px;
padding:15px;
margin-bottom:15px;
}

button{
background:#22c55e;
border:0;
padding:12px 16px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
margin:0;
}

li{
background:#0b1433;
border:1px solid #1e2647;
padding:12px;
border-radius:8px;
margin-bottom:6px;
display:flex;
justify-content:space-between;
}

.nearest{
border-color:#22c55e;
background:#0e1f1a;
}

.dist{
opacity:0.8;
}

</style>

</head>
<body>

<header>ID GPS · Equipamentos Próximos</header>

<div class="container">

<div class="card">
<button id="sendBtn" disabled>Enviar IDs por WhatsApp</button>
</div>

<div class="card">
<h3>IDs próximos</h3>
<ul id="list">
<li>carregando...</li>
</ul>
</div>

</div>

<script>

let dataset=[]
let lastPos=null

const list=document.getElementById("list")
const sendBtn=document.getElementById("sendBtn")

function parsePt(v){
return Number(String(v).replace(",","."))
}

function hav(lat1,lon1,lat2,lon2){

const R=6371000

const dLat=(lat2-lat1)*Math.PI/180
const dLon=(lon2-lon1)*Math.PI/180

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

}

async function loadCSV(){

try{

const resp=await fetch("dados.csv")
const text=await resp.text()

const lines=text.split(/\r?\n/).filter(l=>l.trim()!=="")

const head=lines.shift().split(";")

const iId=head.findIndex(h=>h.toLowerCase().includes("id"))
const iLat=head.findIndex(h=>h.toLowerCase().includes("lat"))
const iLon=head.findIndex(h=>h.toLowerCase().includes("lon"))

dataset=lines.map(l=>{
const r=l.split(";")
return{
id:r[iId],
lat:parsePt(r[iLat]),
lon:parsePt(r[iLon])
}
})

}catch(e){

list.innerHTML="<li>erro ao carregar CSV</li>"

}

}

function nearestN(lat,lon,n=10){

const arr=dataset.map(p=>({

id:p.id,
lat:p.lat,
lon:p.lon,
d:hav(lat,lon,p.lat,p.lon)

}))

arr.sort((a,b)=>a.d-b.d)

return arr.slice(0,n)

}

function render(){

if(!lastPos)return

const items=nearestN(lastPos.lat,lastPos.lon,10)

list.innerHTML=""

items.forEach((o,i)=>{

const li=document.createElement("li")

if(i==0)li.classList.add("nearest")

const left=document.createElement("span")
left.textContent="ID "+o.id

const right=document.createElement("span")
right.className="dist"
right.textContent=Math.round(o.d)+" m"

li.appendChild(left)
li.appendChild(right)

list.appendChild(li)

})

sendBtn.disabled=false

}

function startGPS(){

navigator.geolocation.watchPosition(

pos=>{

lastPos={
lat:pos.coords.latitude,
lon:pos.coords.longitude
}

render()

},

err=>{
alert("permita o GPS")
},

{
enableHighAccuracy:true
}

)

}

sendBtn.onclick=()=>{

if(!lastPos)return

const items=nearestN(lastPos.lat,lastPos.lon,10)

let msg="IDs próximos:\n\n"

items.forEach(o=>{
msg+="ID "+o.id+"\n"
})

window.open(
"https://wa.me/?text="+encodeURIComponent(msg),
"_blank"
)

}

loadCSV()
startGPS()

</script>

</body>
</html>
