<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inspeção Fotográfica</title>

<style>
:root{
  --bg:#030712;
  --card:#0b1225;
  --accent:#2563eb;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#facc15;
  --text:#e5edff;
  --muted:#94a3b8;
  --radius:14px;

  --camH:60vh; /* 🔥 foco total na câmera */
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  font-weight:800;
  font-size:1rem;
  padding:6px;
  opacity:.8;
}

/* ===== CAMERA ===== */
#camCard{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:var(--camH);
  z-index:100;
  background:#000;
}

#vid{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.overlay{
  position:absolute;
  bottom:10px;
  left:10px;
  font-size:.8rem;
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:8px;
}

/* chip */
.chip{
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:999px;
  font-size:.75rem;
}

/* ===== SPACE ===== */
.spacer{
  height:calc(var(--camH) + 10px);
}

/* ===== KM ===== */
.km{
  text-align:center;
  font-size:1.2rem;
  font-weight:900;
  background:linear-gradient(#1e3a8a,#1e40af);
  padding:8px;
  border-radius:10px;
  margin:10px;
}

/* ===== BUTTONS ===== */
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

button{
  padding:16px;
  border-radius:var(--radius);
  border:none;
  font-size:1rem;
  font-weight:900;
}

.big{
  grid-column:1 / -1;
  font-size:1.1rem;
}

/* cores */
.auto{background:#f97316;color:#fff;}
.rec{background:var(--red);}
.pdf{background:var(--yellow);color:#000;}
.whats{background:#25D366;color:#053d19;}
.clear{background:var(--red);}

/* ===== GALERIA ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:6px;
  padding:10px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

/* ===== FOOT ===== */
.footer{
  padding:10px;
  text-align:center;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">📸 INSPEÇÃO</div>

<!-- CAMERA -->
<div id="camCard">
  <video id="vid" autoplay playsinline muted></video>
  <div class="overlay">Toque para capturar</div>
  <div class="chip" id="chip">●</div>
</div>

<div class="spacer"></div>

<!-- KM -->
<div class="km" id="kmTop">KM —</div>

<!-- BUTTONS -->
<div class="actions">
  <button class="big auto" id="btnAutoCapture">🎬 AUTO</button>
  <button class="big rec" id="btnVideoRecord">⏺️ GRAVAR</button>

  <button class="pdf" id="btnPdf">📄 PDF</button>
  <button class="whats" id="btnSharePdf">📤 PDF</button>

  <button class="whats" id="btnSharePhotos">📷 FOTOS</button>
  <button class="clear" id="btnClear">🧹 LIMPAR</button>
</div>

<!-- GALERIA -->
<div class="gallery" id="gal"></div>

<div class="footer">
Modo otimizado para uso em veículo 🚗
</div>

</body>
</html>
