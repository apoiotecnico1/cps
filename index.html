<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inspeção Fotográfica – Iluminação</title>
<style>
  :root{
    --bg:#0b1020; --surface:#101830; --fg:#e6ebff; --muted:#a3b1d1;
    --border:#1e2647; --btn:#22c55e; --btn2:#1e40af; --btn3:#eab308; --btn4:#ef4444; --btn5:#25D366;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;padding:16px}
  h1{margin:0 0 12px;text-align:center;font-size:1.8rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin:0 auto 16px;max-width:1024px;box-shadow:0 8px 22px rgba(0,0,0,.35)}

  /* Vídeo (toque para fotografar) */
  #wrap{position:relative;border-radius:12px;overflow:hidden}
  #vid{width:100%;display:block;background:#000;border-radius:12px;touch-action:none}
  #can{display:none}
  .ov{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,rgba(0,0,0,.28),rgba(0,0,0,.45));
    font-weight:900;letter-spacing:.02em;text-align:center;pointer-events:none;
  }
  .ov .msg{background:rgba(0,0,0,.55);padding:10px 14px;border-radius:12px}

  .row{display:flex;gap:12px;flex-wrap:wrap}
  button, select, input[type=range]{
    border-radius:12px;border:1px solid var(--border);background:#0d1430;color:#dfe7ff;font-weight:800
  }
  button{flex:1 1 220px;padding:14px;font-size:1.02rem;border:0;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.35)}
  #btnDownload{background:var(--btn2);color:#fff}
  #btnPdf{background:var(--btn3);color:#000}
  #btnSharePdf{background:var(--btn5);color:#062a12}
  #btnSharePhotos{background:var(--btn5);color:#062a12}
  #btnClear{background:var(--btn4);color:#fff}
  button:disabled{opacity:.55;cursor:not-allowed}

  .ctrls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .ctrls > *{padding:10px}
  .ctrls label{display:flex;align-items:center;gap:8px}
  .ctrls small{color:#9fb4fc}

  #foto{width:100%;display:block;border:1px solid #2a335a;border-radius:12px;margin-top:12px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .thumb{border:1px solid #243053;border-radius:10px;overflow:hidden;background:#0a122a}
  .thumb img{width:100%;display:block}
  .meta{padding:8px;font-size:.85rem;color:#c7d2fe}
</style>
</head>
<body>

<h1>📸 Inspeção Fotográfica</h1>

<!-- VÍDEO (toque para capturar) + CONTROLES DE CÂMERA -->
<div class="card">
  <div class="ctrls" style="margin-bottom:10px">
    <label>🎥 Câmera:
      <select id="cameraSel"></select>
      <button id="btnCycle" title="Trocar Câmera">Trocar Câmera</button>
    </label>
    <label id="zoomWrap" style="display:none">🔍 Zoom:
      <input id="zoomRange" type="range" min="1" max="1" step="0.1" value="1" />
      <small id="zoomVal">1.0×</small>
    </label>
    <small id="persistInfo">💾 Salvamento automático: ATIVO</small>
  </div>

  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can" width="1280" height="720"></canvas>
    <div id="ov" class="ov"><div class="msg" id="ovMsg">Carregando CSV, câmera e GPS…</div></div>
  </div>
</div>

<!-- AÇÕES -->
<div class="card">
  <div class="row">
    <button id="btnDownload" disabled>Baixar Última Foto</button>
    <button id="btnPdf" disabled>📄 Salvar Relatório (PDF) – Lista (Leve)</button>
    <button id="btnSharePdf" disabled>📤 Enviar RELATÓRIO (WhatsApp)</button>
    <button id="btnSharePhotos" disabled>📤 Enviar FOTOS (WhatsApp)</button>
    <button id="btnClear" disabled>🗑️ Limpar Lista</button>
  </div>
  <small style="display:block;color:#9fb4fc;margin-top:6px">
    Toque na imagem do vídeo para capturar. O PDF é gerado com todas as fotos da lista, reduzidas para ~800px (relatório leve).
  </small>
</div>

<!-- Foto mais recente + Galeria -->
<div class="card">
  <h2>Foto mais recente</h2>
  <img id="foto" alt="Prévia da foto capturada">
</div>

<div class="card">
  <h2>Lista de fotos (sessão atual)</h2>
  <div id="gal" class="gallery"></div>
</div>

<script>
/* =========================
   Utilitários
   ========================= */
function parsePt(v){
  if(v==null) return NaN;
  const s = String(v).trim();
  return /,\d+$/.test(s) ? Number(s.replace(/\./g,'').replace(',','.')) : Number(s);
}
function hav(a,b,c,d){
  const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u));
}
function fmtKm(v){
  let K=Math.floor(v), m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K+=1}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function dataURLtoUint8Array(dataURL){
  const base64 = dataURL.split(',')[1];
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i)&0xFF;
  return arr;
}
function dataURLtoBlob(dataURL){
  const mime = (dataURL.split(';')[0].split(':')[1]) || 'image/jpeg';
  return new Blob([dataURLtoUint8Array(dataURL)], {type:mime});
}
function dataURLtoFile(dataURL, filename='INSPECAO_FOTO.jpg'){
  return new File([dataURLtoUint8Array(dataURL)], filename, {type:'image/jpeg'});
}

/* =========================
   Estado
   ========================= */
let dataset=[];     // IDs
let kmPoints=[];    // KM (decimado ~5m)
let csvReady=false, camReady=false, gpsReady=false;
let lastPos=null;

const vid=document.getElementById('vid');
const can=document.getElementById('can');
const ctx=can.getContext('2d',{alpha:false});
const foto=document.getElementById('foto');
const wrap=document.getElementById('wrap');
const ov=document.getElementById('ov');
const ovMsg=document.getElementById('ovMsg');

const btnDownload=document.getElementById('btnDownload');
const btnPdf=document.getElementById('btnPdf');
const btnSharePdf=document.getElementById('btnSharePdf');
const btnSharePhotos=document.getElementById('btnSharePhotos');
const btnClear=document.getElementById('btnClear');
const gal=document.getElementById('gal');

const cameraSel=document.getElementById('cameraSel');
const btnCycle=document.getElementById('btnCycle');
const zoomWrap=document.getElementById('zoomWrap');
const zoomRange=document.getElementById('zoomRange');
const zoomVal=document.getElementById('zoomVal');

const photos=[]; // {id, url, blob, w,h,ts,kmStr,idsTxt,filename, lat,lon,acc}

/* =========================
   IndexedDB (anti-perda)
   ========================= */
const DB_NAME='inspecaoDB', DB_VER=1, STORE='photos';
let db=null;

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        const store = db.createObjectStore(STORE, {keyPath:'id'});
        store.createIndex('ts','ts',{unique:false});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror   = ()=>reject(req.error);
  });
}
async function dbPut(record){
  if(!db) db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(record);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  });
}
async function dbGetAll(){
  if(!db) db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).index('ts').getAll();
    req.onsuccess=()=>resolve(req.result||[]);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbClearAll(){
  if(!db) db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  });
}

/* =========================
   CSVs (IDs + KM)
   ========================= */
const CELL = 0.005; // ~550m
const idGrid=new Map(), kmGrid=new Map();
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=60,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL);
  const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      const y=ky+dy;
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${y},${kx+dx}`); if(a) out.push(...a);
      }
    }
  }
  return out.length?out:[];
}

async function loadIDs(){
  const txt = await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text());
  const lines = txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  const head = lines[0].split(';').map(h=>h.toLowerCase());
  const iId  = head.findIndex(h=>h.includes('id') && !h.includes('lat') && !h.includes('long'));
  const iLat = head.findIndex(h=>h.includes('lat'));
  const iLon = head.findIndex(h=>h.includes('lon'));
  dataset=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(';');
    const id=String(c[iId]||'').trim(), lat=parsePt(c[iLat]), lon=parsePt(c[iLon]);
    if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    if(lat===0 && lon===0) continue;
    if(Math.abs(lat)>90 || Math.abs(lon)>180) continue;
    const p={id,lat,lon}; dataset.push(p);
  }
  idGrid.clear(); for(const p of dataset) gridInsert(idGrid,p);
}

function pickTrio(c){
  const t1={km:parsePt(c[0]), lat:parsePt(c[1]), lon:parsePt(c[2])};
  if(Number.isFinite(t1.km) && Number.isFinite(t1.lat) && Number.isFinite(t1.lon)) return t1;
  const t2={km:parsePt(c[7]), lat:parsePt(c[8]), lon:parsePt(c[9])};
  if(Number.isFinite(t2.km) && Number.isFinite(t2.lat) && Number.isFinite(t2.lon)) return t2;
  return null;
}

async function loadKM(){
  const txt = await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
  const lines = txt.split(/\r?\n/).map(cleanLine).filter(Boolean);

  kmPoints=[]; let lastKeep=null; const MIN_STEP=5; // metros
  for(let i=0;i<lines.length;i++){
    const c = lines[i].split(';');
    if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue; // pula cabeçalho
    const t = pickTrio(c);
    if(!t) continue;
    if(!Number.isFinite(t.km)||!Number.isFinite(t.lat)||!Number.isFinite(t.lon)) continue;
    if(!lastKeep){ kmPoints.push(t); lastKeep=t; }
    else{
      const d=hav(lastKeep.lat,lastKeep.lon,t.lat,t.lon);
      if(d>=MIN_STEP){ kmPoints.push(t); lastKeep=t; }
    }
  }
  kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
}

async function loadCSVs(){
  try{
    await Promise.all([loadIDs(), loadKM()]);
    csvReady = dataset.length>0 && kmPoints.length>0;
  }catch(e){
    csvReady=false;
  }
  setOv(csvReady ? 'Aguardando câmera e GPS…' : 'Erro ao carregar CSVs', true);
}

/* =========================
   Vizinhos e derivadas
   ========================= */
function nearestN(lat,lon,n=5){
  if(!dataset.length) return [];
  const cand = gridCands(idGrid,lat,lon,Math.max(60,n*20));
  const arr = cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0,n);
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const cand = gridCands(kmGrid,lat,lon,120);
  if(!cand.length) return null;
  let best=null,bd=Infinity;
  for(const p of cand){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} }
  return best;
}

/* =========================
   Câmera: seleção, troca, zoom
   ========================= */
let currentStream=null, currentTrack=null, currentCap=null;
let deviceList=[], deviceIndex=0;

function saveCamPrefs(){
  localStorage.setItem('camDeviceId', deviceList[deviceIndex]?.deviceId || '');
  if(currentCap?.zoom){
    const z=Number(zoomRange.value||1);
    localStorage.setItem('camZoom_'+deviceList[deviceIndex].deviceId, z);
  }
}
function loadCamPrefsFor(id){
  const z = localStorage.getItem('camZoom_'+id);
  return z? Number(z): null;
}

async function enumerateCameras(){
  const devices=await navigator.mediaDevices.enumerateDevices();
  deviceList = devices.filter(d=>d.kind==='videoinput');
  cameraSel.innerHTML='';
  deviceList.forEach((d,i)=>{
    const o=document.createElement('option');
    o.value=String(i);
    o.textContent = d.label || `Câmera ${i+1}`;
    cameraSel.appendChild(o);
  });
  // Seleciona default pelo last stored (se houver)
  const savedId=localStorage.getItem('camDeviceId');
  const idx = Math.max(0, deviceList.findIndex(d=>d.deviceId===savedId));
  deviceIndex = idx >=0 ? idx : 0;
  cameraSel.value = String(deviceIndex);
}

async function startCamera(deviceIdx=deviceIndex){
  try{
    // Para stream anterior
    if(currentStream){
      currentStream.getTracks().forEach(t=>t.stop());
      currentStream=null; currentTrack=null; currentCap=null;
    }
    const deviceId=deviceList[deviceIdx]?.deviceId;
    const constraints = deviceId ? {video:{deviceId:{exact:deviceId}}} : {video:{facingMode:{ideal:'environment'}}};
    const st = await navigator.mediaDevices.getUserMedia({...constraints, audio:false});
    currentStream = st;
    vid.srcObject = st;

    await new Promise(res=>{
      if(vid.readyState>=1 && vid.videoWidth) return res();
      vid.onloadedmetadata=()=>res();
      setTimeout(res,1500);
    });

    currentTrack = st.getVideoTracks()[0];
    currentCap   = currentTrack.getCapabilities ? currentTrack.getCapabilities() : null;

    // Zoom suportado?
    if(currentCap && currentCap.zoom){
      zoomRange.min  = currentCap.zoom.min ?? 1;
      zoomRange.max  = currentCap.zoom.max ?? 1;
      zoomRange.step = currentCap.zoom.step ?? 0.1;
      let z = loadCamPrefsFor(deviceList[deviceIdx].deviceId) ?? (currentCap.zoom.min ?? 1);
      z = Math.min(zoomRange.max, Math.max(zoomRange.min, z));
      await applyZoom(z, true);
      zoomWrap.style.display = '';
    }else{
      zoomWrap.style.display = 'none';
    }
    camReady = !!vid.videoWidth;
    saveCamPrefs();
  }catch(e){
    console.warn('startCamera error', e);
    camReady=false;
  }
  setOv(ready() ? 'Toque na imagem para capturar' : 'Aguardando recursos…', true);
}

async function applyZoom(val, noSave=false){
  if(!(currentTrack && currentCap && currentCap.zoom)) return;
  const z = Number(val);
  try{
    await currentTrack.applyConstraints({advanced:[{zoom:z}]});
  }catch{
    try{ await currentTrack.applyConstraints({zoom:z}); }catch(e){ /* ignora */ }
  }
  zoomRange.value = z;
  zoomVal.textContent = `${Number(z).toFixed(1)}×`;
  if(!noSave) saveCamPrefs();
}

cameraSel.addEventListener('change', async (e)=>{
  deviceIndex = Number(cameraSel.value||0);
  await startCamera(deviceIndex);
});
btnCycle.addEventListener('click', async ()=>{
  deviceIndex = (deviceIndex+1) % Math.max(1, deviceList.length);
  cameraSel.value = String(deviceIndex);
  await startCamera(deviceIndex);
});
zoomRange.addEventListener('input', ()=>applyZoom(zoomRange.value));

/* Pinch‑to‑zoom no vídeo (se suportado) */
let pinchBase=null;
wrap.addEventListener('touchstart', (ev)=>{
  if(ev.touches.length===2 && currentCap?.zoom){
    const dx=ev.touches[0].clientX-ev.touches[1].clientX;
    const dy=ev.touches[0].clientY-ev.touches[1].clientY;
    pinchBase = {dist:Math.hypot(dx,dy), zoom:Number(zoomRange.value)};
  }
},{passive:true});
wrap.addEventListener('touchmove', (ev)=>{
  if(pinchBase && ev.touches.length===2 && currentCap?.zoom){
    const dx=ev.touches[0].clientX-ev.touches[1].clientX;
    const dy=ev.touches[0].clientY-ev.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    const scale = dist/pinchBase.dist;
    const target = Math.min(zoomRange.max, Math.max(zoomRange.min, pinchBase.zoom*scale));
    applyZoom(target);
  }
},{passive:true});
wrap.addEventListener('touchend', ()=>{ pinchBase=null; });

/* =========================
   GPS
   ========================= */
function startGPS(){
  if(!('geolocation' in navigator)){
    gpsReady=false; setOv('GPS não disponível', true); return;
  }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true;
    setOv(ready() ? 'Toque na imagem para capturar' : 'Aguardando recursos…', true);
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
    }, ()=>{}, {enableHighAccuracy:true, maximumAge:500, timeout:15000});
  }, ()=>{
    gpsReady=false; setOv('Permita o GPS para usar', true);
  }, {enableHighAccuracy:true, timeout:12000});
}

/* =========================
   Clique no VÍDEO = Capturar
   ========================= */
function updateActions(){
  const n = photos.length;
  const enabled = n>0;
  btnPdf.disabled = !enabled;
  btnClear.disabled = !enabled;
  btnSharePdf.disabled = !enabled;
  btnSharePhotos.disabled = !enabled;
  btnDownload.disabled = !foto.src;
}

function renderGallery(){
  gal.innerHTML='';
  photos.forEach((p,idx)=>{
    const d=document.createElement('div');
    d.className='thumb';
    const im=document.createElement('img'); im.src=p.url;
    const meta=document.createElement('div'); meta.className='meta';
    meta.textContent = `${idx+1}. ${p.kmStr} • ${p.ts}`;
    d.appendChild(im); d.appendChild(meta);
    gal.appendChild(d);
  });
  updateActions();
}

async function capture(){
  if(!ready() || !lastPos){ setOv('Aguardando CSV/Câmera/GPS…', true); return; }

  const w=vid.videoWidth||1280, h=vid.videoHeight||720;
  can.width=w; can.height=h;

  // vídeo
  ctx.drawImage(vid,0,0,w,h);

  // faixa inferior
  const bandH=Math.max(160,Math.round(h*0.16));
  ctx.fillStyle='rgba(0,0,0,.62)';
  ctx.fillRect(0,h-bandH,w,bandH);

  // dados
  const kmObj = nearestKM(lastPos.lat,lastPos.lon);
  const kmStr = kmObj ? fmtKm(kmObj.km) : 'KM —';
  const ids = nearestN(lastPos.lat,lastPos.lon,5);
  const ts = new Date().toLocaleString();

  // textos
  ctx.fillStyle='#fff';
  ctx.textAlign='left';
  ctx.font=`900 ${Math.round(h*0.06)}px system-ui`;
  ctx.fillText(kmStr,20,h-bandH+Math.round(bandH*0.55));
  ctx.font=`700 ${Math.round(h*0.035)}px system-ui`;
  ctx.fillText(ts,20,h-Math.round(bandH*0.22));

  ctx.textAlign='right';
  ctx.font=`600 ${Math.round(h*0.03)}px system-ui`;
  ids.forEach((e,i)=>ctx.fillText(e.id,w-20,h-bandH+30+i*28));

  const url=can.toDataURL('image/jpeg',0.92);
  const blob=dataURLtoBlob(url);
  foto.src=url;

  const safeKm = kmStr.replace('KM ','').replace('+','_');
  const fname = `KM_${safeKm}.jpg`;
  foto.dataset.filename = fname;

  const rec={
    id: Date.now()+'_'+Math.random().toString(36).slice(2),
    url, blob, w,h, ts, kmStr,
    idsTxt: ids.map(e=>e.id).join(', '),
    filename: fname,
    lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc
  };

  // Persistência automática (NÃO PERDE)
  await dbPut({...rec, url: undefined}); // guarda blob + metadados
  photos.push(rec);
  renderGallery();

  setOv('Foto capturada (salva no aparelho)', true);
  setTimeout(()=> setOv('Toque na imagem para capturar', true), 900);
}

wrap.addEventListener('click', ()=>{ if(ready()) capture(); });

/* =========================
   Download da última foto
   ========================= */
btnDownload.onclick=()=>{
  if(!foto.src) return;
  const a=document.createElement('a');
  a.href=foto.src;
  a.download = foto.dataset.filename || 'INSPECAO_FOTO.jpg';
  a.click();
};

/* =========================
   PDF (LEVE): redimensiona cada foto para ~800px
   ========================= */
btnPdf.onclick=async ()=>{
  if(!photos.length) return;

  const scaled = [];
  for(const p of photos){
    const s = await downscaleDataURL(p.url, 800, 0.85);
    scaled.push({url:s.dataUrl, w:s.w, h:s.h});
  }

  const blob=await makePdfFromScaledPhotos(scaled,'RELATORIO_INSPECAO_LEVE');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='RELATORIO_INSPECAO.pdf';
  document.body.appendChild(a); a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000); a.remove();
};

/* ===== Enviar RELATÓRIO (PDF) via WhatsApp (Web Share API + fallback) ===== */
btnSharePdf.onclick=async ()=>{
  if(!photos.length) return;
  const scaled = [];
  for(const p of photos){
    const s = await downscaleDataURL(p.url, 800, 0.85);
    scaled.push({url:s.dataUrl, w:s.w, h:s.h});
  }
  const pdfBlob = await makePdfFromScaledPhotos(scaled,'RELATORIO_INSPECAO_LEVE');
  const pdfFile = new File([pdfBlob], 'RELATORIO_INSPECAO.pdf', {type:'application/pdf'});
  const text = buildWhatsAppMessage(true);
  try{
    if(navigator.canShare && navigator.canShare({files:[pdfFile]})){
      await navigator.share({ files:[pdfFile], text, title:'Relatório de Inspeção' });
    }else{
      const a=document.createElement('a'); a.href=URL.createObjectURL(pdfBlob); a.download='RELATORIO_INSPECAO.pdf'; a.click();
      window.open('https://wa.me/?text='+encodeURIComponent(text+'\n(Anexe o PDF baixado agora.)'), '_blank');
      alert('Seu navegador não permite enviar arquivos diretamente. Baixei o PDF e abri o WhatsApp com o texto pronto; anexe o arquivo.');
    }
  }catch(e){
    alert('Compartilhamento cancelado/indisponível. Baixe o PDF e envie manualmente.');
  }
};

/* ===== Enviar TODAS AS FOTOS via WhatsApp ===== */
btnSharePhotos.onclick=async ()=>{
  if(!photos.length) return;
  const files = photos.map(p => dataURLtoFile(p.url, p.filename || 'INSPECAO_FOTO.jpg'));
  const text = buildWhatsAppMessage(false);
  const MAX_FILES_SHARE = 10;
  if(!(navigator.canShare && navigator.canShare({files: files.slice(0, Math.min(files.length, MAX_FILES_SHARE))}))){
    window.open('https://wa.me/?text='+encodeURIComponent(text+'\n(Anexe as fotos manualmente. Se preferir, gere e envie o PDF.)'), '_blank');
    alert('Seu navegador não permite enviar várias fotos diretamente. O texto foi aberto no WhatsApp. Anexe as fotos manualmente.');
    return;
  }
  try{
    for(let i=0;i<files.length;i+=MAX_FILES_SHARE){
      const lote = files.slice(i, i+MAX_FILES_SHARE);
      const loteText = i===0 ? text : `Continuação (${Math.floor(i/MAX_FILES_SHARE)+1})`;
      await navigator.share({ files: lote, text: loteText, title:'Relatório de Inspeção' });
    }
  }catch(e){
    alert('Compartilhamento cancelado/indisponível. Tente o PDF ou envio manual.');
  }
};

/* ===== Mensagem do WhatsApp: resumo + GPS por foto ===== */
function buildWhatsAppMessage(isPdf){
  const lines=[];
  lines.push('*RELATÓRIO DE INSPEÇÃO – ILUMINAÇÃO*');
  lines.push(`Total de fotos: ${photos.length}`);
  lines.push(`Gerado em: ${new Date().toLocaleString()}`);
  lines.push('');
  photos.forEach((p,i)=>{
    let L = `${i+1}) ${p.kmStr} • ${p.ts}`;
    if(Number.isFinite(p.lat) && Number.isFinite(p.lon)){
       L += ` • GPS: ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)} • https://maps.google.com/?q=${p.lat.toFixed(6)},${p.lon.toFixed(6)}`;
    }
    lines.push(L);
  });
  if(isPdf){ lines.push('Anexo: RELATORIO_INSPECAO.pdf'); }
  return lines.join('\n');
}

/* ===== Downscale para JPEG (retorna {dataUrl,w,h}) ===== */
function downscaleDataURL(srcUrl, maxDim=800, quality=0.85){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const {width:W,height:H}=img;
      let w=W, h=H;
      if(Math.max(W,H) > maxDim){
        if(W>=H){ w=maxDim; h=Math.round(H*(maxDim/W)); }
        else{ h=maxDim; w=Math.round(W*(maxDim/H)); }
      }
      const c=document.createElement('canvas');
      c.width=w; c.height=h;
      const cx=c.getContext('2d');
      cx.drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',quality);
      resolve({dataUrl,w,h});
    };
    img.onerror=()=>resolve({dataUrl:srcUrl,w:0,h:0});
    img.src = srcUrl;
  });
}

/* ===== PDF builder (sequencial, com xref correto) ===== */
async function makePdfFromScaledPhotos(arr,nameBase){
  const PW=595, PH=842, M=36;
  const enc=new TextEncoder();
  const parts=[ enc.encode('%PDF-1.4\n') ];
  const xref=[0];
  let objNo=0;
  const getOffset=()=>parts.reduce((a,b)=>a+b.length,0);
  function addObj(body){
    objNo++; xref.push(getOffset());
    parts.push(enc.encode(`${objNo} 0 obj\n${body}\nendobj\n`)); return objNo;
  }
  function addStream(dict, binUint8){
    objNo++; xref.push(getOffset());
    const head = `${objNo} 0 obj\n${dict.replace('>>','')} /Length ${binUint8.length} >>\nstream\n`;
    parts.push(enc.encode(head)); parts.push(binUint8); parts.push(enc.encode(`\nendstream\nendobj\n`));
    return objNo;
  }
  const pageNums=[];
  for(let i=0;i<arr.length;i++){
    const p=arr[i];
    const imgBin = dataURLtoUint8Array(p.url);
    const imgW=p.w||800, imgH=p.h||450;
    const maxW=PW-2*M, maxH=PH-2*M;
    let dw=maxW, dh=Math.round(imgH*(maxW/imgW));
    if(dh>maxH){ dh=maxH; dw=Math.round(imgW*(maxH/imgH)); }
    const tx=Math.round((PW-dw)/2), ty=Math.round((PH-dh)/2);
    const imgNum = addStream(`<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode >>`, imgBin);
    const imgName = `/Im${i+1}`;
    const contentStr = `q\n${dw} 0 0 ${dh} ${tx} ${ty} cm\n${imgName} Do\nQ\n`;
    const contentNum = addStream(`<< >>`, enc.encode(contentStr));
    const pageNum = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << ${imgName} ${imgNum} 0 R >> >> /Contents ${contentNum} 0 R >>`);
    pageNums.push(pageNum);
  }
  const pagesNum = addObj(`<< /Type /Pages /Kids [ ${pageNums.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pageNums.length} >>`);
  const catalogNum = addObj(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`);
  const xrefStart=getOffset();
  let xr=`xref\n0 ${xref.length}\n0000000000 65535 f \n`;
  for(let i=1;i<xref.length;i++){ xr += String(xref[i]).padStart(10,'0') + ' 00000 n \n'; }
  parts.push(enc.encode(xr));
  parts.push(enc.encode(`trailer\n<< /Size ${xref.length} /Root ${catalogNum} 0 R >>\nstartxref\n${xrefStart}\n%%EOF`));
  return new Blob(parts,{type:'application/pdf'});
}

/* =========================
   Boot + restauração de fotos salvas
   ========================= */
async function restoreSavedPhotos(){
  const rows = await dbGetAll();
  if(!rows.length) return;
  for(const r of rows){
    // reconstroi dataURL a partir do blob
    const url = await new Promise(res=>{
      const fr=new FileReader();
      fr.onload=()=>res(fr.result);
      fr.readAsDataURL(r.blob);
    });
    photos.push({
      id:r.id, url, blob:r.blob,
      w:r.w, h:r.h, ts:r.ts, kmStr:r.kmStr, idsTxt:r.idsTxt,
      filename:r.filename, lat:r.lat, lon:r.lon, acc:r.acc
    });
  }
  if(photos.length){
    foto.src = photos[photos.length-1].url;
    foto.dataset.filename = photos[photos.length-1].filename;
  }
  renderGallery();
}

btnClear.onclick=async ()=>{
  if(!photos.length) return;
  if(!confirm('Limpar a lista de fotos desta sessão?')) return;
  photos.length=0;
  await dbClearAll();
  foto.src='';
  renderGallery();
};

(async function boot(){
  setOv('Carregando CSV, câmera e GPS…', true);

  // CSVs
  await loadCSVs();

  // Câmeras + stream
  await enumerateCameras();
  await startCamera(deviceIndex);

  // GPS
  startGPS();

  // Restaura fotos persistidas
  db = await openDB();
  await restoreSavedPhotos();

  const tick=()=>{ setOv(ready()? 'Toque na imagem para capturar' : 'Aguardando CSV/Câmera/GPS…', true); requestAnimationFrame(tick); };
  tick();
})();
