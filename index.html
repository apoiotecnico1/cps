<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema com Câmera Fixa</title>
<style>
  /* Reset básico */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    height: 100%;
    font-family: Arial, sans-serif;
  }

  /* Container da câmera fixa */
  .camera-container {
    position: fixed;      /* Fixa na tela */
    top: 0;
    left: 0;
    width: 100%;          /* Ocupa largura total para fácil visualização */
    height: 30%;          /* 30% da altura da tela */
    background-color: #000; /* Fundo preto para vídeo */
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Conteúdo rolável */
  .content-container {
    margin-top: 30%;       /* Evita sobreposição da câmera */
    padding: 1rem;
    height: 70vh;
    overflow-y: auto;      /* Permite rolagem */
  }

  /* Estilo para botões de fácil acesso com uma mão */
  .action-button {
    position: fixed;
    bottom: 1rem;
    right: 1rem; /* Ajuste para destros, trocar para left para canhotos */
    background-color: #007bff;
    color: #fff;
    border: none;
    padding: 0.8rem 1rem;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    z-index: 1001;
  }

  /* Apenas estilo do conteúdo exemplo */
  .content-block {
    background-color: #f0f0f0;
    margin-bottom: 1rem;
    padding: 1rem;
    border-radius: 8px;
  }

  /* Vídeo dentro do container */
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }
</style>
</head>
<body>

<!-- Câmera fixa -->
<div class="camera-container">
  <video id="camera" autoplay playsinline></video>
</div>

<!-- Conteúdo rolável -->
<div class="content-container">
  <div class="content-block">Conteúdo 1</div>
  <div class="content-block">Conteúdo 2</div>
  <div class="content-block">Conteúdo 3</div>
  <div class="content-block">Conteúdo 4</div>
  <div class="content-block">Conteúdo 5</div>
  <div class="content-block">Conteúdo 6</div>
  <div class="content-block">Conteúdo 7</div>
  <div class="content-block">Conteúdo 8</div>
</div>

<!-- Botão de ação para fácil alcance com uma mão -->
<button class="action-button">Ação</button>

<script>
  // Função original da câmera
  async function initCamera() {
    const video = document.getElementById('camera');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
    } catch (err) {
      console.error("Erro ao acessar a câmera:", err);
    }
  }

  initCamera();
</script>

</body>
</html>
