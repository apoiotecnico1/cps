<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Inteligente Original</title>
</head>
<body>

<h1>Camera Inteligente Original</h1>

<video id="video" autoplay playsinline></video>

<div>
    <button id="btnFoto">Tirar Foto</button>
    <button id="btnVideo">Gravar Vídeo</button>
    <button id="btnPDF">Gerar PDF</button>
    <button id="btnShare">Compartilhar</button>
    <button id="btnClear">Limpar</button>
</div>

<div>
    Status: <span id="status">Pronto</span>
</div>
<div>
    KM: <span id="km">0</span>
</div>
<div>
    Timer: <span id="timer">00:00</span>
</div>

<div id="gallery"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const video = document.getElementById('video');
const status = document.getElementById('status');
const km = document.getElementById('km');
const timerEl = document.getElementById('timer');
const gallery = document.getElementById('gallery');

let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let timerInterval = null;
let seconds = 0;

async function initCamera() {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
        video.srcObject = mediaStream;
        status.textContent = 'Câmera ativa';
    } catch(err) { alert('Erro ao acessar a câmera: '+err); }
}

function formatTime(sec){
    const m = String(Math.floor(sec/60)).padStart(2,'0');
    const s = String(sec%60).padStart(2,'0');
    return `${m}:${s}`;
}

function startTimer(){
    clearInterval(timerInterval);
    seconds=0;
    timerEl.textContent = formatTime(seconds);
    timerInterval = setInterval(()=>{seconds++; timerEl.textContent=formatTime(seconds)},1000);
}

function stopTimer(){ clearInterval(timerInterval); }

document.getElementById('btnFoto').addEventListener('click', ()=>{
    const canvas=document.createElement('canvas');
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    const imgData=canvas.toDataURL('image/png');
    const img=document.createElement('img');
    img.src=imgData;
    gallery.appendChild(img);
    status.textContent='Foto tirada';
    km.textContent=parseInt(km.textContent)+1;
});

document.getElementById('btnVideo').addEventListener('click', ()=>{
    if(!mediaRecorder || mediaRecorder.state==='inactive'){
        mediaRecorder = new MediaRecorder(mediaStream);
        recordedChunks=[];
        mediaRecorder.ondataavailable = e=>{if(e.data.size>0) recordedChunks.push(e.data);};
        mediaRecorder.onstop = ()=>{
            const blob = new Blob(recordedChunks,{type:'video/webm'});
            const url = URL.createObjectURL(blob);
            const vid = document.createElement('video');
            vid.src = url;
            vid.controls=true;
            gallery.appendChild(vid);
            status.textContent='Vídeo gravado';
        };
        mediaRecorder.start();
        status.textContent='Gravando...';
        startTimer();
    } else if(mediaRecorder.state==='recording'){
        mediaRecorder.stop();
        status.textContent='Parando gravação...';
        stopTimer();
    }
});

document.getElementById('btnPDF').addEventListener('click', ()=>{
    if(gallery.children.length===0){alert('Nenhuma foto para gerar PDF'); return;}
    const pdf = new jspdf.jsPDF();
    Array.from(gallery.children).forEach((el,i)=>{
        if(el.tagName==='IMG') pdf.addImage(el.src,'PNG',10,10,180,160);
        if(i<gallery.children.length-1) pdf.addPage();
    });
    pdf.save('fotos.pdf');
    status.textContent='PDF gerado';
});

document.getElementById('btnShare').addEventListener('click', async ()=>{
    try{
        const files = await Promise.all(Array.from(gallery.children).map(async el=>{
            if(el.tagName==='IMG'){
                const blob = await fetch(el.src).then(r=>r.blob());
                return new File([blob],'foto.png',{type:'image/png'});
            }
        }).filter(f=>f));
        if(navigator.canShare && files.length){
            await navigator.share({files});
            status.textContent='Compartilhado com sucesso!';
        } else alert('Compartilhamento não suportado');
    } catch(err){ alert('Erro ao compartilhar: '+err); }
});

document.getElementById('btnClear').addEventListener('click', ()=>{
    gallery.innerHTML='';
    km.textContent='0';
    status.textContent='Galeria limpa';
});

initCamera();
</script>
</body>
</html>
