<style>
:root{
  --bg:#0a0f1f;
  --panel:#11182f;
  --border:#1f2a4d;
  --text:#e6ecff;

  --primary:#00e0ff;
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
}

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(#162a63,#0a0f1f);
  color:var(--text);
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:10px;
}

/* CARDS */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* STATUS */
.status{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:700;
  background:#00000055;
  border:1px solid var(--border);
}

/* CÂMERA */
video{
  width:100%;
  height:42vh;
  object-fit:cover;
  border-radius:12px;
  background:#000;
  border:1px solid var(--border);
}

/* KM DISPLAY */
#km, #kmDisplay{
  text-align:center;
  font-size:1.2rem;
  font-weight:900;
  color:var(--primary);
  padding:6px;
}

/* BOTÕES */
button{
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  font-weight:900;
  letter-spacing:.03em;
  background:linear-gradient(180deg,#0f1a3a,#0a1128);
  color:var(--text);
  box-shadow:0 4px 15px rgba(0,0,0,.5);
}

button:active{
  transform:scale(.96);
}

/* VARIAÇÕES */
.primary{
  background:linear-gradient(180deg,#00e0ff,#0090c0);
  color:#001018;
}

.warning{
  background:linear-gradient(180deg,#ffb347,#d98c1f);
}

.danger{
  background:linear-gradient(180deg,#ff5c5c,#d93a3a);
}

/* GRID BOTÕES */
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:6px;
}

.gallery img{
  width:100%;
  border-radius:8px;
  border:1px solid var(--border);
}

/* SCROLL SUAVE */
::-webkit-scrollbar{
  width:8px;
}
::-webkit-scrollbar-thumb{
  background:#1f2a4d;
  border-radius:4px;
}
</style>
