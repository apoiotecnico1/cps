<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Set Top Inspeção – Vídeo & Auditoria</title>
<style>
  :root{
    --bg:#000; --fg:#e6ebff; --accent:#ff6b35; --ok:#22c55e; --err:#ef4444; --muted:#9fb4fc;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:#000;color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;line-height:1.35}
  /* Tela full video */
  .stage{position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center;}
  .wrap{position:relative; width:100vw; height:100vh; overflow:hidden; background:#000; touch-action:none;}
  video{position:absolute; inset:0; margin:auto; min-width:100%; min-height:100%; width:auto; height:auto; object-fit:cover; background:#000;}
  canvas.hud{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
  .ov{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.35)); font-weight:900; text-align:center; pointer-events:none;}
  .ov .msg{background:rgba(0,0,0,.6); padding:10px 14px; border-radius:10px; font-size:1rem}

  /* ===== Painel flutuante: Sessão/Exportação ===== */
  .sheet{position:fixed; inset:auto 0 0 0; background:#0f1533; border-top:2px solid rgba(255,255,255,.15);
    color:#e6ebff; max-height:80vh; transform:translateY(105%); transition:.28s transform ease; z-index:40; border-radius:12px 12px 0 0;
    box-shadow:0 -18px 30px rgba(0,0,0,.45)}
  .sheet.open{transform:translateY(0)}
  .sheet header{padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; border-bottom:1px solid rgba(255,255,255,.08)}
  .sheet h3{margin:0;font-size:1rem}
  .sheet .body{padding:12px 14px; display:grid; gap:8px}
  .grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px}
  .grid label{font-size:.8rem; color:#cbd5ff}
  .grid input,.grid select,.grid textarea{width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.2); background:#0b1130; color:#e6ebff}
  .row{display:flex; gap:8px; flex-wrap:wrap}
  .row button{flex:1 1 160px; padding:12px; font-weight:800; border:0; border-radius:10px; cursor:pointer; background:#0d1430; color:#dfe7ff}
  .b-ok{background:#22c55e;color:#072414} .b-warn{background:#eab308;color:#000} .b-danger{background:#ef4444;color:#fff}
  .b-accent{background:#1e40af;color:#fff}
  .row small{color:#9fb4fc}

  /* ===== Menu de Eventos (full overlay leve) ===== */
  .ev{position:fixed; inset:0; background:rgba(0,0,0,.65); display:none; place-items:center; z-index:50}
  .ev.open{display:grid}
  .ev-card{width:min(92vw,720px); background:#0f1533; border:1px solid #263166; border-radius:14px; padding:16px}
  .ev-card h4{margin:0 0 10px}
  .ev-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px}
  .ev-grid button{padding:12px; border:0; border-radius:10px; font-weight:800; cursor:pointer; background:#0d1430; color:#e6ebff}
  .ev-note{margin-top:10px}
  .ev-note input{width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.2); background:#0b1130; color:#e6ebff}

  /* ===== Cadeado ===== */
  #lock{position:fixed; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.75), rgba(0,0,0,.85)); display:flex; align-items:center; justify-content:center; z-index:9999}
  .lock-card{width:min(92vw,420px); background:#0f1533; border:1px solid #263166; border-radius:14px; padding:18px; box-shadow:0 10px 28px rgba(0,0,0,.6); text-align:center}
  .lock-card h2{margin:0 0 4px; font-size:1.2rem}
  .lock-card p{margin:0 0 12px; color:#b9c7ff; font-size:.95rem}
  .lock-row{display:flex; gap:8px; align-items:center; justify-content:center; margin:10px 0}
  #pwd{flex:1 1 auto; padding:12px; border:1px solid #2a3a7a; border-radius:10px; background:#0b1130; color:#e6ebff; font-size:1rem; outline:none}
  #btnEnter{padding:12px 16px; border:0; border-radius:10px; background:#22c55e; color:#072414; font-weight:900; cursor:pointer}
  #rememberWrap{display:flex; align-items:center; gap:8px; justify-content:center; color:#cbd5ff; font-size:.9rem; margin-top:6px}
  #err{color:#ff9aa2; font-size:.9rem; min-height:1.2em; margin-top:8px}
</style>
</head>
<body>

<!-- ===== Cadeado ===== -->
<div id="lock">
  <div class="lock-card">
    <h2>🔒 Acesso restrito</h2>
    <p>Digite a senha para continuar.</p>
    <div class="lock-row">
      <input id="pwd" type="password" placeholder="Senha" autocomplete="current-password" />
      <button id="btnEnter">Entrar</button>
    </div>
    <label id="rememberWrap">
      <input id="remember" type="checkbox" />
      Lembrar nesta sessão
    </label>
    <div id="err"></div>
  </div>
</div>

<!-- ===== Cena de vídeo (full) ===== -->
<div class="stage">
  <div class="wrap" id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can" width="1280" height="720" style="display:none"></canvas>
    <canvas id="hud" class="hud"></canvas>
    <div id="ov" class="ov"><div class="msg" id="ovMsg">Carregando CSV, câmera e GPS…</div></div>
  </div>
</div>

<!-- ===== Painel Sessão/Exportação ===== -->
<div id="sheet" class="sheet" aria-hidden="true">
  <header>
    <h3>🧰 Sessão de Inspeção & Auditoria</h3>
    <button id="sheetClose" class="b-danger">Fechar</button>
  </header>
  <div class="body">
    <div class="grid">
      <div><label>Operador</label><input id="opOperador" placeholder="Seu nome"/></div>
      <div><label>Equipe</label><input id="opEquipe" placeholder="Ex.: Elétrica A"/></div>
      <div><label>Veículo</label><input id="opVeiculo" placeholder="Ex.: VTR-123"/></div>
      <div><label>Concessão</label><input id="opConcessao" placeholder="Ex.: CCR RioSP"/></div>
      <div><label>Trecho</label><input id="opTrecho" placeholder="Ex.: BR-116 SP/RJ"/></div>
      <div>
        <label>Pista</label>
        <select id="opPista">
          <option value="">—</option>
          <option>Norte</option><option>Sul</option><option>Leste</option><option>Oeste</option>
        </select>
      </div>
      <div>
        <label>Finalidade</label>
        <select id="opFinalidade">
          <option>Rotina</option><option>Auditoria</option><option>Incidente</option><option>Outros</option>
        </select>
      </div>
      <div><label>Observações</label><input id="opObs" placeholder="Observações gerais"/></div>
    </div>

    <div class="row">
      <button id="btnSessaoStart" class="b-ok">▶️ Iniciar Sessão</button>
      <button id="btnSessaoStop" class="b-warn" disabled>⏹️ Finalizar Sessão</button>
      <button id="btnExport" class="b-accent" disabled>📤 Exportar (PDF/JSON/CSV/SHA‑256)</button>
    </div>
    <small id="sessInfo">Sessão: —</small>
  </div>
</div>

<!-- ===== Menu de Eventos ===== -->
<div id="ev" class="ev" aria-hidden="true">
  <div class="ev-card">
    <h4>⚑ Marcar Evento</h4>
    <div class="ev-grid">
      <button data-type="Ocorrência">🚨 Ocorrência</button>
      <button data-type="Risco">⚠️ Risco</button>
      <button data-type="Iluminação Apagada">💡 Iluminação Apagada</button>
      <button data-type="Poste Danificado">🪵 Poste Danificado</button>
      <button data-type="Cabo Solto">🧵 Cabo Solto</button>
      <button data-type="Outros">📝 Outros</button>
    </div>
    <div class="ev-note">
      <input id="evNote" placeholder="(Opcional) detalhe do evento / patrimônio"/>
    </div>
    <div class="row" style="margin-top:10px">
      <button id="evCancel" class="b-danger">Cancelar</button>
    </div>
  </div>
</div>

<script>
/* ========= Cadeado ========= */
const LOCK = { panel:lock, input:pwd, btn:btnEnter, err:err, remember:remember, key:'session_unlocked' };
function showError(msg){ LOCK.err.textContent = msg || ''; }
function tryUnlock(){
  const v=(LOCK.input.value||'').trim();
  if(v==='nox'){ if(LOCK.remember.checked) sessionStorage.setItem(LOCK.key,'1'); LOCK.panel.style.display='none'; showError(''); boot(); }
  else{ showError('Senha incorreta.'); LOCK.input.focus(); LOCK.input.select(); }
}
LOCK.btn.addEventListener('click', tryUnlock);
LOCK.input.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
(()=>{ if(sessionStorage.getItem(LOCK.key)==='1'){ LOCK.panel.style.display='none'; boot(); } else { LOCK.input.focus(); } })();

/* ========= Utils ========= */
const $=sel=>document.querySelector(sel);
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function fmtKm(v){ let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function dataURLtoUint8Array(dataURL){ const base64=dataURL.split(',')[1]; const raw=atob(base64); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i)&0xFF; return arr; }
function dataURLtoBlob(dataURL){ const mime=(dataURL.split(';')[0].split(':')[1])||'image/jpeg'; return new Blob([dataURLtoUint8Array(dataURL)],{type:mime}); }
function setOv(text,show=true){ ovMsg.textContent=text; ov.style.display=show?'flex':'none'; }
function saveAs(blob, filename){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 2000); }

/* ========= Estado ========= */
let dataset=[], kmPoints=[];
let csvReady=false, camReady=false, gpsReady=false;
let lastPos=null; // {lat, lon, acc}
let isRecording=false;
let mediaRecorder=null, recordedChunks=[];
let deviceList=[], deviceIndex=0, currentStream=null, currentTrack=null, currentCap=null;
let zoomMin=1, zoomMax=1, zoomStep=0.1, currentZoomShown=1;
let pinchBase=null, showZoomHintTs=0;
const wrapEl=$('#wrap'), vid=$('#vid'), canEl=$('#can'), ctx=canEl.getContext('2d',{alpha:false});
const hud=$('#hud'), hudCtx=hud.getContext('2d');
let hudNeedsSize=true; window.addEventListener('resize', ()=>{ hudNeedsSize=true; });

/* ========= IndexedDB anti-perda ========= */
const DB_NAME='inspecaoDB', DB_VER=2, STORE='photos';
let db=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=(e)=>{ const db=e.target.result; if(!db.objectStoreNames.contains(STORE)){ const st=db.createObjectStore(STORE,{keyPath:'id'}); st.createIndex('ts','ts',{unique:false}); } };
    req.onsuccess=()=>resolve(req.result); req.onerror=()=>reject(req.error);
  });
}
async function dbPut(rec){ if(!db) db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }

/* ========= CSVs ========= */
const CELL=0.005; // ~550m
const idGrid=new Map(), kmGrid=new Map();
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=60,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      const y=ky+dy;
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${y},${kx+dx}`); if(a) out.push(...a);
      }
    }
  }
  return out.length?out:[];
}
async function loadIDs(){
  const txt=await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  const head=lines[0].split(';').map(h=>h.toLowerCase());
  const iId=head.findIndex(h=>h.includes('id') && !h.includes('lat') && !h.includes('long'));
  const iLat=head.findIndex(h=>h.includes('lat'));
  const iLon=head.findIndex(h=>h.includes('lon'));
  dataset=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(';');
    const id=String(c[iId]||'').trim(), lat=parsePt(c[iLat]), lon=parsePt(c[iLon]);
    if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    if(lat===0 && lon===0) continue;
    if(Math.abs(lat)>90 || Math.abs(lon)>180) continue;
    const p={id,lat,lon}; dataset.push(p);
  }
  idGrid.clear(); for(const p of dataset) gridInsert(idGrid,p);
}
function pickTrio(c){
  const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon)) return t1;
  const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
  if(Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon)) return t2;
  return null;
}
async function loadKM(){
  const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  kmPoints=[]; let lastKeep=null; const MIN_STEP=5;
  for(let i=0;i<lines.length;i++){
    const c=lines[i].split(';');
    if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue;
    const t=pickTrio(c); if(!t) continue;
    if(!Number.isFinite(t.km)||!Number.isFinite(t.lat)||!Number.isFinite(t.lon)) continue;
    if(!lastKeep){ kmPoints.push(t); lastKeep=t; }
    else{ const d=hav(lastKeep.lat,lastKeep.lon,t.lat,t.lon); if(d>=MIN_STEP){ kmPoints.push(t); lastKeep=t; } }
  }
  kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
}
async function loadCSVs(){
  try{ await Promise.all([loadIDs(),loadKM()]); csvReady=dataset.length>0 && kmPoints.length>0; }
  catch{ csvReady=false; }
  setOv(csvReady ? 'Aguardando câmera e GPS…' : 'Erro ao carregar CSVs', true);
}
function nearestN(lat,lon,n=5){
  if(!dataset.length) return [];
  const cand=gridCands(idGrid,lat,lon,Math.max(60,n*20));
  const arr=cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0,n);
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const cand=gridCands(kmGrid,lat,lon,120);
  if(!cand.length) return null;
  let best=null,bd=Infinity;
  for(const p of cand){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} }
  return best;
}

/* ========= Câmera & Zoom ========= */
async function enumerateCameras(){
  try{ await navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(s=>s.getTracks().forEach(t=>t.stop())); }catch{}
  const devices=await navigator.mediaDevices.enumerateDevices();
  deviceList=devices.filter(d=>d.kind==='videoinput');
  const rearIdx= deviceList.findIndex(d=>/back|rear|environment/i.test(d.label));
  deviceIndex = rearIdx>=0? rearIdx : 0;
}
async function startCamera(idx=deviceIndex){
  try{
    if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
    currentStream=currentTrack=currentCap=null;
    const dev=deviceList[idx];
    const constraints=dev? {video:{deviceId:{exact:dev.deviceId}},audio:true} : {video:{facingMode:{ideal:'environment'}},audio:true};
    const st=await navigator.mediaDevices.getUserMedia(constraints);
    currentStream=st; vid.srcObject=st;
    await new Promise(res=>{ if(vid.readyState>=1 && vid.videoWidth) return res(); vid.onloadedmetadata=()=>res(); setTimeout(res,1200); });
    currentTrack=st.getVideoTracks()[0];
    currentCap=currentTrack.getCapabilities? currentTrack.getCapabilities(): null;
    if(currentCap?.zoom){
      zoomMin=currentCap.zoom.min??1; zoomMax=currentCap.zoom.max??1; zoomStep=currentCap.zoom.step??0.1;
      const s=currentTrack.getSettings(); currentZoomShown = Number(s.zoom || 1);
    }else{ zoomMin=zoomMax=1; zoomStep=0.1; currentZoomShown=1; }
    camReady=!!vid.videoWidth;
  }catch(e){ camReady=false; }
  setOv(ready()? 'Toque=Foto · DuploToque=Gravar · Pinça=Zoom · LongPress=Evento · 3Toques=Painel' : 'Aguardando recursos…', true);
}
async function switchCamera(){ if(!deviceList.length) return; deviceIndex=(deviceIndex+1)%deviceList.length; await startCamera(deviceIndex); }
async function applyZoom(z){
  if(!(currentTrack && currentCap && currentCap.zoom)) return;
  const val=Math.min(zoomMax, Math.max(zoomMin, Number(z)));
  try{ await currentTrack.applyConstraints({advanced:[{zoom:val}]}); }
  catch{ try{ await currentTrack.applyConstraints({zoom:val}); }catch(e){} }
  currentZoomShown=val; showZoomHintTs=performance.now();
}

/* ========= GPS ========= */
let trackTimer=null; // coletor da trilha 1Hz
function startGPS(){
  if(!('geolocation' in navigator)){ gpsReady=false; setOv('GPS não disponível', true); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true;
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
    }, ()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
  }, ()=>{ gpsReady=false; setOv('Permita o GPS para usar', true); }, {enableHighAccuracy:true, timeout:12000});
}

/* ========= Sessão / Auditoria ========= */
const sess = {
  active:false,
  id:null,
  startedAt:null,
  stoppedAt:null,
  meta:{ operador:'', equipe:'', veiculo:'', concessao:'', trecho:'', pista:'', finalidade:'', obs:'' },
  events:[],   // {t, type, note, lat, lon, acc, km}
  track:[],    // {t, lat, lon, acc, km}
  media:{ videoBlob:null, videoName:'', videoSha256:'', jsonSha256:'' }
};
function newSessionId(){ return 'S'+Date.now().toString(36)+Math.random().toString(36).slice(2,7).toUpperCase(); }
function sessionOpenPanel(open=true){ const el=$('#sheet'); if(open){ el.classList.add('open'); el.setAttribute('aria-hidden','false'); } else { el.classList.remove('open'); el.setAttribute('aria-hidden','true'); } }
function readSessMeta(){
  sess.meta.operador = $('#opOperador').value.trim();
  sess.meta.equipe   = $('#opEquipe').value.trim();
  sess.meta.veiculo  = $('#opVeiculo').value.trim();
  sess.meta.concessao= $('#opConcessao').value.trim();
  sess.meta.trecho   = $('#opTrecho').value.trim();
  sess.meta.pista    = $('#opPista').value.trim();
  sess.meta.finalidade=$('#opFinalidade').value.trim();
  sess.meta.obs      = $('#opObs').value.trim();
}
function sessInfoRefresh(){
  $('#sessInfo').textContent = sess.active
    ? `Sessão ATIVA: ${sess.id} • ${new Date(sess.startedAt).toLocaleString()} • Operador: ${sess.meta.operador||'—'}`
    : (sess.id? `Sessão: ${sess.id} (encerrada)` : 'Sessão: —');
}
$('#sheetClose').onclick=()=>sessionOpenPanel(false);
$('#btnSessaoStart').onclick=()=>{
  if(sess.active){ alert('Já existe sessão ativa.'); return; }
  readSessMeta();
  sess.id=newSessionId(); sess.startedAt=Date.now(); sess.stoppedAt=null; sess.events=[]; sess.track=[]; sess.media={videoBlob:null,videoName:'',videoSha256:'',jsonSha256:''};
  sess.active=true; $('#btnSessaoStart').disabled=true; $('#btnSessaoStop').disabled=false; $('#btnExport').disabled=true;
  sessInfoRefresh(); sessionOpenPanel(false);

  // iniciar coletor da trilha 1Hz
  if(trackTimer) clearInterval(trackTimer);
  trackTimer=setInterval(()=>{
    if(!sess.active || !lastPos) return;
    const kmObj=nearestKM(lastPos.lat,lastPos.lon);
    sess.track.push({t:Date.now(), lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc||0, km:kmObj?kmObj.km:null});
  }, 1000);
};
$('#btnSessaoStop').onclick=()=>{
  if(!sess.active){ alert('Nenhuma sessão ativa.'); return; }
  sess.active=false; sess.stoppedAt=Date.now();
  $('#btnSessaoStart').disabled=false; $('#btnSessaoStop').disabled=true; $('#btnExport').disabled=false;
  if(trackTimer){ clearInterval(trackTimer); trackTimer=null; }
  sessInfoRefresh();
};

/* ========= Eventos (menu) ========= */
function openEventMenu(open=true){ const el=$('#ev'); if(open){ el.classList.add('open'); el.setAttribute('aria-hidden','false'); $('#evNote').value=''; } else { el.classList.remove('open'); el.setAttribute('aria-hidden','true'); } }
$('#evCancel').onclick=()=>openEventMenu(false);
$('.ev-grid').addEventListener('click', (e)=>{
  const b=e.target.closest('button'); if(!b) return;
  if(!sess.active){ alert('Inicie uma sessão para marcar eventos.'); return; }
  const type=b.dataset.type;
  const note=$('#evNote').value.trim();
  const kmObj= lastPos? nearestKM(lastPos.lat,lastPos.lon): null;
  const rec={ t:Date.now(), type, note, lat:lastPos?.lat||null, lon:lastPos?.lon||null, acc:lastPos?.acc||null, km:kmObj?kmObj.km:null };
  sess.events.push(rec);
  openEventMenu(false);
  flashHUD(`Evento: ${type}`); // feedback rápido
});

/* ========= HUD (tempo real) ========= */
function resizeHud(){
  const r=wrapEl.getBoundingClientRect();
  hud.width=r.width*devicePixelRatio;
  hud.height=r.height*devicePixelRatio;
  hud.style.width=`${r.width}px`;
  hud.style.height=`${r.height}px`;
  hudNeedsSize=false;
}
function flashHUD(text){
  setOv(text,true); setTimeout(()=>setOv('Toque=Foto · DuploToque=Gravar · Pinça=Zoom · LongPress=Evento · 3Toques=Painel',true), 900);
}
function drawHUD(){
  if(hudNeedsSize) resizeHud();
  const W=hud.width, H=hud.height;
  hudCtx.clearRect(0,0,W,H);
  const pad=24*devicePixelRatio;
  const bandH=Math.max(144*devicePixelRatio,Math.round(H*0.16));
  // fundo inferior
  hudCtx.fillStyle='rgba(0,0,0,.58)';
  hudCtx.fillRect(0,H-bandH,W,bandH);

  // KM + hora
  const kmObj= lastPos? nearestKM(lastPos.lat,lastPos.lon): null;
  const KM = kmObj? fmtKm(kmObj.km): 'KM —';
  hudCtx.fillStyle='#ff6b35';
  hudCtx.textAlign='left';
  hudCtx.font=`900 ${Math.round(H*0.055)}px system-ui`;
  hudCtx.fillText(KM, pad, H-bandH+Math.round(bandH*0.52));

  const ts=new Date().toLocaleString();
  hudCtx.fillStyle='#ffffff';
  hudCtx.font=`700 ${Math.round(H*0.032)}px system-ui`;
  hudCtx.fillText(ts, pad, H-Math.round(bandH*0.22));

  // IDs à direita
  const ids = (lastPos && csvReady) ? nearestN(lastPos.lat,lastPos.lon,5) : [];
  hudCtx.textAlign='right';
  hudCtx.fillStyle='#e6ebff';
  hudCtx.font=`600 ${Math.round(H*0.028)}px system-ui`;
  const startY = H-bandH + Math.round(28*devicePixelRatio);
  const lineH  = Math.round(26*devicePixelRatio);
  ids.forEach((e,i)=>{ hudCtx.fillText(e.id, W-pad, startY + i*lineH); });

  // GPS status canto sup.esq
  hudCtx.textAlign='left';
  hudCtx.font=`600 ${Math.round(H*0.024)}px system-ui`;
  const gpsTxt = gpsReady && lastPos ? `GPS ✓ acc: ~${Math.round(lastPos.acc||0)} m` : 'GPS —';
  hudCtx.fillStyle = gpsReady ? '#a7f3d0' : '#ffd1d1';
  hudCtx.fillText(gpsTxt, pad, pad + Math.round(22*devicePixelRatio));

  // Sessão/Operador (canto sup.centro)
  if(sess.id){
    hudCtx.textAlign='center';
    hudCtx.fillStyle='#c7d2fe';
    hudCtx.font=`700 ${Math.round(H*0.024)}px system-ui`;
    const op = (sess.meta.operador||'—');
    hudCtx.fillText(`Sessão ${sess.id} • Operador: ${op}`, W/2, pad + Math.round(22*devicePixelRatio));
  }

  // Zoom hint
  if(performance.now() - showZoomHintTs < 1200 && currentCap?.zoom){
    hudCtx.textAlign='center';
    hudCtx.fillStyle='rgba(0,0,0,.45)';
    const bxW=Math.round(W*0.22), bxH=Math.round(H*0.06);
    hudCtx.fillRect((W-bxW)/2, pad*2.2, bxW, bxH);
    hudCtx.fillStyle='#ffffff';
    hudCtx.font=`700 ${Math.round(H*0.03)}px system-ui`;
    const z = currentZoomShown.toFixed(1)+'×';
    hudCtx.fillText('Zoom '+z, W/2, pad*2.2 + Math.round(bxH*0.65));
  }

  // Indicador REC (sup.dir.)
  if(isRecording){
    const r=10*devicePixelRatio;
    const cx=W-pad-r, cy=pad+r;
    hudCtx.beginPath();
    hudCtx.arc(cx,cy,r,0,Math.PI*2);
    hudCtx.fillStyle='#ef4444';
    hudCtx.fill();
    hudCtx.fillStyle='#ffffff';
    hudCtx.font=`700 ${Math.round(H*0.024)}px system-ui`;
    hudCtx.textAlign='right';
    hudCtx.fillText('REC', cx-14*devicePixelRatio, cy+6*devicePixelRatio);
  }
}
function loop(){ drawHUD(); requestAnimationFrame(loop); }

/* ========= Gestos ========= */
wrapEl.addEventListener('touchstart', (ev)=>{
  if(ev.touches.length===2 && currentCap?.zoom){
    const dx=ev.touches[0].clientX-ev.touches[1].clientX;
    const dy=ev.touches[0].clientY-ev.touches[1].clientY;
    pinchBase={dist:Math.hypot(dx,dy), zoom:currentZoomShown};
  }
  // painel por 3 toques simultâneos
  if(ev.touches.length===3){ sessionOpenPanel(true); }
},{passive=true});
wrapEl.addEventListener('touchmove', (ev)=>{
  if(pinchBase && ev.touches.length===2 && currentCap?.zoom){
    const dx=ev.touches[0].clientX-ev.touches[1].clientX;
    const dy=ev.touches[0].clientY-ev.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    const scale=dist/pinchBase.dist;
    const target=Math.min(zoomMax, Math.max(zoomMin, pinchBase.zoom*scale));
    applyZoom(target);
  }
},{passive=true});
wrapEl.addEventListener('touchend', ()=>{ pinchBase=null; });

let lastTap=0, longPressTimer=null;
wrapEl.addEventListener('pointerdown', ()=>{
  longPressTimer=setTimeout(()=>{ openEventMenu(true); }, 1200);
});
wrapEl.addEventListener('pointerup', (e)=>{
  if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer=null; }
  const now=Date.now();
  if(now-lastTap<300){ toggleRecording(); } // duplo toque
  else { capture(); } // toque simples
  lastTap=now;
});
wrapEl.addEventListener('dblclick', e=>e.preventDefault());
wrapEl.addEventListener('wheel', (e)=>{
  if(!(currentCap?.zoom)) return; e.preventDefault();
  const delta = e.deltaY>0 ? -zoomStep : zoomStep;
  applyZoom(Math.min(zoomMax, Math.max(zoomMin, currentZoomShown+delta)));
},{passive:false});

/* ========= Foto (tap) ========= */
async function capture(){
  if(!(csvReady && camReady && gpsReady && lastPos)){ setOv('Aguardando CSV/Câmera/GPS…', true); return; }
  const w=vid.videoWidth||1280, h=vid.videoHeight||720;
  canEl.width=w; canEl.height=h;
  const cctx=canEl.getContext('2d',{alpha:false});
  cctx.drawImage(vid,0,0,w,h);

  // Overlay igual ao HUD/grav.
  const bandH=Math.max(144,Math.round(h*0.16));
  cctx.fillStyle='rgba(0,0,0,.62)'; cctx.fillRect(0,h-bandH,w,bandH);
  const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —';
  const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=new Date().toLocaleString();
  cctx.fillStyle='#ff6b35'; cctx.textAlign='left';
  cctx.font=`900 ${Math.round(h*0.055)}px system-ui`; cctx.fillText(kmStr,20,h-bandH+Math.round(bandH*0.52));
  cctx.fillStyle='#fff';
  cctx.font=`700 ${Math.round(h*0.032)}px system-ui`; cctx.fillText(ts,20,h-Math.round(bandH*0.22));
  cctx.textAlign='right'; cctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
  ids.forEach((e,i)=>cctx.fillText(e.id,w-20,h-bandH+28+i*26));

  // Watermark sessão/operador discreto topo
  if(sess.id){
    cctx.textAlign='left'; cctx.fillStyle='rgba(0,0,0,.45)'; cctx.fillRect(12,12,420,40);
    cctx.fillStyle='#c7d2fe'; cctx.font=`700 ${Math.round(h*0.032)}px system-ui`;
    cctx.fillText(`Sessão ${sess.id} • ${sess.meta.operador||'—'}`, 20, 40);
  }

  const url=canEl.toDataURL('image/jpeg',0.92);
  const blob=dataURLtoBlob(url);
  const rec={
    id: Date.now()+'_'+Math.random().toString(36).slice(2),
    url, blob, w, h, ts, kmStr,
    idsTxt: ids.map(e=>e.id).join(', '),
    filename:`FOTO_${(sess.id||'S')}_${new Date().toISOString().replace(/[:.]/g,'-')}.jpg`,
    lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc
  };
  await dbPut({...rec, url: undefined});
  flashHUD('Foto capturada');
}

/* ========= Gravação com overlay ========= */
let canvasStream=null, overlayCanvas=null, overlayCtx=null;
function makeOverlayCanvas(){
  overlayCanvas=document.createElement('canvas');
  overlayCanvas.width=vid.videoWidth||1280;
  overlayCanvas.height=vid.videoHeight||720;
  overlayCtx=overlayCanvas.getContext('2d');
  return overlayCanvas.captureStream(30);
}
function drawRecordLoop(){
  if(!isRecording) return;
  overlayCtx.drawImage(vid, 0, 0, overlayCanvas.width, overlayCanvas.height);
  const H=overlayCanvas.height, W=overlayCanvas.width;
  const bandH=Math.max(144,Math.round(H*0.16));
  overlayCtx.fillStyle='rgba(0,0,0,.62)';
  overlayCtx.fillRect(0, H-bandH, W, bandH);

  const kmObj= lastPos ? nearestKM(lastPos.lat,lastPos.lon) : null;
  const kmStr= kmObj? fmtKm(kmObj.km): 'KM —';
  overlayCtx.fillStyle='#ff6b35';
  overlayCtx.textAlign='left';
  overlayCtx.font=`900 ${Math.round(H*0.055)}px system-ui`;
  overlayCtx.fillText(kmStr, 20, H-bandH+Math.round(bandH*0.52));
  const ts=new Date().toLocaleString();
  overlayCtx.fillStyle='#fff';
  overlayCtx.font=`700 ${Math.round(H*0.032)}px system-ui`;
  overlayCtx.fillText(ts, 20, H-Math.round(bandH*0.22));

  // IDs à direita
  const ids = (lastPos && csvReady) ? nearestN(lastPos.lat,lastPos.lon,5) : [];
  overlayCtx.textAlign='right'; overlayCtx.fillStyle='#e6ebff'; overlayCtx.font=`600 ${Math.round(H*0.028)}px system-ui`;
  ids.forEach((e,i)=>overlayCtx.fillText(e.id, W-20, H-bandH+28+i*26));

  // Watermark sessão/operador
  if(sess.id){
    overlayCtx.textAlign='left'; overlayCtx.fillStyle='rgba(0,0,0,.45)'; overlayCtx.fillRect(12,12,520,40);
    overlayCtx.fillStyle='#c7d2fe'; overlayCtx.font=`700 ${Math.round(H*0.032)}px system-ui`;
    overlayCtx.fillText(`Sessão ${sess.id} • ${sess.meta.operador||'—'}`, 20, 40);
  }

  // Indicador REC
  overlayCtx.beginPath(); overlayCtx.arc(W-30, 30, 10, 0, Math.PI*2); overlayCtx.fillStyle='#ef4444'; overlayCtx.fill();
  requestAnimationFrame(drawRecordLoop);
}
async function startRecording(){
  if(isRecording) return;
  if(!(csvReady && camReady && gpsReady && lastPos)){ setOv('Aguardando CSV/Câmera/GPS…', true); return; }
  try{
    const videoStream=vid.srcObject; if(!videoStream){ setOv('Câmera não disponível', true); return; }
    canvasStream=makeOverlayCanvas();
    const audioTracks=videoStream.getAudioTracks(); if(audioTracks.length>0) canvasStream.addTrack(audioTracks[0]);
    const opts={ mimeType:'video/webm;codecs=vp8,opus', videoBitsPerSecond:3500000 }; if(!MediaRecorder.isTypeSupported(opts.mimeType)) opts.mimeType='video/webm';
    mediaRecorder=new MediaRecorder(canvasStream, opts);
    recordedChunks=[];
    mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop=()=>{ isRecording=false; setOv('Gravação finalizada', true); };
    mediaRecorder.start();
    isRecording=true;
    setOv('Gravando… duplo toque para parar', true);
    drawRecordLoop();
  }catch(e){ console.error(e); isRecording=false; setOv('Erro ao iniciar gravação: '+e.message, true); }
}
function stopRecording(){
  if(!isRecording || !mediaRecorder) return;
  isRecording=false; mediaRecorder.stop();
  setTimeout(async ()=>{
    if(recordedChunks.length===0){ setOv('Nenhum dado gravado.', true); return; }
    const blob=new Blob(recordedChunks, {type:'video/webm'});
    const now=new Date();
    const base= `${now.toISOString().slice(0,10)}_${now.toTimeString().slice(0,8).replace(/:/g,'-')}`;
    const name = `VIDEO_AUDITORIA_${(sess.id||'S')}_${base}.webm`;
    sess.media.videoBlob=blob; sess.media.videoName=name;
    // Download do vídeo
    saveAs(blob, name);
    // Pós-processo de auditoria (hash/export)
    await auditExportAuto();
  }, 400);
}
function toggleRecording(){ if(isRecording) stopRecording(); else startRecording(); }

/* ========= SHA-256 ========= */
async function sha256Hex(blob){
  const buf = await blob.arrayBuffer();
  const hash = await crypto.subtle.digest('SHA-256', buf);
  const arr = Array.from(new Uint8Array(hash));
  return arr.map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ========= Exportação (JSON/CSV/PDF) ========= */
function sessionToJSON(){
  const meta = {
    id:sess.id, startedAt:sess.startedAt, stoppedAt:sess.stoppedAt, meta:sess.meta,
    device:{ ua:navigator.userAgent, plat:navigator.platform, lang:navigator.language },
    counts:{ events:sess.events.length, track:sess.track.length }
  };
  return { meta, events:[...sess.events], track:[...sess.track] };
}
function sessionToCSV(){
  const head='tipo;timestamp;km;lat;lon;acc;nota\n';
  const evs = sess.events.map(e=>[
    e.type, new Date(e.t).toISOString(), (e.km??''), (e.lat??''), (e.lon??''), (Math.round(e.acc??0)), (e.note||'')
  ].join(';')).join('\n');

  const headTrack='\n\ntimestamp;km;lat;lon;acc\n';
  const trk = sess.track.map(p=>[
    new Date(p.t).toISOString(), (p.km??''), (p.lat??''), (p.lon??''), (Math.round(p.acc??0))
  ].join(';')).join('\n');
  return head + evs + headTrack + trk;
}
async function makeAuditPDF(){
  // PDF simples (texto) com sumário + eventos + trilha (paginação básica)
  const PW=595, PH=842, M=36;
  const enc=new TextEncoder();
  const parts=[ enc.encode('%PDF-1.4\n') ];
  const xref=[0]; let objNo=0;
  const off=()=>parts.reduce((a,b)=>a+b.length,0);
  const addObj=(body)=>{ objNo++; xref.push(off()); parts.push(enc.encode(`${objNo} 0 obj\n${body}\nendobj\n`)); return objNo; };
  const addStream=(dict,bin)=>{ objNo++; xref.push(off()); const head=`${objNo} 0 obj\n${dict.replace('>>','')} /Length ${bin.length} >>\nstream\n`; parts.push(enc.encode(head)); parts.push(bin); parts.push(enc.encode(`\nendstream\nendobj\n`)); return objNo; };

  function pageContent(lines){
    // escreve linhas em 12–14pt monoespaçado simples
    const sz=12, lh=14;
    let y=PH-M-10;
    let txt='BT /F1 '+sz+' Tf\n';
    lines.forEach(L=>{
      if(y<M+40){ txt+='ET'; cnts.push(addStream('<< >>', enc.encode(txt))); pages.push(addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /Font << /F1 3 0 R >> >> /Contents ${cnts.at(-1)} 0 R >>`)); txt='BT /F1 '+sz+' Tf\n'; y=PH-M-10; }
      txt+=`${M} ${y} Td (${L.replace(/[()\\]/g, m=>'\\'+m)}) Tj\n`;
      y-=lh;
    });
    txt+='ET';
    return txt;
  }

  // Font (Base14: Helvetica = substituída por /Helvetica)
  const fontNum=addObj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');

  const pages=[], cnts=[];
  const header = [
    `RELATÓRIO DE AUDITORIA – Sessão ${sess.id||'—'}`,
    `Operador: ${sess.meta.operador||'—'} • Equipe: ${sess.meta.equipe||'—'} • Veículo: ${sess.meta.veiculo||'—'}`,
    `Concessão: ${sess.meta.concessao||'—'} • Trecho: ${sess.meta.trecho||'—'} • Pista: ${sess.meta.pista||'—'} • Finalidade: ${sess.meta.finalidade||'—'}`,
    `Início: ${sess.startedAt? new Date(sess.startedAt).toLocaleString(): '—'} • Fim: ${sess.stoppedAt? new Date(sess.stoppedAt).toLocaleString(): '—'}`,
    `Eventos: ${sess.events.length} • Trilha GPS: ${sess.track.length} pontos`,
    sess.meta.obs? `Obs: ${sess.meta.obs}` : ''
  ].filter(Boolean);

  let textLines = [];
  textLines.push(...header, '', 'EVENTOS (ordem cronológica):', 'tipo | timestamp | KM | lat | lon | acc | nota');
  if(sess.events.length===0) textLines.push('(sem eventos)');
  else sess.events.forEach(e=>{
    textLines.push(`${e.type} | ${new Date(e.t).toISOString()} | ${e.km??''} | ${e.lat?.toFixed?.(6)??''} | ${e.lon?.toFixed?.(6)??''} | ${Math.round(e.acc??0)} | ${e.note||''}`);
  });

  textLines.push('', 'TRILHA GPS (amostragem 1 Hz):', 'timestamp | KM | lat | lon | acc');
  if(sess.track.length===0) textLines.push('(sem pontos)');
  else sess.track.forEach(p=>{
    textLines.push(`${new Date(p.t).toISOString()} | ${p.km??''} | ${p.lat?.toFixed?.(6)??''} | ${p.lon?.toFixed?.(6)??''} | ${Math.round(p.acc??0)}`);
  });

  // Paginação
  const content = pageContent(textLines);
  const contNum=addStream('<< >>', enc.encode(content));
  const pageNum=addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /Font << /F1 ${fontNum} 0 R >> >> /Contents ${contNum} 0 R >>`);
  pages.push(pageNum);

  const pagesNum=addObj(`<< /Type /Pages /Kids [ ${pages.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pages.length} >>`);
  const catalogNum=addObj(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`);
  const sx=off(); let xr=`xref\n0 ${xref.length}\n0000000000 65535 f \n`;
  for(let i=1;i<xref.length;i++){ xr+=String(xref[i]).padStart(10,'0')+' 00000 n \n'; }
  parts.push(enc.encode(xr));
  parts.push(enc.encode(`trailer\n<< /Size ${xref.length} /Root ${catalogNum} 0 R >>\nstartxref\n${sx}\n%%EOF`));
  return new Blob(parts,{type:'application/pdf'});
}

async function auditExportAuto(){
  // Gera JSON/CSV
  const jsonObj=sessionToJSON();
  const jsonBlob=new Blob([JSON.stringify(jsonObj,null,2)],{type:'application/json'});
  const csvBlob=new Blob([sessionToCSV()],{type:'text/csv;charset=utf-8'});

  // SHA‑256 do vídeo e do JSON
  if(sess.media.videoBlob){
    sess.media.videoSha256 = await sha256Hex(sess.media.videoBlob);
  }
  sess.media.jsonSha256 = await sha256Hex(jsonBlob);
  const shaTxt = [
    `# SHA-256 checksums`,
    `video  ${sess.media.videoName || '(no-video)'}  ${sess.media.videoSha256 || '-'}`,
    `json   AUDITORIA_${sess.id}.json  ${sess.media.jsonSha256}`
  ].join('\n');
  const shaBlob=new Blob([shaTxt],{type:'text/plain'});

  // PDF
  const pdfBlob = await makeAuditPDF();

  // Downloads
  const sid = sess.id || 'S';
  saveAs(jsonBlob, `AUDITORIA_${sid}.json`);
  saveAs(csvBlob , `AUDITORIA_${sid}.csv`);
  saveAs(shaBlob , `AUDITORIA_${sid}.sha256`);
  saveAs(pdfBlob , `RELATORIO_AUDITORIA_${sid}.pdf`);

  // Habilita export no painel
  $('#btnExport').disabled=false;
  sessionOpenPanel(true);
}
$('#btnExport').onclick=()=>auditExportAuto();

/* ========= Loop HUD ========= */
function ready(){ return csvReady && camReady && gpsReady; }
function hudLoopTick(){
  setOv(ready()? 'Toque=Foto · DuploToque=Gravar · Pinça=Zoom · LongPress=Evento · 3Toques=Painel' : 'Aguardando CSV/Câmera/GPS…', true);
  requestAnimationFrame(hudLoopTick);
}

/* ========= Boot ========= */
async function boot(){
  setOv('Carregando CSV, câmera e GPS…', true);
  await loadCSVs();
  await enumerateCameras();
  await startCamera(deviceIndex);
  startGPS();
  db=await openDB();

  // layout
  const r=wrapEl.getBoundingClientRect();
  hud.width=r.width*devicePixelRatio; hud.height=r.height*devicePixelRatio; hud.style.width=`${r.width}px`; hud.style.height=`${r.height}px`;

  // loops
  loop();
  hudLoopTick();
}
