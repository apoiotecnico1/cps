<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rodovia Visualização</title>
<style>
:root{
  --bg:#0b1020; --surface:#101830; --fg:#e6ebff;
  --accent:#ff6b35; --ok:#22c55e; --err:#ef4444;
}
body, html{margin:0;padding:0;height:100%;background:var(--bg);font-family:system-ui;overflow-y:auto;}
.app{position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
video#vid{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:0;}
canvas.hud{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
#hudInfo{
  position:absolute;top:16px;left:16px;color:var(--accent);font-size:16px;font-weight:900;text-shadow:0 0 4px #000;
  background:rgba(0,0,0,0.5);padding:8px;border-radius:12px;z-index:2;
  display:flex;flex-direction:column;gap:4px;
}
#hudInfo div{margin:0;}
#timestamp{color:#fff;font-size:14px;text-shadow:0 0 4px #000;}
.controls, .cameraControls{
  position:fixed;bottom:12px;width:100%;display:flex;justify-content:center;gap:8px;z-index:10;flex-wrap:wrap;
}
button{
  flex:1 1 60px;
  height:60px;
  border-radius:4px;
  border:2px solid #000;
  font-size:20px;
  font-weight:bold;
  color:#000;
  background:#fff;
  box-shadow:2px 2px 6px rgba(0,0,0,0.3);
  text-align:center;
}
button#rec { background:#ff0000;color:#fff; }
button#stop { background:#000;color:#fff; }
button#photo { background:#ffd700;color:#000; }
button#pdfSend { background:#1e90ff;color:#fff; }
button#zoomIn, button#zoomOut, button#focus { background:#eee;color:#000; }

.photoGallery{
  margin-top:100vh;
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  padding:8px;
  justify-content:center;
}
.photoGallery img{
  width:120px;
  height:auto;
  border:2px solid #000;
}
</style>
</head>
<body>
<div class="app">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="hud" class="hud"></canvas>
  <div id="hudInfo">
    <div id="kmid">KM —</div>
    <div id="closestIDs">IDs próximos: —</div>
    <div id="timestamp">Data/Hora</div>
  </div>

  <div class="controls">
    <button id="photo">📷 Foto</button>
    <button id="rec">⏺ Gravar</button>
    <button id="stop">⏹ Parar</button>
    <button id="pdfSend">📄 PDF/WhatsApp</button>
  </div>

  <div class="cameraControls">
    <button id="zoomIn">🔍 +</button>
    <button id="zoomOut">🔍 -</button>
    <button id="focus">🎯 Focar</button>
  </div>

  <div class="photoGallery" id="photoGallery"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const vid=document.getElementById("vid");
const hud=document.getElementById("hud");
const ctx=hud.getContext("2d");
const photoBtn=document.getElementById("photo");
const recBtn=document.getElementById("rec");
const stopBtn=document.getElementById("stop");
const pdfBtn=document.getElementById("pdfSend");
const kmidEl=document.getElementById("kmid");
const closestEl=document.getElementById("closestIDs");
const tsEl=document.getElementById("timestamp");
const photoGallery=document.getElementById("photoGallery");

let lastPos={lat:0,lon:0};
let gpsReady=false;
let camReady=false;
let isRecording=false;
let mediaRecorder=null;
let recordedChunks=[];
let overlayCanvas, overlayCtx;
let photoCollection=[];
let zoomLevel = 1;

/* ================= GPS ================= */
navigator.geolocation.watchPosition(p=>{ lastPos=p.coords; gpsReady=true; updateHUDInfo(); },()=>{}, {enableHighAccuracy:true});

/* ================= Câmera ================= */
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
    vid.srcObject=stream;
    await new Promise(r=>{ if(vid.readyState>=1) r(); else vid.onloadedmetadata=r; });
    camReady=true;
  }catch(e){ camReady=false; console.error(e); }
}

/* ================= HUD ================= */
function calcularKM(lat, lon){ let kmBase = 100; return `KM ${kmBase + Math.floor((lat+lon)*10)}`; }
function calcularID(lat, lon){ return `ID_${Math.floor(lat*1000 + lon*1000)}`; }
function gerarIDsProximos(lat, lon){ let ids=[]; for(let i=-2;i<=2;i++){ if(i===0) continue; const dLat = lat + i*0.0001; const dLon = lon + i*0.0001; ids.push(calcularID(dLat,dLon)); } return ids.join(', '); }

function updateHUDInfo(){
  let km="KM —", closest="—";
  if(gpsReady){
    km = calcularKM(lastPos.latitude,lastPos.longitude);
    closest = gerarIDsProximos(lastPos.latitude,lastPos.longitude);
  }
  kmidEl.textContent=km;
  closestEl.textContent="IDs próximos: "+closest;
  tsEl.textContent=new Date().toLocaleString();
}

function drawHUD(){
  hud.width=hud.clientWidth*devicePixelRatio;
  hud.height=hud.clientHeight*devicePixelRatio;
  const W=hud.width,H=hud.height;
  ctx.clearRect(0,0,W,H);

  if(isRecording){
    ctx.beginPath();
    ctx.arc(W-40,H-40,16,0,Math.PI*2);
    ctx.fillStyle='#ef4444';
    ctx.fill();
    ctx.font=`16px system-ui`;
    ctx.fillStyle='#fff';
    ctx.fillText('REC', W-60,H-35);
  }
  requestAnimationFrame(drawHUD);
}

/* ================= Fotos ================= */
function capture(){
  if(!camReady) return;
  const c=document.createElement('canvas'); 
  c.width=vid.videoWidth; 
  c.height=vid.videoHeight;
  const x=c.getContext('2d'); 
  x.drawImage(vid,0,0,c.width,c.height); // captura direto do vídeo ao vivo
  x.fillStyle="#000"; 
  x.font="48px system-ui"; 
  x.fillText(kmidEl.textContent,20,60);
  x.fillStyle="#000"; 
  x.font="32px system-ui"; 
  x.fillText(tsEl.textContent,20,110);
  const dataUrl = c.toDataURL('image/jpeg');
  photoCollection.push(dataUrl);

  const imgEl = document.createElement('img'); 
  imgEl.src = dataUrl;
  photoGallery.appendChild(imgEl);
}

/* ================= Gravação ================= */
function startRecording(){
  if(isRecording || !camReady) return;
  overlayCanvas=document.createElement('canvas');
  overlayCanvas.width=vid.videoWidth; 
  overlayCanvas.height=vid.videoHeight;
  overlayCtx=overlayCanvas.getContext('2d');
  const drawLoop=()=>{
    if(!isRecording) return;
    overlayCtx.drawImage(vid,0,0,overlayCanvas.width,overlayCanvas.height);
    overlayCtx.fillStyle="#ff6b35"; overlayCtx.font="48px system-ui";
    overlayCtx.fillText(kmidEl.textContent,20,60);
    overlayCtx.fillStyle="#fff"; overlayCtx.font="32px system-ui";
    overlayCtx.fillText(tsEl.textContent,20,110);
    requestAnimationFrame(drawLoop);
  };
  drawLoop();
  const stream=overlayCanvas.captureStream(24);
  mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp8,opus'});
  recordedChunks=[];
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.start(10000);
  isRecording=true;
}

function stopRecording(){
  if(!isRecording) return;
  mediaRecorder.stop();
  isRecording=false;
  setTimeout(downloadVideo,500);
}

function downloadVideo(){
  if(recordedChunks.length===0) return;
  const blob=new Blob(recordedChunks,{type:'video/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='video_rodovia.webm'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

/* ================= PDF Relatório ================= */
async function generatePDF(){
  if(photoCollection.length===0) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text("Relatório de Rodovia", 14, 20);
  let y = 30;
  for(let i=0;i<photoCollection.length;i++){
    const img = new Image();
    img.src = photoCollection[i];
    await new Promise(r=>{img.onload=r;});
    const imgWidth = 180;
    const ratio = img.width / img.height;
    const imgHeight = imgWidth / ratio;
    if(y + imgHeight > 280){ doc.addPage(); y=20; }
    doc.setFontSize(12); doc.text(`Foto ${i+1} - ${new Date().toLocaleString()}`,14,y-2);
    doc.addImage(img, 'JPEG', 14, y, imgWidth, imgHeight);
    y += imgHeight + 10;
  }
  return doc;
}

async function sendPDFWhatsApp(){
  const doc = await generatePDF();
  if(!doc) return;
  const pdfBlob = doc.output('blob');
  const pdfURL = URL.createObjectURL(pdfBlob);
  const a=document.createElement('a'); a.href=pdfURL; a.download='relatorio_rodovia.pdf'; a.click();
  photoCollection=[];
  photoGallery.innerHTML='';
}

/* ================= Zoom / Foco ================= */
document.getElementById('zoomIn').onclick = ()=>{
  zoomLevel = Math.min(zoomLevel + 0.1, 3);
  vid.style.transform = `scale(${zoomLevel})`;
};
document.getElementById('zoomOut').onclick = ()=>{
  zoomLevel = Math.max(zoomLevel - 0.1, 1);
  vid.style.transform = `scale(${zoomLevel})`;
};
document.getElementById('focus').onclick = ()=>{
  alert("Foco manual ativado! (simulação)");
};

/* ================= Eventos ================= */
photoBtn.onclick=capture;
recBtn.onclick=startRecording;
stopBtn.onclick=stopRecording;
pdfBtn.onclick=sendPDFWhatsApp;

/* ================= Inicialização ================= */
async function boot(){ await startCamera(); drawHUD(); updateHUDInfo(); setInterval(updateHUDInfo,1000);}
boot();
</script>
</body>
</html>
