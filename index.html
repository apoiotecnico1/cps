<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inspeção Noturna Inteligente - Versão Completa</title>
<style>
  :root{
    --bg:#0b1020; --surface:#101830; --fg:#e6ebff;
    --accent:#ff6b35; --ok:#22c55e; --err:#ef4444;
  }
  body, html{margin:0;padding:0;height:100%;background:#000;font-family:system-ui;}
  .app{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000;}
  canvas.hud{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .controls{position:absolute;bottom:16px;width:100%;display:flex;justify-content:center;gap:12px;z-index:10;flex-wrap:wrap;}
  button{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;color:white;background:rgba(0,0,0,.7);box-shadow:0 4px 10px rgba(0,0,0,.4);}
  #rec{background:#ef4444;} #stop{background:#374151;} #photo{background:#22c55e;} #mark{background:#f97316;}
  #download, #pdfSend{width:auto;padding:0 12px;font-size:16px;border-radius:12px;}
</style>
</head>
<body>
<div class="app">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="hud" class="hud"></canvas>
  <div class="controls">
    <button id="photo">📷</button>
    <button id="rec">⏺</button>
    <button id="stop">⏹</button>
    <button id="mark">⚠</button>
    <button id="download">⬇ Vídeo</button>
    <button id="pdfSend">📄 WhatsApp</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const vid=document.getElementById("vid");
const hud=document.getElementById("hud");
const ctx=hud.getContext("2d");

const photoBtn=document.getElementById("photo");
const recBtn=document.getElementById("rec");
const stopBtn=document.getElementById("stop");
const markBtn=document.getElementById("mark");
const downloadBtn=document.getElementById("download");
const pdfBtn=document.getElementById("pdfSend");

let dataset=[], kmPoints=[];
let lastPos=null;
let gpsReady=false;
let camReady=false;
let csvReady=false;
let isRecording=false;
let mediaRecorder=null;
let recordedChunks=[];
let currentStream=null;
let currentTrack=null;
let overlayCanvas, overlayCtx;
let photoCollection=[];

/* ================= CSV ================= */
async function loadCSV(path,idCol='id',latCol='lat',lonCol='lon'){
  const txt=await fetch(path).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(l=>l.replace(/^\uFEFF/,'').trim()).filter(Boolean);
  const head=lines[0].split(';').map(h=>h.toLowerCase());
  const iId=head.findIndex(h=>h.includes(idCol) && !h.includes('lat') && !h.includes('lon'));
  const iLat=head.findIndex(h=>h.includes(latCol));
  const iLon=head.findIndex(h=>h.includes(lonCol));
  const arr=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(';');
    const id=String(c[iId]||'').trim(), lat=parseFloat(c[iLat]), lon=parseFloat(c[iLon]);
    if(!id || !isFinite(lat) || !isFinite(lon)) continue;
    arr.push({id,lat,lon});
  }
  return arr;
}
async function loadCSVs(){
  dataset=await loadCSV('./Dados_Completos_Grupo_2_all.csv');
  kmPoints=await loadCSV('./SNVBR116SPRJ.csv','km','lat','lon');
  csvReady=dataset.length>0 && kmPoints.length>0;
}

/* ================= GPS ================= */
navigator.geolocation.watchPosition(p=>{ lastPos=p.coords; gpsReady=true; });

/* ================= Câmera ================= */
async function startCamera(){
  try{
    if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
    currentStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
    vid.srcObject=currentStream;
    await new Promise(r=>{ if(vid.readyState>=1) r(); else vid.onloadedmetadata=r; });
    currentTrack=currentStream.getVideoTracks()[0];
    camReady=true;
  }catch(e){ camReady=false; console.error(e); }
}

/* ================= HUD e funções ================= */
function fmtKm(v){ let K=Math.floor(v),m=Math.round((v-K)*1000); return `KM ${K}+${String(m).padStart(3,'0')}`; }
function hav(a,b,c,d){const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));}
function nearestN(lat,lon,n=5){return dataset.map(p=>({id:p.id,d:hav(lat,lon,p.lat,p.lon)})).sort((a,b)=>a.d-b.d).slice(0,n);}
function nearestKM(lat,lon){if(!kmPoints.length) return null; let best=null,bd=Infinity; for(const p of kmPoints){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;bd=d;} } return best;}

/* ================= IA - Lâmpadas apagadas ================= */
function detectDarkAreas(){
  if(!vid.videoWidth || !vid.videoHeight) return [];
  const tmp=document.createElement('canvas'); tmp.width=vid.videoWidth; tmp.height=vid.videoHeight;
  const ctx2=tmp.getContext('2d'); ctx2.drawImage(vid,0,0,tmp.width,tmp.height);
  const data=ctx2.getImageData(0,0,tmp.width,tmp.height).data;
  const dark=[]; const step=16;
  for(let y=0;y<tmp.height;y+=step){
    for(let x=0;x<tmp.width;x+=step){
      const i=(y*tmp.width+x)*4;
      const brightness=(data[i]+data[i+1]+data[i+2])/3;
      if(brightness<40) dark.push({x,y});
    }
  }
  return dark;
}

/* ================= HUD Draw ================= */
function drawHUD(){
  hud.width=hud.clientWidth*devicePixelRatio;
  hud.height=hud.clientHeight*devicePixelRatio;
  const W=hud.width,H=hud.height;
  ctx.clearRect(0,0,W,H);

  const band=Math.max(144*devicePixelRatio,H*0.16);
  ctx.fillStyle='rgba(0,0,0,.58)'; ctx.fillRect(0,H-band,W,band);

  // KM
  let kmStr='KM —'; if(lastPos && csvReady){ const k=nearestKM(lastPos.latitude,lastPos.longitude); kmStr=k?fmtKm(k.km):kmStr; }
  ctx.fillStyle='#ff6b35'; ctx.font=`900 ${H*0.055}px Arial`; ctx.textAlign='left';
  ctx.fillText(kmStr,24*devicePixelRatio,H-band+Math.round(band*0.52));

  // IDs
  let ids=[]; if(lastPos && csvReady) ids=nearestN(lastPos.latitude,lastPos.longitude,5);
  ctx.fillStyle='#e6ebff'; ctx.font=`600 ${H*0.028}px Arial`; ctx.textAlign='right';
  ids.forEach((e,i)=>ctx.fillText(e.id,W-24*devicePixelRatio,H-band+28*devicePixelRatio+i*26*devicePixelRatio));

  // timestamp
  ctx.fillStyle='#fff'; ctx.font=`700 ${H*0.032}px Arial`; ctx.textAlign='left';
  ctx.fillText(new Date().toLocaleString(),24*devicePixelRatio,H-Math.round(band*0.22));

  // IA: pontos escuros
  const dark=detectDarkAreas();
  ctx.fillStyle='rgba(239,68,68,0.6)';
  dark.forEach(p=>ctx.fillRect(p.x*W/vid.videoWidth,p.y*H/vid.videoHeight,12,12));

  // REC
  if(isRecording){ const r=10*devicePixelRatio; ctx.beginPath(); ctx.arc(W-24*devicePixelRatio-r,24*devicePixelRatio+r,r,0,Math.PI*2); ctx.fillStyle='#ef4444'; ctx.fill(); ctx.font=`700 ${H*0.024}px Arial`; ctx.fillText('REC', W-44*devicePixelRatio,H*0.05*H); }

  requestAnimationFrame(drawHUD);
}

/* ================= Fotos ================= */
function capture(){
  if(!vid.videoWidth || !vid.videoHeight) return;
  const c=document.createElement('canvas'); c.width=vid.videoWidth; c.height=vid.videoHeight;
  const x=c.getContext('2d'); x.drawImage(vid,0,0,c.width,c.height); x.drawImage(hud,0,0,c.width,c.height);
  const url=c.toDataURL('image/jpeg');
  photoCollection.push(url);
  const a=document.createElement('a'); a.href=url; a.download='foto_inspecao.jpg'; a.click();
}

/* ================= Gravação Segmentada ================= */
function startRecording(){
  if(isRecording) return;
  overlayCanvas=document.createElement('canvas'); overlayCanvas.width=vid.videoWidth; overlayCanvas.height=vid.videoHeight;
  overlayCtx=overlayCanvas.getContext('2d');
  const drawLoop=()=>{ if(!isRecording) return; overlayCtx.drawImage(vid,0,0,overlayCanvas.width,overlayCanvas.height); overlayCtx.drawImage(hud,0,0,overlayCanvas.width,overlayCanvas.height); requestAnimationFrame(drawLoop); }; drawLoop();
  const stream=overlayCanvas.captureStream(24);
  mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp8,opus'});
  recordedChunks=[];
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop=()=>{ console.log("Gravação finalizada."); };
  mediaRecorder.start(10000); // segmenta a cada 10s para reduzir peso
  isRecording=true;
}
function stopRecording(){
  if(!isRecording) return; mediaRecorder.stop(); isRecording=false;
}
function downloadVideo(){
  if(recordedChunks.length===0) return alert("Nenhum vídeo gravado!");
  const blob=new Blob(recordedChunks,{type:'video/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='video_inspecao.webm'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

/* ================= PDF Relatório ================= */
async function generatePDF(){
  if(photoCollection.length===0) return alert("Nenhuma foto capturada!");
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text("Relatório de Inspeção Noturna", 14, 20);
  photoCollection.forEach((p,i)=>{
    const y=30 + (i*60);
    doc.setFontSize(12); doc.text(`Foto ${i+1} - ${new Date().toLocaleString()}`,14,y-2);
    doc.addImage(p,'JPEG',14,y,180,50);
  });
  return doc.output('blob');
}
function sendPDFWhatsApp(){
  generatePDF().then(blob=>{
    const fileURL = URL.createObjectURL(blob);
    const waURL = `https://api.whatsapp.com/send?text=Relatório de inspeção&attachment=${fileURL}`;
    window.open(waURL,'_blank');
  });
}

/* ================= Eventos ================= */
photoBtn.onclick=capture;
recBtn.onclick=startRecording;
stopBtn.onclick=stopRecording;
markBtn.onclick=()=>navigator.vibrate?.(200);
downloadBtn.onclick=downloadVideo;
pdfBtn.onclick=sendPDFWhatsApp;

/* ================= Inicialização ================= */
async function boot(){ await loadCSVs(); await startCamera(); drawHUD(); }
boot();
</script>
</body>
</html>
