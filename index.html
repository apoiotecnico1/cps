<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ID GPS · Inspeção com Vídeo</title>
<meta name="theme-color" content="#0b1020" />
<style>
  :root{
    --brand:#5a64ff; --brand2:#00c2c9; --bg:#0b1020; --bg-2:#0f1630; --fg:#e6ebff; --muted:#a3b1d1; --border:#1e2647; --surface:#0f1630; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --btn:#22c55e; --focus:#82a0ff; --shadow:0 12px 28px rgba(2,6,23,.55); --radius:14px; --pill:#0c1f17;
    --km-bg:#ffffff; --km-fg:#0b1020; --km-border:#1e3a8a; --km-band:#1e3a8a;
    --info-bg:#0f1630; --info-border:#1e2647; --info-fg:#cdd7f5; --info-icon:#93c5fd; --info-accent:#60a5fa;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(1200px 1200px at 20% -20%, #111b3f 0%, transparent 50%) no-repeat,linear-gradient(180deg, #0b1020 0%, #0a0e1b 100%);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;line-height:1.35;-webkit-font-smoothing:antialiased}
  header{background:linear-gradient(90deg,var(--brand),var(--brand2));padding:16px 16px;box-shadow:var(--shadow)}
  .brand{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .dot-logo{width:12px;height:12px;border-radius:50%;background:#fff;opacity:.95}
  .brand h1{margin:0;font-weight:1000;letter-spacing:.06em;color:#0b1020;font-size:clamp(1rem,1.9vw,1.15rem)}

  #status{max-width:1100px;margin:14px auto 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:0 16px}
  .chip,.badge{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);background:#0c1532;color:var(--muted);padding:10px 12px;border-radius:999px;font-weight:800;box-shadow:var(--shadow)}
  .dot{width:10px;height:10px;border-radius:50%}
  .ok .dot{background:var(--ok)}.ok{color:#bbf7d0}
  .warn .dot{background:var(--warn)}.warn{color:#ffe7b0}
  .bad .dot{background:var(--bad)}.bad{color:#fecaca}
  .badge{color:#c7d2fe}

  main{max-width:1100px;margin:14px auto 28px;display:grid;gap:16px;padding:0 16px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.35)}
  .card h2{margin:0 0 12px 0;font-size:clamp(1.05rem,1.8vw,1.1rem);color:#e7ecff}
  .actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{padding:14px 18px;font-size:clamp(.95rem,1.6vw,1.02rem);font-weight:900;border:0;border-radius:12px;color:#0b1020;cursor:pointer;transition:transform .08s ease, filter .15s ease;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  button:active{transform:translateY(1px)}button:hover{filter:brightness(1.06)}button:disabled{opacity:.55;cursor:not-allowed;filter:none}
  #btnSend{background:var(--btn)}
  .opt{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.95rem}
  .opt input[type="checkbox"]{width:16px;height:16px;accent-color:var(--brand)}
  .opt select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#0a122a;color:#e6ebff;font-weight:800;cursor:pointer}

  ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
  li{line-height:1.3;font-family:ui-monospace,Consolas,Menlo,monospace;border:1px solid var(--border);border-radius:12px;padding:12px;background:#0b1433;font-size:1.03rem;color:#edf2ff;display:flex;justify-content:space-between;gap:12px;align-items:center;transition:box-shadow .15s ease,border-color .15s ease, background .15s ease}
  li.nearest{border-color:var(--btn);box-shadow:0 0 0 3px rgba(22,163,74,.2) inset;background:linear-gradient(0deg, rgba(22,163,74,.12), rgba(22,163,74,.02))}
  li.nearest .id-badge{display:inline-flex;align-items:center;gap:8px;background:var(--pill);padding:4px 10px;border-radius:999px;outline:1px solid rgba(34,197,94,.3)}
  li.nearest .id-badge .id-label{font-weight:1000;letter-spacing:.02em;color:#b6ffce;font-size:1.08rem}
  .id-label{font-weight:800}
  .dist{color:#9fb0d9;opacity:.85;font-size:.78rem;min-width:64px;text-align:right}
  .skeleton{height:48px;border-radius:12px;background:linear-gradient(90deg,#111a3a 25%,#0d1836 40%,#111a3a 60%);background-size:200% 100%;animation:shimmer 1.1s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .col-4{grid-column:span 4}.col-8{grid-column:span 8}
  @media (max-width:900px){.col-4,.col-8{grid-column:1/-1}}
  button:focus-visible, select:focus-visible{outline:3px solid var(--focus);outline-offset:2px}

  /* KM placa */
  .km-sign{margin-left:auto;display:inline-flex;align-items:stretch;gap:0;background:var(--km-bg);color:var(--km-fg);border:4px solid var(--km-border);border-radius:10px;box-shadow:0 10px 24px rgba(0,0,0,.35);overflow:hidden}
  .km-band{background:var(--km-band);color:#eaf2ff;width:auto;min-width:18px;padding:6px 10px;display:flex;align-items:center;justify-content:center}
  .km-body{padding:6px 14px 8px;display:flex;align-items:center;gap:10px;background:var(--km-bg)}
  .km-body-col{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .km-row{display:flex;align-items:baseline;gap:10px}
  .km-label{font-family:"Roboto Condensed","Arial Narrow","Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:.06em;font-size:clamp(1rem,1.6vw,1.1rem);opacity:.85}
  .km-value{font-family:"Roboto Condensed","Arial Narrow","Segoe UI",Arial,sans-serif;font-weight:1000;letter-spacing:.02em;font-size:clamp(1.6rem,3.6vw,2.4rem);line-height:1;color:var(--km-fg);min-width:4ch;text-align:right}
  .km-subnote{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;font-size:.62rem;line-height:1.1;color:#6f84b8;opacity:.85;text-align:right;max-width:22ch;white-space:normal}
  @media (max-width:480px){.km-body{padding:6px 10px 8px}.km-value{font-size:clamp(1.5rem,6vw,2rem)}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="dot-logo"></span>
    <h1>ID GPS</h1>
    <div id="kmChip" class="km-sign" aria-live="polite">
      <div class="km-band"></div>
      <div class="km-body">
        <div class="km-row">
          <span class="km-label">KM</span>
          <span id="kmValue" class="km-value">—</span>
        </div>
        <div class="km-body-col" style="margin-left:auto">
          <span class="km-subnote">Marco quilométrico mais próximo em linha reta.</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div id="status" role="region" aria-label="Status do sistema">
  <div id="gpsChip" class="chip bad" aria-live="polite">
    <span class="dot"></span><span id="gpsText">GPS: aguardando…</span>
  </div>
  <div id="diag" class="badge" style="display:none" aria-live="polite">—</div>
</div>

<main>
  <div class="grid">
    <section class="card col-4" aria-label="Ações">
      <h2>Ações</h2>
      <div class="actions" style="margin-bottom:8px">
        <button id="btnSend" disabled>Enviar ID por WhatsApp</button>
      </div>
      <div class="actions" style="gap:16px; margin-bottom:8px;">
        <label class="opt" title="Quantidade de IDs a enviar"><span style="opacity:.9">quantidade</span>
          <select id="qty">
            <option value="1">1</option>
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
        <label class="opt"><input type="checkbox" id="chkMaps" /><span>incluir links de mapa</span></label>
      </div>
      <div class="actions" style="gap:12px;">
        <button id="btnStartRec">▶ Gravar Tela</button>
        <button id="btnStopRec" disabled>■ Parar Gravação</button>
      </div>
    </section>

    <section class="card col-8" aria-label="IDs mais próximos">
      <h2>IDs próximos</h2>
      <ul id="list" aria-live="polite">
        <li class="skeleton"></li><li class="skeleton"></li><li class="skeleton"></li>
        <li class="skeleton"></li><li class="skeleton"></li>
      </ul>
    </section>
  </div>
</main>

<script>
// ======================== GPS, CSV, IDs ========================
const ACC_GREEN=10, ACC_YELLOW=25;
let dataset=[], lastPos=null, lastRender=0;
const gpsChip=document.getElementById('gpsChip');
const gpsText=document.getElementById('gpsText');
const diag=document.getElementById('diag');
const btnSend=document.getElementById('btnSend');
const chkMaps=document.getElementById('chkMaps');
const qtySel=document.getElementById('qty');
const listEl=document.getElementById('list');
const kmValue=document.getElementById('kmValue');

function showDiag(msg){ diag.style.display='inline-flex'; diag.textContent=msg; }
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }
function nearestN(lat,lon,n=10){ if(!dataset.length) return []; const arr=dataset.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0, Math.min(n,arr.length)); }
function fmtAcc(a){ return (a==null||!Number.isFinite(a))?'—':('±'+Math.round(a)+' m'); }
function fmtDistMeters(m){ if(!(Number.isFinite(m))) return '—'; return Math.round(m) + ' m'; }
function nowBR(){ return new Date().toLocaleString('pt-BR'); }

function updateGpsChip(){
  if(!lastPos || lastPos.acc==null){ gpsChip.className='chip bad'; gpsText.textContent='GPS: buscando…'; return; }
  const a=Math.round(lastPos.acc);
  if(a<=ACC_GREEN){ gpsChip.className='chip ok'; gpsText.textContent=`GPS: OK (${fmtAcc(a)})`; }
  else if(a<=ACC_YELLOW){ gpsChip.className='chip warn'; gpsText.textContent=`GPS: ajustando (${fmtAcc(a)})`; }
  else { gpsChip.className='chip bad'; gpsText.textContent=`GPS: fraco (${fmtAcc(a)})`; }
}

function updateButtons(){ const baseOk=dataset.length>0, posOk=!!lastPos; btnSend.disabled=!(baseOk && posOk); }

async function loadCSV(){
  try{
    let resp=await fetch('dados.csv?v='+Date.now(), {cache:'no-store'});
    if(!resp.ok){ showDiag('❌ CSV não encontrado'); return; }
    let text=await resp.text();
    if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
    const lines=text.split(/\r?\n/).filter(l=>l.trim()!=='');
    if(lines.length<2){ showDiag('❌ CSV vazio'); return; }
    const head=lines.shift().split(';');
    const iId=head.findIndex(h=>['id','idnox','id do nox'].includes(h.toLowerCase()));
    const iLat=head.findIndex(h=>['latitude','lat'].includes(h.toLowerCase()));
    const iLon=head.findIndex(h=>['longitude','lon','long'].includes(h.toLowerCase()));
    if(iId<0||iLat<0||iLon<0){ showDiag('❌ Cabeçalho inválido'); return; }
    dataset=lines.map(l=>{ const r=l.split(';'); return {id:String(r[iId]||'').trim(), lat:parsePt(r[iLat]), lon:parsePt(r[iLon])}; })
                 .filter(p=>p.id && Number.isFinite(p.lat)&&Number.isFinite(p.lon));
    if(!dataset.length){ showDiag('❌ Sem pontos válidos'); return; }
    render(true); updateButtons();
  }catch(e){ showDiag('❌ Erro ao carregar CSV'); }
}

function render(force=false){
  const now=performance.now(); if(!force && now-lastRender<150) return; lastRender=now;
  listEl.innerHTML=''; if(!lastPos||!dataset.length) return;
  const qty = Number(qtySel.value || 10);
  const items=nearestN(lastPos.lat,lastPos.lon,qty);
  if(!items.length){ listEl.innerHTML='<li>—</li>'; return; }
  const frag=document.createDocumentFragment();
  items.forEach((o,idx)=>{
    const li=document.createElement('li');
    const left = document.createElement('span');
    const idSpan = document.createElement('span');
    idSpan.className='id-label'; idSpan.textContent=o.id;
    if(idx===0){
      li.classList.add('nearest');
      const pill=document.createElement('span'); pill.className='id-badge';
      const flag=document.createElement('span'); flag.className='flag'; flag.textContent='PRÓXIMO';
      pill.appendChild(idSpan); pill.appendChild(flag); left.appendChild(pill);
    }else{ left.appendChild(idSpan); }
    const right=document.createElement('span'); right.className='dist'; right.textContent = fmtDistMeters(o.d);
    li.appendChild(left); li.appendChild(right); frag.appendChild(li);
  });
  listEl.appendChild(frag);
}

function startGPS(){
  if(!('geolocation' in navigator)){ showDiag('❌ Sem geolocalização'); return; }
  navigator.geolocation.watchPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    updateGpsChip(); render(); updateButtons();
    kmValue.textContent = lastPos.lat.toFixed(6)+','+lastPos.lon.toFixed(6);
  }, e=>{ showDiag('❌ GPS erro '+e.message); }, {enableHighAccuracy:true, maximumAge:5000});
}

// ======================== GRAVAÇÃO DE TELA ========================
let mediaRecorder, recordedChunks=[];
const btnStartRec=document.getElementById('btnStartRec');
const btnStopRec=document.getElementById('btnStopRec');

async function startRecording(){
  try{
    const stream = await navigator.mediaDevices.getDisplayMedia({video:{cursor:'always'},audio:false});
    mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm; codecs=vp9'});
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      const blob=new Blob(recordedChunks,{type:'video/webm'});
      recordedChunks=[];
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url;
      a.download=`inspecao_${Date.now()}.webm`;
      a.click(); URL.revokeObjectURL(url);
    };
    mediaRecorder.start();
    console.log('Gravação iniciada');
  }catch(err){ console.error('Erro ao iniciar gravação:',err); }
}

function stopRecording(){
  if(mediaRecorder && mediaRecorder.state!=='inactive'){ mediaRecorder.stop(); console.log('Gravação parada'); }
}

btnStartRec.addEventListener('click',()=>{
  startRecording();
  btnStartRec.disabled=true;
  btnStopRec.disabled=false;
});
btnStopRec.addEventListener('click',()=>{
  stopRecording();
  btnStartRec.disabled=false;
  btnStopRec.disabled=true;
});

// ======================== INICIALIZAÇÃO ========================
loadCSV();
startGPS();

</script>
</body>
</html>
