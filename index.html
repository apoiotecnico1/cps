<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telemetria CSV</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; margin:0; padding:0;}
header { text-align:center; padding:10px; background:#222; font-weight:bold;}
#camera { width:100%; max-height:400px; background:#333;}
.panel { padding:10px;}
input,button { padding:8px; margin:2px; border-radius:4px; border:none;}
button { background:#4caf50; color:#000; cursor:pointer;}
#log { background:#000; padding:10px; height:200px; overflow-y:auto; font-size:12px; margin-top:10px;}
</style>
</head>
<body>
<header>Telemetria CSV</header>
<main>
<video id="camera" autoplay playsinline></video>
<div class="panel">
<input type="file" id="csvFile">
<input type="text" id="buscarId" placeholder="Buscar ID">
<button onclick="filtrar()">Buscar</button>
<div>Total Registros: <span id="total">0</span></div>
<div>KM Médio: <span id="kmMedio">0</span></div>
<div>Vel Média: <span id="velMedia">0</span></div>
<div>ID Ativo: <span id="idAtivo">--</span></div>
<div id="log"></div>
</div>
</main>
<script>
let dados = [];
document.getElementById("csvFile").addEventListener("change", e=>{
const file = e.target.files[0];
const reader = new FileReader();
reader.onload = evt => processarCSV(evt.target.result);
reader.readAsText(file);
});
function processarCSV(texto){
const linhas = texto.split("\n");
dados = linhas.slice(1).map(l=>{
const [id, km, vel] = l.split(",");
return {id:id, km:parseFloat(km), velocidade:parseFloat(vel)};
}).filter(d=>d.id);
analisar();
salvarCache();
}
function analisar(){
const total = dados.length;
const kmMedio = media(dados.map(d=>d.km));
const velMedia = media(dados.map(d=>d.velocidade));
document.getElementById("total").textContent = total;
document.getElementById("kmMedio").textContent = kmMedio.toFixed(1);
document.getElementById("velMedia").textContent = velMedia.toFixed(1);
log("Dados processados: "+total);
}
function media(arr){ return arr.reduce((a,b)=>a+b,0)/(arr.length||1);}
function filtrar(){
const idBusca = document.getElementById("buscarId").value;
const item = dados.find(d=>d.id==idBusca);
if(item){
document.getElementById("idAtivo").textContent=item.id;
log("ID encontrado: "+item.id+" | KM: "+item.km);
}else log("ID não encontrado");
}
function log(msg){
const el=document.getElementById("log");
el.innerHTML=msg+"<br>"+el.innerHTML;
}
function salvarCache(){
localStorage.setItem("telemetria", JSON.stringify(dados));
}
function carregarCache(){
const cache = localStorage.getItem("telemetria");
if(cache){
dados=JSON.parse(cache);
analisar();
log("Dados carregados do cache");
}}
carregarCache();
async function iniciarCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
document.getElementById("camera").srcObject=stream;
}catch(err){ log("Erro ao acessar câmera: "+err);}
}
iniciarCamera();
</script>
</body>
</html>
