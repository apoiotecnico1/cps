<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ID GPS · IDs Próximos</title>
<meta name="theme-color" content="#0b1020" />
<style>
  :root{
    /* Paleta DARK (anil/índigo com neutros profundos) */
    --brand:#5a64ff;     /* anil vivo para acentos/foco */
    --brand2:#00c2c9;    /* ciano/verde-água de apoio */
    --bg:#0b1020;        /* fundo principal */
    --bg-2:#0f1630;      /* superfície inferior */
    --fg:#e6ebff;        /* texto principal */
    --muted:#a3b1d1;     /* texto secundário */
    --border:#1e2647;    /* divisórias */
    --surface:#0f1630;   /* cartões */
    --ok:#22c55e;        /* estados de GPS */
    --warn:#f59e0b;
    --bad:#ef4444;
    --btn:#22c55e;       /* botão principal (Whats) */
    --focus:#82a0ff;     /* foco acessível */
    --shadow:0 12px 28px rgba(2,6,23,.55);
    --radius:14px;
    --pill:#0c1f17;      /* pill do mais próximo */
  }

  /* Reset & base */
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(1200px 1200px at 20% -20%, #111b3f 0%, transparent 50%) no-repeat,
      linear-gradient(180deg, #0b1020 0%, #0a0e1b 100%);
    color:var(--fg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    line-height:1.35; -webkit-font-smoothing:antialiased;
  }

  /* Header minimal — apenas “ID GPS” */
  header{
    background:linear-gradient(90deg,var(--brand),var(--brand2));
    padding:16px 16px; box-shadow:var(--shadow)
  }
  .brand{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .dot-logo{width:12px;height:12px;border-radius:50%;background:#fff;opacity:.95}
  .brand h1{
    margin:0;font-weight:1000;letter-spacing:.06em;color:#0b1020;
    font-size:clamp(1rem,1.9vw,1.15rem);
  }

  /* Status (GPS + diagnóstico) */
  #status{max-width:1100px;margin:14px auto 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:0 16px}
  .chip,.badge{
    display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);
    background:#0c1532;color:var(--muted);padding:10px 12px;border-radius:999px;font-weight:800;box-shadow:var(--shadow)
  }
  .dot{width:10px;height:10px;border-radius:50%}
  .ok .dot{background:var(--ok)}   .ok{color:#bbf7d0}
  .warn .dot{background:var(--warn)}.warn{color:#ffe7b0}
  .bad .dot{background:var(--bad)}  .bad{color:#fecaca}
  .badge{color:#c7d2fe}

  /* Cards */
  main{max-width:1100px;margin:14px auto 28px;display:grid;gap:16px;padding:0 16px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.35)
  }
  .card h2{margin:0 0 12px 0;font-size:clamp(1.05rem,1.8vw,1.1rem);color:#e7ecff}

  /* Ações */
  .actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{
    padding:14px 18px;font-size:clamp(.95rem,1.6vw,1.02rem);font-weight:900;border:0;border-radius:12px;color:#0b1020;
    cursor:pointer;transition:transform .08s ease, filter .15s ease;box-shadow:0 6px 18px rgba(0,0,0,.4)
  }
  button:active{transform:translateY(1px)}
  button:hover{filter:brightness(1.06)}
  button:disabled{opacity:.55;cursor:not-allowed;filter:none}
  #btnSend{background:var(--btn)}
  .opt{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.95rem}
  .opt input[type="checkbox"]{width:16px;height:16px;accent-color:var(--brand)}
  .opt select{
    padding:10px 12px;border-radius:10px;border:1px solid var(--border);
    background:#0a122a;color:#e6ebff;font-weight:800;cursor:pointer
  }

  /* Lista / Distância (discreta) */
  ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
  li{
    line-height:1.3;font-family:ui-monospace,Consolas,Menlo,monospace;
    border:1px solid var(--border);border-radius:12px;padding:12px;background:#0b1433;
    font-size:1.03rem;color:#edf2ff; display:flex; justify-content:space-between; gap:12px; align-items:center;
    transition:box-shadow .15s ease,border-color .15s ease, background .15s ease
  }
  /* Destaque do MAIS PRÓXIMO */
  li.nearest{
    border-color:var(--btn);
    box-shadow:0 0 0 3px rgba(22,163,74,.2) inset;
    background:linear-gradient(0deg, rgba(22,163,74,.12), rgba(22,163,74,.02));
  }
  li.nearest .id-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--pill);
    padding:4px 10px; border-radius:999px;
    outline:1px solid rgba(34,197,94,.3)
  }
  li.nearest .id-badge .id-label{
    font-weight:1000; letter-spacing:.02em; color:#b6ffce; font-size:1.08rem;
  }
  li.nearest .id-badge .flag{
    padding:2px 8px; border-radius:999px; background:#22c55e; color:#05220f; font-weight:900; font-size:.72rem;
  }

  .id-label{font-weight:800}
  .dist{
    color:#9fb0d9; opacity:.85;
    font-size:.78rem;   /* menor e discreta */
    min-width:64px; text-align:right;
  }

  /* Skeleton */
  .skeleton{
    height:48px;border-radius:12px;background:
      linear-gradient(90deg,#111a3a 25%,#0d1836 40%,#111a3a 60%);
    background-size:200% 100%;animation:shimmer 1.1s infinite
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Grid responsivo */
  .col-4{grid-column:span 4}
  .col-8{grid-column:span 8}
  @media (max-width:900px){ .col-4,.col-8{grid-column:1/-1} }

  /* Acessibilidade */
  button:focus-visible, select:focus-visible{outline:3px solid var(--focus); outline-offset:2px}

/* ===== Inspeção (foto/vídeo com overlay) ===== */
#inspCard{display:none}
#inspWrap{display:grid;grid-template-columns:1fr 320px;gap:16px}
@media (max-width:900px){#inspWrap{grid-template-columns:1fr}}
#camBox{position:relative;background:#020617;border:1px solid var(--border);border-radius:12px;overflow:hidden;min-height:300px}
#cam{display:block;width:100%;height:auto;background:#000}
#can{position:absolute;inset:0;pointer-events:none}
#overlayInfo{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.55);color:#e6ebff;padding:8px 10px;border-radius:10px;font:600 12px/1.35 ui-monospace,Consolas,monospace;white-space:pre-wrap;max-width:75%}
#recDot{position:absolute;right:10px;top:10px;width:12px;height:12px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 0 rgba(239,68,68,.8);animation:pulse 1.2s infinite;display:none}
@keyframes pulse{to{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
#inspControls{display:grid;gap:10px}
#inspControls .row{display:flex;gap:8px;flex-wrap:wrap}
#inspControls select,#inspControls input[type="text"],#inspControls textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#0a122a;color:#e6ebff;font-weight:700}
#inspControls textarea{min-height:76px}
#inspControls button{background:linear-gradient(180deg,#22c55e,#16a34a);color:#061b0f}
#inspControls button.alt{background:linear-gradient(180deg,#38bdf8,#0284c7);color:#001018}
#inspControls button.danger{background:linear-gradient(180deg,#fda4af,#ef4444);color:#2b0a0e}
#evidList{display:grid;gap:10px;max-height:360px;overflow:auto}
.ev{display:grid;grid-template-columns:48px 1fr;gap:10px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:8px;background:#0c1532}
.ev .thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;background:#020617}
.ev .meta{font-size:.82rem;color:#c7d2fe}
.ev .meta b{color:#e7ecff}

</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot-logo" aria-hidden="true"></span>
    <h1>ID GPS</h1>
  </div>
</header>

<!-- Status: GPS + diagnóstico -->
<div id="status" role="region" aria-label="Status do sistema">
  <div id="gpsChip" class="chip bad" aria-live="polite">
    <span class="dot"></span><span id="gpsText">GPS: aguardando…</span>
  </div>
  <div id="diag" class="badge" style="display:none" aria-live="polite">—</div>
</div>

<main>
  <div class="grid">
    <!-- Ações (principal) -->
    <section class="card col-4" aria-label="Ações">
      <h2>Ações</h2>

      <div class="actions" style="margin-bottom:8px">
        <button id="btnSend" disabled>Enviar ID por WhatsApp</button>
            <button id="btnInsp">Abrir Inspeção</button>Enviar ID por WhatsApp</button>
      </div>

      <div class="actions" style="gap:16px">
        <label class="opt" title="Quantidade de IDs a enviar (padrão 10)">
          <span style="opacity:.9">quantidade</span>
          <select id="qty">
            <option value="1">1</option>
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>

        <label class="opt" title="Adicionar links do Google Maps junto com os IDs">
          <input type="checkbox" id="chkMaps" />
          <span>incluir links de mapa</span>
        </label>
      </div>
    </section>

    <!-- IDs próximos -->
    <section class="card col-8" aria-label="IDs mais próximos">
      <h2>IDs próximos</h2>
      <ul id="list" aria-live="polite">
        <li class="skeleton"></li><li class="skeleton"></li><li class="skeleton"></li>
        <li class="skeleton"></li><li class="skeleton"></li>
      </ul>
    </section>
  </div>

<section class="card col-12" id="inspCard" aria-label="Inspeção de Iluminação">
  <h2>Inspeção de Iluminação (foto/vídeo com ID em tela)</h2>
  <div id="inspWrap">
    <div id="camBox">
      <video id="cam" playsinline autoplay muted></video>
      <canvas id="can"></canvas>
      <div id="overlayInfo"></div>
      <div id="recDot" title="gravando"></div>
    </div>
    <div id="inspControls">
      <div class="row">
        <select id="inspStatus" title="Condição observada">
          <option value="SEM ILUMINAÇÃO">SEM ILUMINAÇÃO</option>
          <option value="PARCIAL">PARCIAL</option>
          <option value="INTERMITENTE">INTERMITENTE</option>
          <option value="NORMAL">NORMAL</option>
        </select>
      </div>
      <div class="row">
        <input id="inspId" type="text" placeholder="ID do poste (ex.: ES156SPN120)" list="idOptions"/>
        <datalist id="idOptions"></datalist>
      </div>
      <div class="row">
        <textarea id="inspObs" placeholder="Observações"></textarea>
      </div>
      <div class="row">
        <button id="btnShot">📷 Foto</button>
        <button id="btnRec" class="alt">⏺ Gravar</button>
        <button id="btnMark" class="alt">🔖 Marcar ponto</button>
      </div>
      <div class="row">
        <button id="btnExport">⬇️ Exportar CSV</button>
        <button id="btnClear" class="danger">🗑 Limpar log</button>
        <button id="btnClose">Fechar</button>
      </div>
      <div>
        <h3 style="margin:14px 0 8px 0;font-size:1rem;color:#c7d2fe">Evidências</h3>
        <div id="evidList" aria-live="polite"></div>
      </div>
      <p style="color:#9fb0d9;font-size:.8rem;margin:6px 0 0 0">Dica: use em <b>HTTPS</b> (ou localhost) para permitir a câmera no celular.</p>
    </div>
  </div>
</section>

</main>

<script>
/* ===== Config do chip (visual) ===== */
const ACC_GREEN=10, ACC_YELLOW=25;

/* ===== Estado ===== */
let dataset=[];           // {id,lat,lon}
let lastPos=null;         // {lat,lon,acc,spd,head,ts}
let lastRender=0;

/* ===== Elements ===== */
const gpsChip=document.getElementById('gpsChip');
const gpsText=document.getElementById('gpsText');
const diag=document.getElementById('diag');
const btnSend=document.getElementById('btnSend');
const chkMaps=document.getElementById('chkMaps');
const qtySel=document.getElementById('qty');
const listEl=document.getElementById('list');

/* ===== Helpers ===== */
function showDiag(msg){ diag.style.display='inline-flex'; diag.textContent=msg; }
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){
  const map=headers.map(h=>normalizeStr(h));
  for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; }
  for(const c of candidates){ for(let i=0;i<map.length;i++){ if(map[i].includes(c)) return i; } }
  return -1;
}
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }
function nearestN(lat,lon,n=10){
  if(!dataset.length) return [];
  const arr=dataset.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0, Math.min(n,arr.length));
}
function fmtAcc(a){ return (a==null||!Number.isFinite(a))?'—':('±'+Math.round(a)+' m'); }
function fmtHead(h){ return (h==null||!Number.isFinite(h))? null : Math.round(h)+'°'; }
function fmtSpd(s){ return (s==null||!Number.isFinite(s))? null : Math.round(s*3.6)+' km/h'; }
function nowBR(){ return new Date().toLocaleString('pt-BR'); }

/* Distância — sempre em metros (discreta) */
function fmtDistMeters(m){
  if(!(Number.isFinite(m))) return '—';
  return Math.round(m) + ' m';
}

/* ===== Chip e botões ===== */
function updateGpsChip(){
  if(!lastPos || lastPos.acc==null){ gpsChip.className='chip bad'; gpsText.textContent='GPS: buscando…'; return; }
  const a=Math.round(lastPos.acc);
  if(a<=ACC_GREEN){ gpsChip.className='chip ok';   gpsText.textContent=`GPS: OK (${fmtAcc(a)})`; }
  else if(a<=ACC_YELLOW){ gpsChip.className='chip warn'; gpsText.textContent=`GPS: ajustando (${fmtAcc(a)})`; }
  else { gpsChip.className='chip bad';  gpsText.textContent=`GPS: fraco (${fmtAcc(a)})`; }
}
function updateButtons(){
  const baseOk=dataset.length>0, posOk=!!lastPos;
  btnSend.disabled=!(baseOk && posOk);
}

/* ===== CSV Loader ===== */
async function loadCSV(){
  try{
    let resp=await fetch('dados.csv?v='+Date.now(), {cache:'no-store'});
    if(!resp.ok){ resp=await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now(), {cache:'no-store'}); }
    if(!resp.ok){ showDiag('❌ CSV não encontrado'); return; }

    let text=await resp.text(); if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
    const lines=text.split(/\r?\n/).filter(l=>l.trim()!==''); if(lines.length<2){ showDiag('❌ CSV vazio'); return; }

    const head=lines.shift().split(';');
    const iId=findColumnIndex(head,['id do nox','idnox','id']),
          iLat=findColumnIndex(head,['latitude','lat']),
          iLon=findColumnIndex(head,['longitude','lon','long']);
    if(iId<0||iLat<0||iLon<0){ showDiag('❌ Cabeçalho inválido (ID/Latitude/Longitude)'); return; }

    dataset=lines.map(l=>{ const r=l.split(';'); return {id:String(r[iId]||'').trim(), lat:parsePt(r[iLat]), lon:parsePt(r[iLon])}; })
                 .filter(p=>p.id && Number.isFinite(p.lat)&&Number.isFinite(p.lon));
    if(!dataset.length){ showDiag('❌ Sem pontos válidos no CSV'); return; }

    render(true); updateButtons();
  }catch(e){ showDiag('❌ Erro ao carregar CSV'); }
}

/* ===== Render IDs (com distância — metros) ===== */
function render(force=false){
  const now=performance.now(); if(!force && now-lastRender<150) return; lastRender=now;
  listEl.innerHTML=''; if(!lastPos||!dataset.length) return;

  const qty = Number(qtySel.value || 10);
  const items=nearestN(lastPos.lat,lastPos.lon,qty);
  if(!items.length){ listEl.innerHTML='<li>—</li>'; return; }

  const frag=document.createDocumentFragment();
  items.forEach((o,idx)=>{
    const li=document.createElement('li');

    /* lado esquerdo: ID (com badge se for o mais próximo) */
    const left = document.createElement('span');
    const idSpan = document.createElement('span');
    idSpan.className='id-label';
    idSpan.textContent=o.id;

    if(idx===0){
      li.classList.add('nearest');
      const pill = document.createElement('span');
      pill.className='id-badge';
      const flag = document.createElement('span');
      flag.className='flag';
      flag.textContent='PRÓXIMO';
      pill.appendChild(idSpan);
      pill.appendChild(flag);
      left.appendChild(pill);
    }else{
      left.appendChild(idSpan);
    }

    /* lado direito: distância discreta */
    const right = document.createElement('span');
    right.className='dist';
    right.textContent = fmtDistMeters(o.d);

    li.appendChild(left);
    li.appendChild(right);
    frag.appendChild(li);
  });
  listEl.appendChild(frag);
}

/* ===== GPS ===== */
function startGPS(){
  if(!('geolocation' in navigator)){ showDiag('❌ Sem geolocalização no navegador'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      lastPos={ lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy,
                spd:pos.coords.speed, head:pos.coords.heading, ts:Date.now() };
      updateGpsChip(); updateButtons(); render(true);
      navigator.geolocation.watchPosition(p=>{
        lastPos={ lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy,
                  spd:p.coords.speed, head:p.coords.heading, ts:Date.now() };
        updateGpsChip(); updateButtons(); render();
      },err=>{}, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
    },
    err=>{ showDiag('❗ Permita o GPS para listar os IDs próximos'); },
    {enableHighAccuracy:true,maximumAge:0,timeout:10000}
  );
}

/* ===== Enviar (IDs) ===== */
btnSend.addEventListener('click', ()=>{
  if(!lastPos) return;
  const qty = Number(qtySel.value || 10);
  const items=nearestN(lastPos.lat,lastPos.lon,qty); if(!items.length) return;

  const accTxt=fmtAcc(lastPos.acc), head=fmtHead(lastPos.head), spd=fmtSpd(lastPos.spd);
  let tx=`${nowBR()}\nGPS agora: Lat ${lastPos.lat.toFixed(6)}, Lon ${lastPos.lon.toFixed(6)} · Precisão ${accTxt}`;
  if(spd) tx+=` · Vel ${spd}`; if(head) tx+=` · Curso ${head}`; tx+='\n';

  // Padrão: somente IDs (sem distâncias)
  items.forEach(o=> tx+=`ID: ${o.id}\n`);

  // Opcional: links de mapa
  if(chkMaps.checked){
    tx+='\nLinks de mapa:\n';
    items.forEach(o=> tx+=`ID: ${o.id} → https://maps.google.com/?q=${o.lat.toFixed(6)},${o.lon.toFixed(6)}\n`);
  }

  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* ===== Eventos ===== */
qtySel.addEventListener('change', ()=> render(true));

/* ===== Boot ===== */
(function boot(){
  loadCSV();
  startGPS();
})();

/* ======== INSPEÇÃO: câmera, overlay e log ======== */
let insp = {stream:null, rec:null, recChunks:[], canvasCtx:null, running:false, log:[], logKey:'inspLogV1'};
const inspEl = {
  card: null, cam:null, can:null, info:null, recDot:null,
  id:null, status:null, obs:null,
  shot:null, recBtn:null, mark:null, close:null, exportBtn:null, clearBtn:null,
  evid:null, idOptions:null
};

function inspInitRefs(){
  if(inspEl.card) return; // já inicializado
  inspEl.card = document.getElementById('inspCard');
  inspEl.cam = document.getElementById('cam');
  inspEl.can = document.getElementById('can');
  inspEl.info = document.getElementById('overlayInfo');
  inspEl.recDot = document.getElementById('recDot');
  inspEl.id = document.getElementById('inspId');
  inspEl.status = document.getElementById('inspStatus');
  inspEl.obs = document.getElementById('inspObs');
  inspEl.shot = document.getElementById('btnShot');
  inspEl.recBtn = document.getElementById('btnRec');
  inspEl.mark = document.getElementById('btnMark');
  inspEl.close = document.getElementById('btnClose');
  inspEl.exportBtn = document.getElementById('btnExport');
  inspEl.clearBtn = document.getElementById('btnClear');
  inspEl.evid = document.getElementById('evidList');
  inspEl.idOptions = document.getElementById('idOptions');
}

function inspLoadLog(){
  try{ const s = localStorage.getItem(insp.logKey); if(s) insp.log = JSON.parse(s); }catch{}
  inspRenderLog();
}
function inspSaveLog(){
  try{ localStorage.setItem(insp.logKey, JSON.stringify(insp.log)); }catch{}
}
function inspRenderLog(){
  if(!inspEl.evid) return;
  inspEl.evid.innerHTML = '';
  if(!insp.log.length){ inspEl.evid.innerHTML = '<div style="color:#9fb0d9">Sem itens ainda.</div>'; return; }
  const frag = document.createDocumentFragment();
  insp.log.slice().reverse().forEach((it,idx)=>{
    const row = document.createElement('div'); row.className='ev';
    let thumb;
    if(it.type==='foto'){
      thumb = document.createElement('img'); thumb.className='thumb'; thumb.src = it.href; thumb.alt='foto';
    }else if(it.type==='video'){
      thumb = document.createElement('video'); thumb.className='thumb'; thumb.src = it.href; thumb.muted=true; thumb.loop=true; thumb.autoplay=true;
    }else{ // marca
      thumb = document.createElement('div'); thumb.className='thumb'; thumb.style.display='grid'; thumb.style.placeItems='center'; thumb.textContent='📍';
    }
    const meta = document.createElement('div'); meta.className='meta';
    meta.innerHTML = `<b>${it.id}</b> · ${it.status} · ${new Date(it.ts).toLocaleString('pt-BR')}<br/>`+
                     `${it.lat?.toFixed?it.lat.toFixed(6):'—'}, ${it.lon?.toFixed?it.lon.toFixed(6):'—'} · ±${it.acc?Math.round(it.acc):'—'} m`+
                     (it.obs?`<br/>Obs: ${it.obs.replace(/</g,'&lt;')}`:'');
    const actions = document.createElement('div');
    actions.style.display='flex'; actions.style.gap='6px'; actions.style.marginTop='6px';
    if(it.href){
      const a = document.createElement('a'); a.href=it.href; a.download=it.fileName||''; a.textContent='Baixar'; a.className='chip';
      actions.appendChild(a);
    }
    const del = document.createElement('button'); del.textContent='Remover'; del.className='danger'; del.onclick=()=>{ insp.log = insp.log.filter(x=>x!==it); inspSaveLog(); inspRenderLog(); };
    const wrap = document.createElement('div');
    wrap.appendChild(meta); wrap.appendChild(actions); 

    row.appendChild(thumb); row.appendChild(wrap);
    frag.appendChild(row);
  });
  inspEl.evid.appendChild(frag);
}

function inspNearestOptions(){
  // Popular datalist com até 50 IDs mais próximos
  if(!lastPos || !dataset.length) return;
  const items = nearestN(lastPos.lat,lastPos.lon,50);
  inspEl.idOptions.innerHTML = items.map(o=>`<option value="${o.id}"></option>`).join('');
  // Preencher campo com o mais próximo se vazio
  if(!inspEl.id.value && items[0]) inspEl.id.value = items[0].id;
}

function inspOverlayText(){
  const id = (inspEl.id.value||'—').trim();
  const st = inspEl.status.value;
  const accTxt = lastPos?fmtAcc(lastPos.acc):'—';
  const posTxt = lastPos?`${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} · ${accTxt}`:'GPS —';
  return `${id} · ${st}\n${posTxt}\n${nowBR()}`;
}

function inspDrawLoop(){
  if(!insp.running) return;
  const v = inspEl.cam, c = inspEl.can, ctx = insp.canvasCtx;
  if(v.videoWidth && v.videoHeight){
    if(c.width!==v.videoWidth || c.height!==v.videoHeight){ c.width=v.videoWidth; c.height=v.videoHeight; }
    ctx.drawImage(v,0,0,c.width,c.height);
    // overlay texto
    const pad = 12, lh = 18;
    const lines = inspOverlayText().split('\n');
    ctx.font = '700 14px ui-monospace,Consolas,monospace';
    ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(pad, c.height - (lines.length*(lh)+pad*1.5), 300, (lines.length*(lh))+pad);
    ctx.fillStyle = '#e6ebff';
    lines.forEach((ln,i)=> ctx.fillText(ln, pad+8, c.height - (lines.length*(lh)+pad*0.5) + (i+1)*lh));
  }
  requestAnimationFrame(inspDrawLoop);
}

async function inspStart(){
  inspInitRefs();
  inspEl.card.style.display='block';
  // câmera
  try{
    insp.stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}}, audio:false});
  }catch(e){ showDiag('❗ Permita acesso à câmera'); return; }
  inspEl.cam.srcObject = insp.stream;
  await inspEl.cam.play().catch(()=>{});
  // canvas desenhando vídeo + overlay; gravaremos a partir do canvas
  inspEl.can.width = inspEl.cam.videoWidth||1280; inspEl.can.height = inspEl.cam.videoHeight||720;
  insp.canvasCtx = inspEl.can.getContext('2d');
  insp.running = true; inspDrawLoop();
  inspNearestOptions();
  inspLoadLog();
}

function inspStop(){
  insp.running=false;
  if(insp.stream){ insp.stream.getTracks().forEach(t=>t.stop()); insp.stream=null; }
  if(insp.rec){ try{insp.rec.stop();}catch{} insp.rec=null; insp.recChunks=[]; }
  inspEl.recDot.style.display='none';
  inspEl.card.style.display='none';
}

function inspSnapFileName(ext){
  const id = (inspEl.id.value||'SEMID').replace(/\W+/g,'');
  const t = new Date();
  const ts = t.toISOString().replace(/[:.]/g,'-');
  return `INSPECAO_${id}_${ts}.${ext}`;
}

function inspAddLog(entry){
  insp.log.push(entry); inspSaveLog(); inspRenderLog();
}

function inspGetGeo(){
  return lastPos?{lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc}:{};
}

function inspShot(){
  // Foto a partir do canvas (já com overlay)
  const c = inspEl.can;
  c.toBlob(b=>{
    const href = URL.createObjectURL(b);
    const fileName = inspSnapFileName('png');
    inspAddLog({ts:Date.now(), type:'foto', href, fileName, id:inspEl.id.value.trim(), status:inspEl.status.value, obs:inspEl.obs.value.trim(), ...inspGetGeo()});
  }, 'image/png', 0.92);
}

function inspToggleRec(){
  if(insp.rec){ // parar
    try{ insp.rec.stop(); }catch{}
    return;
  }
  const stream = inspEl.can.captureStream(30);
  insp.rec = new MediaRecorder(stream, {mimeType:'video/webm;codecs=vp9,opus'});
  insp.recChunks = [];
  insp.rec.ondataavailable = (e)=>{ if(e.data && e.data.size) insp.recChunks.push(e.data); };
  insp.rec.onstop = ()=>{
    const blob = new Blob(insp.recChunks, {type:'video/webm'});
    const href = URL.createObjectURL(blob);
    const fileName = inspSnapFileName('webm');
    inspAddLog({ts:Date.now(), type:'video', href, fileName, id:inspEl.id.value.trim(), status:inspEl.status.value, obs:inspEl.obs.value.trim(), ...inspGetGeo()});
    insp.rec=null; insp.recChunks=[]; inspEl.recDot.style.display='none'; inspEl.recBtn.textContent='⏺ Gravar';
  };
  insp.rec.start(); inspEl.recDot.style.display='block'; inspEl.recBtn.textContent='⏹ Parar';
}

function inspMark(){
  inspAddLog({ts:Date.now(), type:'marca', id:inspEl.id.value.trim(), status:inspEl.status.value, obs:inspEl.obs.value.trim(), ...inspGetGeo()});
}

function inspExportCSV(){
  const sep = ';';
  const header = ['ts','data_hora','tipo','id','status','lat','lon','acc_m','obs','arquivo'];
  const lines = [header.join(sep)];
  insp.log.forEach(it=>{
    const row = [
      it.ts,
      new Date(it.ts).toLocaleString('pt-BR'),
      it.type,
      '"'+(it.id||'')+'"',
      it.status,
      it.lat||'',
      it.lon||'',
      it.acc?Math.round(it.acc):'',
      '"'+(it.obs||'').replace(/"/g,'""')+'"',
      it.fileName||''
    ].join(sep);
    lines.push(row);
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'inspecao_iluminacao_log.csv';
  document.body.appendChild(a); a.click(); a.remove();
}

function inspBindEvents(){
  inspEl.shot.addEventListener('click', inspShot);
  inspEl.recBtn.addEventListener('click', inspToggleRec);
  inspEl.mark.addEventListener('click', inspMark);
  inspEl.close.addEventListener('click', inspStop);
  inspEl.exportBtn.addEventListener('click', inspExportCSV);
  inspEl.clearBtn.addEventListener('click', ()=>{ if(confirm('Limpar log da inspeção?')){ insp.log=[]; inspSaveLog(); inspRenderLog(); } });
}

// Abrir inspeção
const btnInsp = document.getElementById('btnInsp');
if(btnInsp){ btnInsp.addEventListener('click', ()=>{ inspInitRefs(); inspBindEvents(); inspStart(); }); }

// Atualizar opções de ID conforme GPS muda
(function(){
  const origRender = render; // intercepta para atualizar datalist quando renderiza ids próximos
  render = function(force){ origRender(force); try{ if(inspEl.card && inspEl.card.style.display!=='none') inspNearestOptions(); }catch{} };
})();

</script>
