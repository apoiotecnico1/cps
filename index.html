<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Relatório Fotográfico PRO</title>

<style>
:root{
  --bg:#0b1020;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.15);
  --text:#e6ecff;
  --accent:#22c55e;
}

*{
  box-sizing:border-box;
  transition:all .2s ease;
}

body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#1a2a5a,#0b1020);
  color:var(--text);
}

/* ===== Layout ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(12px) saturate(160%);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
}

/* ===== Camera ===== */
#video{
  width:100%;
  height:40vh;
  object-fit:cover;
  border-radius:12px;
  background:#000;
}

/* ===== Buttons ===== */
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:var(--text);
  font-weight:700;
}

button:active{
  transform:scale(.96);
}

/* ===== Gallery ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;
}

.gallery img{
  width:100%;
  border-radius:8px;
}

.status{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.badge{
  padding:4px 8px;
  border-radius:999px;
  background:#00000055;
  font-size:.8rem;
}
.ok{color:#86efac}
.warn{color:#fde68a}

</style>
</head>

<body>
<div class="container">

<h2>📸 Relatório Fotográfico PRO</h2>

<div class="status">
<span id="stCam" class="badge">Cam</span>
<span id="stGps" class="badge">GPS</span>
<span id="stCsv" class="badge">CSV</span>
<span id="stFotos" class="badge">0 fotos</span>
</div>

<div class="card">
<video id="video" autoplay playsinline></video>
</div>

<div class="card">
<button id="btnCapture">📸 Capturar</button>
<button id="btnAuto">🎬 Auto</button>
<button id="btnClear">🧹 Limpar</button>
</div>

<div class="card">
<h3>Fotos</h3>
<div id="gallery" class="gallery"></div>
</div>

</div>

<script>
/* ===== Estado ===== */
let stream=null;
let gps=null;
let photos=[];
let auto=false;
let lastShot=0;

/* ===== Elementos ===== */
const video=document.getElementById('video');
const gallery=document.getElementById('gallery');

/* ===== Camera ===== */
async function startCamera(){
  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject=stream;
  stCam("OK");
}

/* ===== GPS ===== */
function startGPS(){
  navigator.geolocation.watchPosition(p=>{
    gps={
      lat:p.coords.latitude,
      lon:p.coords.longitude,
      acc:p.coords.accuracy
    };
    stGps("OK");
  },()=>stGps("ERRO"),{
    enableHighAccuracy:false,
    maximumAge:2000
  });
}

/* ===== Status ===== */
function stCam(t){setStatus("stCam",t,true)}
function stGps(t){setStatus("stGps",t,true)}
function stCsv(t){setStatus("stCsv",t,true)}

function setStatus(id,text,ok){
  const el=document.getElementById(id);
  el.textContent=id.replace("st","")+": "+text;
  el.className="badge "+(ok?"ok":"warn");
}

/* ===== Capture ===== */
function capture(){
  if(!gps) return alert("Sem GPS");

  const canvas=document.createElement("canvas");
  const MAX=1280;

  let w=video.videoWidth;
  let h=video.videoHeight;

  if(Math.max(w,h)>MAX){
    if(w>h){ h=h*(MAX/w); w=MAX }
    else{ w=w*(MAX/h); h=MAX }
  }

  canvas.width=w;
  canvas.height=h;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0,w,h);

  // overlay
  ctx.fillStyle="rgba(0,0,0,.6)";
  ctx.fillRect(0,h-80,w,80);

  ctx.fillStyle="#22c55e";
  ctx.font="20px sans-serif";
  ctx.fillText(`GPS: ${gps.lat.toFixed(5)}, ${gps.lon.toFixed(5)}`,10,h-40);

  const blobURL=canvas.toDataURL("image/jpeg",0.85);

  photos.push(blobURL);
  render();

  navigator.vibrate?.(50);
}

/* ===== Auto Capture (SUPER OTIMIZADO) ===== */
function autoLoop(ts){
  if(!auto) return;

  if(ts-lastShot>600){
    lastShot=ts;
    capture();
  }

  requestAnimationFrame(autoLoop);
}

/* ===== Render ===== */
function render(){
  gallery.innerHTML="";
  photos.forEach(p=>{
    const img=document.createElement("img");
    img.src=p;
    gallery.appendChild(img);
  });

  document.getElementById("stFotos").textContent=
    photos.length+" fotos";
}

/* ===== Eventos ===== */
btnCapture.onclick=capture;

btnAuto.onclick=()=>{
  auto=!auto;
  btnAuto.textContent=auto?"⏹️ Parar":"🎬 Auto";
  if(auto){
    lastShot=0;
    requestAnimationFrame(autoLoop);
  }
};

btnClear.onclick=()=>{
  photos=[];
  render();
};

/* ===== Boot rápido ===== */
startCamera();
startGPS();

</script>
</body>
</html>
