<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Relatório de Inspeção PRO</title>

<style>
:root{
  --bg:#0a0f1f;
  --panel:#11182f;
  --glass:rgba(255,255,255,0.04);
  --border:#1f2a4d;
  --text:#e6ecff;
  --muted:#8fa3d6;

  --accent:#00e0ff;
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
}

/* ===== Base ===== */
body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#162a63,#0a0f1f);
  color:var(--text);
}

.container{
  max-width:1000px;
  margin:auto;
  padding:12px;
}

/* ===== Painel ===== */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}

/* ===== Status ===== */
.status{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:700;
  background:#00000055;
  border:1px solid var(--border);
}

.ok{color:#86efac}
.warn{color:#fde68a}
.bad{color:#fca5a5}

/* ===== Camera ===== */
#video{
  width:100%;
  height:42vh;
  object-fit:cover;
  border-radius:12px;
  background:#000;
  border:1px solid var(--border);
}

/* ===== Botões ===== */
button{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  font-weight:900;
  letter-spacing:.03em;
  background:linear-gradient(180deg,#0f1a3a,#0a1128);
  color:var(--text);
  box-shadow:0 4px 15px rgba(0,0,0,.5);
}

button:active{
  transform:scale(.96);
}

.primary{
  background:linear-gradient(180deg,#00e0ff,#0090c0);
  color:#001018;
}

.danger{
  background:linear-gradient(180deg,#ff5c5c,#d93a3a);
}

.warning{
  background:linear-gradient(180deg,#ffb347,#d98c1f);
}

/* ===== Grid botões ===== */
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

/* ===== KM display ===== */
#kmDisplay{
  text-align:center;
  font-size:1.2rem;
  font-weight:900;
  color:#00e0ff;
  padding:8px;
}

/* ===== Galeria ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:6px;
}

.gallery img{
  width:100%;
  border-radius:8px;
  border:1px solid var(--border);
}
</style>
</head>

<body>
<div class="container">

<h2>📡 Sistema de Inspeção Rodoviária</h2>

<div class="status">
<span id="stCam" class="badge">Cam</span>
<span id="stGps" class="badge">GPS</span>
<span id="stCsv" class="badge">CSV</span>
<span id="stFotos" class="badge">0 fotos</span>
</div>

<div id="kmDisplay">KM —</div>

<div class="card">
<video id="video" autoplay playsinline></video>
</div>

<div class="card row">
<button id="btnCapture" class="primary">📸 FOTO</button>
<button id="btnAuto" class="warning">🎬 AUTO</button>
<button id="btnClear" class="danger">🧹 LIMPAR</button>
</div>

<div class="card">
<div id="gallery" class="gallery"></div>
</div>

</div>

<script>
/* ===== DADOS ===== */
let dataset=[];
let kmPoints=[];

/* ===== UTIL ===== */
function hav(a,b,c,d){
 const R=6371000;
 const x=(c-a)*Math.PI/180;
 const y=(d-b)*Math.PI/180;
 const u=Math.sin(x/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
 return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

/* ===== FILTRO OTIMIZADO ===== */
function nearest(lat,lon){
 let best=null,dist=Infinity;

 for(const p of dataset){
   if(Math.abs(p.lat-lat)>0.01) continue;
   if(Math.abs(p.lon-lon)>0.01) continue;

   const d=hav(lat,lon,p.lat,p.lon);
   if(d<dist){dist=d;best=p;}
 }

 return best;
}

/* ===== KM ===== */
function nearestKM(lat,lon){
 let best=null,dist=Infinity;

 for(const p of kmPoints){
   if(Math.abs(p.lat-lat)>0.01) continue;
   if(Math.abs(p.lon-lon)>0.01) continue;

   const d=hav(lat,lon,p.lat,p.lon);
   if(d<dist){dist=d;best=p;}
 }

 return best;
}

/* ===== CAMERA ===== */
let stream;
async function startCam(){
 stream=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
 });
 video.srcObject=stream;
}

/* ===== GPS ===== */
let pos=null;
navigator.geolocation.watchPosition(p=>{
 pos={lat:p.coords.latitude,lon:p.coords.longitude};
});

/* ===== CAPTURA ===== */
function capture(){
 if(!pos) return;

 const canvas=document.createElement("canvas");
 const ctx=canvas.getContext("2d");

 let w=video.videoWidth;
 let h=video.videoHeight;

 const MAX=1280;
 if(w>MAX){h*=MAX/w;w=MAX;}

 canvas.width=w;
 canvas.height=h;

 ctx.drawImage(video,0,0,w,h);

 const km=nearestKM(pos.lat,pos.lon);
 const id=nearest(pos.lat,pos.lon);

 ctx.fillStyle="rgba(0,0,0,.6)";
 ctx.fillRect(0,h-90,w,90);

 ctx.fillStyle="#00e0ff";
 ctx.font="20px monospace";
 ctx.fillText(`KM: ${km?.km||'—'}`,10,h-50);

 ctx.fillStyle="#fff";
 ctx.fillText(`ID: ${id?.id||'—'}`,10,h-20);

 const url=canvas.toDataURL("image/jpeg",0.85);

 photos.push(url);
 render();

 navigator.vibrate?.(50);
}

/* ===== AUTO ===== */
let auto=false,last=0;
function loop(t){
 if(auto && t-last>600){
  last=t;
  capture();
 }
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ===== UI ===== */
let photos=[];

function render(){
 gallery.innerHTML="";
 photos.forEach(p=>{
  const img=document.createElement("img");
  img.src=p;
  gallery.appendChild(img);
 });
 stFotos.textContent=photos.length+" fotos";
}

/* ===== BOTÕES ===== */
btnCapture.onclick=capture;

btnAuto.onclick=()=>{
 auto=!auto;
 btnAuto.textContent=auto?"⏹️ PARAR":"🎬 AUTO";
};

btnClear.onclick=()=>{
 photos=[];
 render();
};

/* ===== INIT ===== */
startCam();
</script>
</body>
</html>
