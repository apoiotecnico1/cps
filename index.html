<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inspeção Profissional</title>

<style>
:root{
  --bg:#020617;
  --card:#0b1225;
  --text:#e5edff;
  --accent:#22c55e;
  --danger:#ef4444;
  --warn:#facc15;

  --camH:65vh;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* ===== CAMERA ===== */
#camCard{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:var(--camH);
  background:#000;
  z-index:100;
}

#wrap{
  width:100%;
  height:100%;
  position:relative;
}

#vid{
  width:100%;
  height:100%;
  object-fit:cover;
}

#can{display:none}

/* ===== HUD ===== */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

#hudKm{
  font-size:1.2rem;
  font-weight:900;
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:8px;
}

#hudStatus{
  font-size:.75rem;
  padding:4px 8px;
  border-radius:6px;
  background:rgba(0,0,0,.5);
}

/* ===== overlay original ===== */
#ov{
  position:absolute;
  bottom:10px;
  left:10px;
}

#ov .msg{
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:8px;
  font-size:.8rem;
}

/* ===== chip ===== */
#chip{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.6);
  font-size:.75rem;
}

/* ===== espaço ===== */
#camSpacer{
  height:calc(var(--camH) + 10px);
}

/* ===== KM placa ===== */
#kmPlaque{
  text-align:center;
  font-size:1.1rem;
  font-weight:900;
  padding:8px;
  margin:10px;
  border-radius:10px;
  background:linear-gradient(#1e3a8a,#1e40af);
}

/* ===== BOTÕES ===== */
.card{
  background:var(--card);
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:1rem;
  font-weight:900;
}

/* principais */
#btnAutoCapture,
#btnVideoRecord{
  grid-column:1/-1;
  font-size:1.1rem;
}

#btnAutoCapture{background:#f97316;color:#fff;}
#btnVideoRecord{background:var(--danger);color:#fff;}
#btnPdf{background:var(--warn);}
#btnSharePdf,#btnSharePhotos{background:#25D366;}
#btnClear{background:var(--danger);}

/* ===== FAB ===== */
#fabCapture{
  position:fixed;
  bottom:20px;
  right:20px;
  width:85px;
  height:85px;
  border-radius:50%;
  border:none;
  font-size:2rem;
  font-weight:900;
  background:var(--accent);
  color:#022c22;
  box-shadow:0 10px 30px rgba(0,0,0,.7);
  z-index:999;
}

#fabCapture:active{
  transform:scale(.9);
}

/* ===== FOTO ===== */
#foto{
  width:100%;
  border-radius:10px;
}

/* ===== GALERIA ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:6px;
}

.thumb img{
  width:100%;
  border-radius:10px;
}

/* ===== CLEAN MODE ===== */
.clean .card,
.clean #kmPlaque{
  display:none !important;
}
</style>
</head>

<body>

<!-- CAMERA -->
<div id="camCard">
  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hudKm">KM —</div>
      <div id="hudStatus">PRONTO</div>
    </div>

    <!-- overlay original -->
    <div id="ov"><div class="msg" id="ovMsg">Toque p/ foto</div></div>

    <!-- chip -->
    <div id="chip"></div>
  </div>
</div>

<div id="camSpacer"></div>

<!-- KM -->
<div id="kmPlaque"><span id="kmTop">KM —</span></div>

<!-- BOTÕES -->
<div class="card">
  <div class="row">
    <button id="btnAutoCapture">🎬 AUTO</button>
    <button id="btnVideoRecord">⏺️ GRAVAR</button>

    <button id="btnPdf">📄 PDF</button>
    <button id="btnSharePdf">📤 PDF</button>

    <button id="btnSharePhotos">📷 FOTOS</button>
    <button id="btnClear">🧹 LIMPAR</button>
  </div>
</div>

<!-- FOTO -->
<div class="card">
  <img id="foto">
</div>

<!-- GALERIA -->
<div class="card">
  <div id="gal" class="gallery"></div>
</div>

<!-- FAB -->
<button id="fabCapture">📸</button>

<script>
// FAB ação
fabCapture.onclick = () => {
  if (isRecordingVideo) stopVideoRecording();
  else if (isAutoCapturing) stopAutoCapture();
  else capture();
};

// HUD
setInterval(()=>{
  hudKm.textContent = kmTop.textContent;

  if (isRecordingVideo){
    hudStatus.textContent='REC';
    hudStatus.style.color='#f87171';
  }
  else if (isAutoCapturing){
    hudStatus.textContent='AUTO';
    hudStatus.style.color='#facc15';
  }
  else{
    hudStatus.textContent='PRONTO';
    hudStatus.style.color='#4ade80';
  }
},300);

// modo clean
let lastTap=0;
document.addEventListener('touchend',()=>{
  const now=Date.now();
  if(now-lastTap<300){
    document.body.classList.toggle('clean');
  }
  lastTap=now;
});
</script>

</body>
</html>
