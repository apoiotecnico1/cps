<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inspeção Noturna Rodovia</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
overflow:hidden;
}

.wrap{
position:fixed;
inset:0;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
background:black;
}

canvas{
position:absolute;
inset:0;
pointer-events:none;
}

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:14px;
z-index:10;
}

button{
width:70px;
height:70px;
border-radius:50%;
border:none;
font-size:28px;
color:white;
background:rgba(0,0,0,.6);
backdrop-filter:blur(5px);
}

#rec{background:#e11d48}
#stop{background:#444}
#mark{background:#f97316}

</style>
</head>

<body>

<div class="wrap">

<video id="video" autoplay playsinline muted></video>

<canvas id="hud"></canvas>

<div class="controls">

<button id="photo">📷</button>
<button id="rec">⏺</button>
<button id="stop">⏹</button>
<button id="mark">⚠</button>

</div>

</div>

<script>

const video=document.getElementById("video")
const hud=document.getElementById("hud")
const ctx=hud.getContext("2d")

let recorder
let chunks=[]
let recording=false

let gps=null

navigator.geolocation.watchPosition(p=>{

gps=p.coords

})

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"},
audio:false

})

video.srcObject=stream

}

function resize(){

hud.width=window.innerWidth*devicePixelRatio
hud.height=window.innerHeight*devicePixelRatio

}

window.onresize=resize
resize()

function draw(){

const W=hud.width
const H=hud.height

ctx.clearRect(0,0,W,H)

const band=H*0.15

ctx.fillStyle="rgba(0,0,0,.6)"
ctx.fillRect(0,H-band,W,band)

ctx.fillStyle="#ff6b35"
ctx.font=`900 ${H*0.05}px Arial`
ctx.fillText("INSPEÇÃO ILUMINAÇÃO",20,H-band+50)

ctx.fillStyle="#fff"
ctx.font=`700 ${H*0.03}px Arial`

ctx.fillText(new Date().toLocaleString(),20,H-20)

if(recording){

ctx.beginPath()
ctx.arc(W-40,40,12,0,6.28)
ctx.fillStyle="red"
ctx.fill()

}

ctx.strokeStyle="rgba(255,255,255,.4)"
ctx.beginPath()
ctx.moveTo(W/2-20,H/2)
ctx.lineTo(W/2+20,H/2)
ctx.moveTo(W/2,H/2-20)
ctx.lineTo(W/2,H/2+20)
ctx.stroke()

requestAnimationFrame(draw)

}

document.getElementById("rec").onclick=()=>{

if(recording)return

recorder=new MediaRecorder(video.srcObject)

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="inspecao.webm"

a.click()

}

recorder.start()

recording=true

}

document.getElementById("stop").onclick=()=>{

if(!recording)return

recorder.stop()

recording=false

}

document.getElementById("photo").onclick=()=>{

const c=document.createElement("canvas")

c.width=video.videoWidth
c.height=video.videoHeight

const x=c.getContext("2d")

x.drawImage(video,0,0)

const url=c.toDataURL("image/jpeg")

const a=document.createElement("a")

a.href=url
a.download="foto_inspecao.jpg"

a.click()

}

document.getElementById("mark").onclick=()=>{

alert("Falha marcada "+new Date().toLocaleTimeString())

}

startCamera()

draw()

</script>

</body>
</html>
