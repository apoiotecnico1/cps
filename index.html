<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inspeção Fotográfica</title>

<style>
:root{
  --bg:#030712;
  --card:#0b1225;
  --accent:#2563eb;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#facc15;
  --text:#e5edff;
  --muted:#94a3b8;
  --radius:14px;

  --camH:55vh;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* CAMERA FIXA */
#camCard{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:var(--camH);
  z-index:100;
  background:#000;
}

#wrap{
  position:relative;
  width:100%;
  height:100%;
}

#vid{
  width:100%;
  height:100%;
  object-fit:cover;
}

#can{display:none}

/* overlay */
#ov{
  position:absolute;
  bottom:10px;
  left:10px;
}

#ov .msg{
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:8px;
  font-size:.8rem;
}

/* chip */
#chip{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.6);
  font-size:.75rem;
}

/* espaço */
#camSpacer{
  height:calc(var(--camH) + 10px);
}

/* KM */
#kmPlaque{
  text-align:center;
  font-size:1.2rem;
  font-weight:900;
  background:linear-gradient(#1e3a8a,#1e40af);
  padding:8px;
  border-radius:10px;
  margin:10px;
}

/* BOTÕES */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:16px;
  border-radius:var(--radius);
  border:none;
  font-size:1rem;
  font-weight:900;
}

#btnAutoCapture,
#btnVideoRecord{
  grid-column:1/-1;
  font-size:1.1rem;
}

#btnAutoCapture{background:#f97316;color:#fff;}
#btnVideoRecord{background:var(--red);color:#fff;}
#btnPdf{background:var(--yellow);}
#btnSharePdf,#btnSharePhotos{background:#25D366;}
#btnClear{background:var(--red);}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:6px;
}

.thumb img{
  width:100%;
  border-radius:10px;
}

/* CARDS */
.card{
  background:var(--card);
  padding:10px;
  margin:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- câmera -->
<div id="camCard">
  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can"></canvas>

    <div id="ov"><div class="msg" id="ovMsg">Toque p/ foto</div></div>
    <div id="chip"></div>
  </div>
</div>

<div id="camSpacer"></div>

<!-- KM -->
<div id="kmPlaque"><span id="kmTop">KM —</span></div>

<!-- BOTÕES -->
<div class="card">
  <div class="row">
    <button id="btnAutoCapture">🎬 AUTO</button>
    <button id="btnVideoRecord">⏺️ GRAVAR</button>

    <button id="btnPdf">📄 PDF</button>
    <button id="btnSharePdf">📤 PDF</button>

    <button id="btnSharePhotos">📷 FOTOS</button>
    <button id="btnClear">🧹 LIMPAR</button>
  </div>
</div>

<!-- FOTO -->
<div class="card">
  <img id="foto" style="width:100%;border-radius:10px">
</div>

<!-- GALERIA -->
<div class="card">
  <div id="gal" class="gallery"></div>
</div>

</body>
</html>
