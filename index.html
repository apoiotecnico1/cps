<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telemetria</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
}

/* HEADER */
header {
    background: #020617;
    padding: 12px;
    text-align: center;
    font-size: 18px;
    border-bottom: 1px solid #1e293b;
}

/* STATUS */
.status-bar {
    text-align: center;
    font-size: 12px;
    padding: 6px;
    color: #94a3b8;
}

/* GRID */
.container {
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
}

/* TEXT */
.label {
    font-size: 11px;
    color: #94a3b8;
}

.value {
    font-size: 20px;
    font-weight: bold;
    margin-top: 5px;
}

/* STATUS COLORS */
.ok { color: #22c55e; }
.alert { color: #ef4444; }

</style>
</head>

<body>

<header>🚀 Painel de Telemetria</header>
<div class="status-bar" id="conexao">Inicializando...</div>

<div class="container">

    <div class="card">
        <div class="label">ID</div>
        <div class="value" id="id">--</div>
    </div>

    <div class="card">
        <div class="label">KM</div>
        <div class="value" id="km">--</div>
    </div>

    <div class="card">
        <div class="label">Velocidade</div>
        <div class="value" id="velocidade">-- km/h</div>
    </div>

    <div class="card">
        <div class="label">Status</div>
        <div class="value" id="status">--</div>
    </div>

    <div class="card">
        <div class="label">Atualização</div>
        <div class="value" id="hora">--</div>
    </div>

</div>

<script>

/* ================= CONFIG ================= */
const API_URL = ""; // COLOQUE SUA API AQUI

/* ================= ELEMENTOS ================= */
const el = {
    id: document.getElementById("id"),
    km: document.getElementById("km"),
    vel: document.getElementById("velocidade"),
    status: document.getElementById("status"),
    hora: document.getElementById("hora"),
    conexao: document.getElementById("conexao")
};

/* ================= FALLBACK ================= */
function gerarDadosFake() {
    return {
        id: Math.floor(Math.random() * 999),
        km: (Math.random() * 500).toFixed(1),
        velocidade: Math.floor(Math.random() * 120),
        status: Math.random() > 0.2 ? "ONLINE" : "ALERTA"
    };
}

/* ================= ATUALIZA UI ================= */
function atualizarTela(dados) {

    el.id.textContent = dados.id ?? "--";
    el.km.textContent = dados.km ?? "--";
    el.vel.textContent = (dados.velocidade ?? "--") + " km/h";

    el.status.textContent = dados.status ?? "--";

    if (dados.status === "ONLINE") {
        el.status.className = "value ok";
    } else if (dados.status === "ALERTA") {
        el.status.className = "value alert";
    } else {
        el.status.className = "value";
    }

    el.hora.textContent = new Date().toLocaleTimeString();
}

/* ================= API ================= */
async function buscarDados() {

    // modo simulação
    if (!API_URL) {
        el.conexao.textContent = "Modo simulação";
        atualizarTela(gerarDadosFake());
        return;
    }

    try {
        const response = await fetch(API_URL, {
            cache: "no-store"
        });

        if (!response.ok) throw new Error("API erro");

        const dados = await response.json();

        el.conexao.textContent = "Conectado";
        atualizarTela(dados);

    } catch (erro) {
        el.conexao.textContent = "Erro conexão (fallback)";
        atualizarTela(gerarDadosFake());
    }
}

/* ================= LOOP ================= */
setInterval(buscarDados, 1000);

/* ================= START ================= */
buscarDados();

</script>

</body>
</html>
