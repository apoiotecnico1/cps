<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Telemetria</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #fff;
    }

    header {
        background: #020617;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        border-bottom: 1px solid #1e293b;
    }

    .container {
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
    }

    .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        text-align: center;
    }

    .label {
        font-size: 12px;
        color: #94a3b8;
    }

    .value {
        font-size: 22px;
        font-weight: bold;
        margin-top: 5px;
    }

    .status-ok {
        color: #22c55e;
    }

    .status-alert {
        color: #ef4444;
    }
</style>
</head>

<body>

<header>🚀 Painel de Telemetria</header>

<div class="container">
    <div class="card">
        <div class="label">ID</div>
        <div class="value" id="id">--</div>
    </div>

    <div class="card">
        <div class="label">KM</div>
        <div class="value" id="km">--</div>
    </div>

    <div class="card">
        <div class="label">Velocidade</div>
        <div class="value" id="velocidade">-- km/h</div>
    </div>

    <div class="card">
        <div class="label">Status</div>
        <div class="value" id="status">--</div>
    </div>

    <div class="card">
        <div class="label">Atualização</div>
        <div class="value" id="hora">--</div>
    </div>
</div>

<script>
// Simulação inicial (carrega rápido)
function gerarDadosFake() {
    return {
        id: Math.floor(Math.random() * 1000),
        km: (Math.random() * 500).toFixed(1),
        velocidade: Math.floor(Math.random() * 120),
        status: Math.random() > 0.2 ? "ONLINE" : "ALERTA"
    };
}

// Atualiza tela
function atualizarTela(dados) {
    document.getElementById("id").textContent = dados.id;
    document.getElementById("km").textContent = dados.km;
    document.getElementById("velocidade").textContent = dados.velocidade + " km/h";

    const statusEl = document.getElementById("status");
    statusEl.textContent = dados.status;

    statusEl.className = "value " + (dados.status === "ONLINE" ? "status-ok" : "status-alert");

    document.getElementById("hora").textContent = new Date().toLocaleTimeString();
}

// Atualização contínua (leve e rápida)
setInterval(() => {
    const dados = gerarDadosFake();
    atualizarTela(dados);
}, 1000);

// INTEGRAÇÃO REAL (substitua depois)

//     const dados = await res.json();
//     atualizarTela(dados);
// }
</script>

</body>
</html>
