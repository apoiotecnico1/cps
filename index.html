<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inspeção Fotográfica – Iluminação</title>
<style>
  :root{
    --bg:#0b1020; --surface:#101830; --fg:#e6ebff; --muted:#a3b1d1;
    --border:#1e2647; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --btn:#22c55e; --btn2:#1e40af;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;padding:16px}
  h1{margin:0 0 12px;text-align:center;font-size:1.8rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin:0 auto 16px;max-width:1024px;box-shadow:0 8px 22px rgba(0,0,0,.35)}
  #vid{width:100%;display:block;background:#000;border-radius:12px}
  #foto{width:100%;display:block;border:1px solid #2a335a;border-radius:12px;margin-top:12px}
  .kv{display:flex;gap:16px;flex-wrap:wrap;color:#bcd0ff;font-size:1.05rem}
  .kv b{color:#fff}
  .status{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:#0c1532;color:#c7d2fe;font-weight:800}
  .chip .dot{width:10px;height:10px;border-radius:50%}
  .chip.ok{color:#bbf7d0}.chip.ok .dot{background:var(--ok)}
  .chip.warn{color:#ffe7b0}.chip.warn .dot{background:var(--warn)}
  .chip.bad{color:#fecaca}.chip.bad .dot{background:var(--bad)}
  button{width:100%;padding:16px;font-size:1.25rem;font-weight:900;border:0;border-radius:12px;cursor:pointer;margin-top:12px;box-shadow:0 8px 18px rgba(0,0,0,.35)}
  #btnFoto{background:var(--btn);color:#08260f}
  #btnDownload{background:var(--btn2);color:#fff}
  button:disabled{opacity:.55;cursor:not-allowed}
  small.hint{display:block;color:#9fb4fc;margin-top:6px}
</style>
</head>
<body>

<h1>📸 Inspeção Fotográfica</h1>

<!-- Estado -->
<div class="card">
  <div class="status">
    <span id="chipCsv" class="chip bad"><span class="dot"></span><span>CSV: carregando…</span></span>
    <span id="chipCam" class="chip bad"><span class="dot"></span><span>Câmera: aguardando…</span></span>
    <span id="chipGps" class="chip bad"><span class="dot"></span><span>GPS: aguardando…</span></span>
  </div>
  <small class="hint">O botão habilita quando CSV + Câmera + GPS estiverem prontos.</small>
</div>

<!-- Prévia -->
<div class="card">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="can" width="1280" height="720" hidden></canvas>
</div>

<!-- Dados ao vivo -->
<div class="card">
  <div class="kv">
    <div>KM: <b id="kmTxt">—</b></div>
    <div>IDs próximos: <b id="idTxt">—</b></div>
  </div>
</div>

<!-- Ações -->
<div class="card">
  <button id="btnFoto" disabled>📸 Capturar Foto</button>
</div>

<!-- Foto final -->
<div class="card">
  <h2>Foto</h2>
  <img id="foto" alt="Prévia da foto capturada">
  <button id="btnDownload" disabled>Baixar Foto</button>
</div>

<script>
/* =========================
   Utilitários numéricos
   ========================= */
function parsePt(v){
  if(v==null) return NaN;
  const s = String(v).trim();
  return /,\d+$/.test(s) ? Number(s.replace(/\./g,'').replace(',','.')) : Number(s);
}
function hav(a,b,c,d){
  const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u));
}
function fmtKm(v){
  let K=Math.floor(v), m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K+=1}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }

/* =========================
   Estado e chips
   ========================= */
const chipCsv = document.getElementById('chipCsv');
const chipCam = document.getElementById('chipCam');
const chipGps = document.getElementById('chipGps');
function setChip(el, state, text){
  el.className = `chip ${state}`;
  el.lastElementChild.textContent = text;
}

/* =========================
   Bases e estruturas
   ========================= */
let dataset = [];    // IDs válidos
let kmPoints = [];   // KM decimado (~5m mínimo)
let csvReady=false, camReady=false, gpsReady=false;
let lastPos=null;

const kmTxt=document.getElementById('kmTxt');
const idTxt=document.getElementById('idTxt');
const btnFoto=document.getElementById('btnFoto');
const btnDownload=document.getElementById('btnDownload');
function maybeEnable(){ btnFoto.disabled = !(csvReady && camReady && gpsReady); }

/* ====== Grid geográfico (IDs + KM) para buscas rápidas ====== */
const CELL = 0.005; // ~550 m
const idGrid = new Map();
const kmGrid = new Map();
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid, p){
  const k=cellKey(p.lat,p.lon);
  const a=grid.get(k); a ? a.push(p) : grid.set(k,[p]);
}
function gridCands(grid, lat,lon, minCount=60, maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL);
  const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      const y=ky+dy;
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${y},${kx+dx}`);
        if(a) out.push(...a);
      }
    }
  }
  return out.length ? out : [];
}

/* =========================
   1) Carregar CSVs (GitHub Pages)
   ========================= */
async function loadIDs(){
  const txt = await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text());
  const lines = txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  const head = lines[0].split(';').map(h=>h.toLowerCase());
  const iId  = head.findIndex(h=>h.includes('id') && !h.includes('lat') && !h.includes('long'));
  const iLat = head.findIndex(h=>h.includes('lat'));
  const iLon = head.findIndex(h=>h.includes('lon'));
  dataset = [];
  for(let i=1;i<lines.length;i++){
    const c = lines[i].split(';');
    const id  = String(c[iId]||'').trim();
    const lat = parsePt(c[iLat]);
    const lon = parsePt(c[iLon]);
    if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    if(lat===0 && lon===0) continue;
    if(Math.abs(lat)>90 || Math.abs(lon)>180) continue; // limpa outliers (há linhas assim no seu CSV)
    const p = {id, lat, lon};
    dataset.push(p);
  }
  // popula grid de IDs
  idGrid.clear();
  for(const p of dataset) gridInsert(idGrid,p);
}

function pickTrio(c){
  // CSV de KM no formato: KM;LAT;LONG;;;;;KM;LAT;LONG (2 blocos por linha)
  // Pegamos preferencialmente o 1º trio válido; se não, tentamos o 2º.
  const t1={km:parsePt(c[0]), lat:parsePt(c[1]), lon:parsePt(c[2])};
  if(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon)) return t1;
  const t2={km:parsePt(c[7]), lat:parsePt(c[8]), lon:parsePt(c[9])};
  if(Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon)) return t2;
  return null;
}

async function loadKM(){
  const txt = await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
  const lines = txt.split(/\r?\n/).map(cleanLine).filter(Boolean);

  kmPoints = [];
  let lastKeep=null;
  const MIN_STEP = 5; // metros (alvo)

  for(let i=0;i<lines.length;i++){
    const c = lines[i].split(';');
    // pula cabeçalho e linhas sem número
    if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue;
    const t = pickTrio(c);
    if(!t) continue;
    if(!Number.isFinite(t.km)||!Number.isFinite(t.lat)||!Number.isFinite(t.lon)) continue;

    // Decimação por distância: mantém ponto se não houver anterior
    // ou se a distância ao último mantido for >= 5 m.
    if(!lastKeep){
      kmPoints.push(t);
      lastKeep=t;
    }else{
      const d = hav(lastKeep.lat,lastKeep.lon,t.lat,t.lon);
      if(d >= MIN_STEP){
        kmPoints.push(t);
        lastKeep=t;
      }
    }
  }

  // popula grid de KM
  kmGrid.clear();
  for(const p of kmPoints) gridInsert(kmGrid,p);
}

async function loadCSVs(){
  try{
    await Promise.all([loadIDs(), loadKM()]);
    csvReady = dataset.length>0 && kmPoints.length>0;
    setChip(chipCsv, csvReady?'ok':'bad',
      csvReady? `CSV: OK (IDs ${dataset.length} · KM ${kmPoints.length})`
               : 'CSV: erro');
  }catch(e){
    csvReady=false; setChip(chipCsv,'bad','CSV: erro ao carregar');
  }finally{ maybeEnable(); }
}

/* =========================
   2) Busca de vizinhos
   ========================= */
function nearestN(lat,lon,n=5){
  if(!dataset.length) return [];
  const cand = gridCands(idGrid,lat,lon,Math.max(60, n*20));
  const arr = cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0,n);
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const cand = gridCands(kmGrid,lat,lon,120);
  if(!cand.length) return null;
  let best=null,bd=Infinity;
  for(const p of cand){
    const d=hav(lat,lon,p.lat,p.lon);
    if(d<bd){ bd=d; best=p; }
  }
  return best;
}

/* =========================
   3) Câmera (HTTPS)
   ========================= */
const vid=document.getElementById('vid');
async function startCamera(){
  try{
    const st = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}}, audio:false
    });
    vid.srcObject = st;
    await new Promise(res=>{
      if(vid.readyState>=1 && vid.videoWidth) return res();
      vid.onloadedmetadata=()=>res();
      setTimeout(res,2000);
    });
    camReady = !!vid.videoWidth; setChip(chipCam, camReady?'ok':'bad', camReady?'Câmera: OK':'Câmera: erro');
  }catch(e){
    camReady=false; setChip(chipCam,'bad','Câmera: erro');
  }finally{ maybeEnable(); }
}

/* =========================
   4) GPS (HTTPS)
   ========================= */
function startGPS(){
  if(!('geolocation' in navigator)){
    setChip(chipGps,'bad','GPS: não disponível'); return;
  }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true; setChip(chipGps,'ok',`GPS: OK (±${Math.round(p.coords.accuracy)} m)`);
    updateDerived();
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
      updateDerived();
    }, ()=>{}, {enableHighAccuracy:true, maximumAge:500, timeout:15000});
    maybeEnable();
  }, ()=>{
    gpsReady=false; setChip(chipGps,'bad','GPS: negado');
  }, {enableHighAccuracy:true, timeout:12000});
}

function updateDerived(){
  if(!(csvReady && lastPos)) return;
  const km = nearestKM(lastPos.lat,lastPos.lon);
  document.getElementById('kmTxt').textContent = km? fmtKm(km.km) : '—';
  const ids = nearestN(lastPos.lat,lastPos.lon,5);
  document.getElementById('idTxt').textContent = ids.length ? ids.map(o=>o.id).join(', ') : '—';
}

/* =========================
   5) Captura da foto + estampa
   ========================= */
const can=document.getElementById('can');
const ctx=can.getContext('2d',{alpha:false});
const foto=document.getElementById('foto');

btnFoto.onclick=()=>{
  if(!(csvReady && camReady && gpsReady && lastPos)) return;

  const w=vid.videoWidth||1280, h=vid.videoHeight||720;
  can.width=w; can.height=h;

  ctx.drawImage(vid, 0, 0, w, h);

  // Faixa inferior
  const bandH = Math.max(160, Math.round(h*0.16));
  ctx.fillStyle='rgba(0,0,0,.62)';
  ctx.fillRect(0, h-bandH, w, bandH);

  // KM + data/hora
  const km = nearestKM(lastPos.lat,lastPos.lon);
  const kmStr = km? fmtKm(km.km) : 'KM —';
  ctx.fillStyle='#fff';
  ctx.textAlign='left';
  ctx.font=`900 ${Math.round(h*0.06)}px system-ui`;
  ctx.fillText(kmStr, 20, h - bandH + Math.round(bandH*0.56));
  ctx.font=`700 ${Math.round(h*0.035)}px system-ui`;
  ctx.fillText(new Date().toLocaleString(), 20, h - Math.round(bandH*0.22));

  // IDs (direita)
  const ids = nearestN(lastPos.lat,lastPos.lon,5);
  ctx.textAlign='right';
  ctx.font=`600 ${Math.round(h*0.03)}px system-ui`;
  ids.forEach((e,i)=> ctx.fillText(e.id, w-20, h - bandH + 30 + i*28));

  foto.src = can.toDataURL('image/jpeg',0.92);
  btnDownload.disabled = true;
  foto.onload = ()=>{ btnDownload.disabled=false; };
};

btnDownload.onclick=()=>{
  if(!foto.src) return;
  const a=document.createElement('a');
  a.href=foto.src;
  a.download='INSPECAO_FOTO.jpg';
  a.click();
};

/* =========================
   6) Inicialização
   ========================= */
(async function boot(){
  setChip(chipCsv,'bad','CSV: carregando…');
  setChip(chipCam,'bad','Câmera: aguardando…');
  setChip(chipGps,'bad','GPS: aguardando…');
  await loadCSVs();
  startCamera();
  startGPS();
})();
</script>

</body>
</html>
